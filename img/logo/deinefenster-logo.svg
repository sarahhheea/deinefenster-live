<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="DeineFenster.de – Online Shop für Fenster und Türen">
  <title>DeineFenster.de</title>
  <defs>
    <linearGradient id="df-frame-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#225eaa"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="df-glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d4f5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7eb0e8" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Fenster-Symbol: 4-Panes-Rahmen -->
  <g transform="translate(8,10)">
    <!-- Aussenrahmen -->
    <rect x="0" y="0" width="60" height="60" rx="6" fill="url(#df-frame-grad)"/>
    <!-- Glas-Panes (4 Quadrate) -->
    <rect x="5" y="5" width="23" height="23" fill="url(#df-glass-grad)"/>
    <rect x="32" y="5" width="23" height="23" fill="url(#df-glass-grad)"/>
    <rect x="5" y="32" width="23" height="23" fill="url(#df-glass-grad)"/>
    <rect x="32" y="32" width="23" height="23" fill="url(#df-glass-grad)"/>
    <!-- Sprosse horizontal (Mitte) -->
    <rect x="0" y="28" width="60" height="4" fill="url(#df-frame-grad)"/>
    <!-- Sprosse vertikal (Mitte) -->
    <rect x="28" y="0" width="4" height="60" fill="url(#df-frame-grad)"/>
    <!-- Glanz-Highlight -->
    <path d="M 5 5 L 15 5 L 5 15 Z" fill="white" fill-opacity="0.35"/>
    <path d="M 32 5 L 42 5 L 32 15 Z" fill="white" fill-opacity="0.35"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(88,0)" font-family="'Plus Jakarta Sans', system-ui, sans-serif">
    <text x="0" y="42" font-size="26" font-weight="800" letter-spacing="-0.8" fill="#0f1e3a">
      Deine<tspan fill="#225eaa">Fenster</tspan>
    </text>
    <text x="0" y="64" font-size="12" font-weight="600" letter-spacing="2" fill="#5a6578">
      .DE &nbsp;·&nbsp; DRUTEX FACHHANDEL
    </text>
  </g>
</svg>
