<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenster 3D — Dreh-Kipp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #e8e8e8; overflow: hidden; }

  body.embed .header    { display: none; }
  body.embed .layout    { height: 100vh; }
  body.embed .ref-panel { display: none; }
  body.embed .controls  { display: none; }
  body.embed #threeCanvas { width: 100% !important; }

  .header {
    background: #1e3a8a; color: white;
    height: 40px; padding: 0 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  .header .model-tag {
    background: rgba(255,255,255,0.18); border-radius: 4px;
    padding: 2px 9px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.5px;
  }

  .layout { display: flex; height: calc(100vh - 40px); }

  .ref-panel {
    width: 290px; min-width: 290px;
    background: #f4f4f4;
    border-right: 1px solid #d8d8d8;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 10px 8px 8px;
    gap: 6px;
  }
  .ref-label {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: #94a3b8;
  }
  .ref-panel img {
    max-height: calc(100vh - 100px);
    max-width: 100%;
    object-fit: contain;
    border-radius: 3px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  }
  .ref-model-name {
    font-size: 10px; font-weight: 700; color: #1e3a8a;
    text-align: center; padding: 3px 0;
    letter-spacing: 0.3px;
  }

  #threeCanvas { flex: 1; display: block; cursor: grab; }
  #threeCanvas:active { cursor: grabbing; }

  .controls {
    width: 252px; min-width: 252px;
    padding: 10px 10px 20px;
    overflow-y: auto;
    background: white;
    box-shadow: -2px 0 12px rgba(0,0,0,0.07);
  }
  .current-label {
    font-size: 13px; font-weight: 700; color: #1e3a8a;
    text-align: center; padding: 7px 4px 9px;
    border-bottom: 1px solid #e8edf5;
    margin-bottom: 8px;
  }
  .section-title {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.1px;
    color: #94a3b8; margin: 10px 0 5px;
  }
  .section-title:first-of-type { margin-top: 0; }
  .colors { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
  .color-swatch {
    width: 100%; aspect-ratio: 1; border-radius: 4px;
    cursor: pointer; border: 2px solid transparent;
    transition: all 0.1s; position: relative;
  }
  .color-swatch:hover { transform: scale(1.18); z-index: 1; }
  .color-swatch.active {
    border-color: #1e3a8a;
    box-shadow: 0 0 0 2px #1e3a8a;
  }
  .tooltip {
    display: none; position: absolute;
    bottom: 115%; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: white;
    padding: 3px 7px; border-radius: 4px;
    font-size: 10px; white-space: nowrap;
    z-index: 20; pointer-events: none;
  }
  .color-swatch:hover .tooltip { display: block; }

  .glass-btns { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
  .glass-btn {
    flex: 1; min-width: 0;
    padding: 6px 2px; border-radius: 5px;
    border: 2px solid #e0e8f4; background: white;
    cursor: pointer; font-size: 9px; font-weight: 700;
    color: #64748b; text-align: center; line-height: 1.2;
    transition: all 0.1s; letter-spacing: 0.2px;
  }
  .glass-btn.active { border-color: #1e3a8a; color: #1e3a8a; background: #f0f5ff; }
  .glass-btn:hover { border-color: #93a8d4; }
</style>
</head>
<body>

<div class="header">
  <h1>Fenster 3D Konfigurator</h1>
  <select id="modelSelect" style="background:#2a4fa0;color:white;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:3px 8px;font-size:12px;font-weight:600;cursor:pointer;">
    <option value="1fluegel-dk">1-Flügel Dreh-Kipp</option>
  </select>
</div>

<div class="layout">

  <!-- Referenzfoto links — Innenseite -->
  <div class="ref-panel">
    <div class="ref-label">Referenz — Innenseite</div>
    <div class="ref-model-name" id="refModelName">1-Flügel Dreh-Kipp</div>
    <img id="refImg" src="img/fenster-innen-1fluegel-farbig.png" alt="Fenster Innenseite">
  </div>

  <!-- 3D Modell Mitte -->
  <canvas id="threeCanvas"></canvas>

  <!-- Farbsteuerung rechts -->
  <div class="controls">
    <div class="current-label" id="currentLabel">Weiß FX</div>
    <div class="section-title">Weißtöne</div>
    <div class="colors" id="whites"></div>
    <div class="section-title">Grautöne & Schwarz</div>
    <div class="colors" id="grays"></div>
    <div class="section-title">Farben</div>
    <div class="colors" id="colorGroup"></div>
    <div class="section-title">Holzdekore</div>
    <div class="colors" id="woods"></div>
    <div class="section-title">Verglasung</div>
    <div class="glass-btns" id="glassBtns"></div>
  </div>

</div>

<script type="importmap">
{ "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ══════════════════════════════════════════════
// RENDERER
// ══════════════════════════════════════════════
const canvasEl = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe8e8e8);

const camera = new THREE.PerspectiveCamera(20, 1, 0.1, 50);
camera.position.set(0, 0.60, 6.0);

const orb = new OrbitControls(camera, canvasEl);
orb.target.set(0, 0.60, 0);
orb.enablePan = false;
orb.minDistance = 3.0;
orb.maxDistance = 10.0;
orb.maxPolarAngle = Math.PI * 0.54;
orb.minPolarAngle = Math.PI * 0.46;
orb.minAzimuthAngle = -0.26;
orb.maxAzimuthAngle =  0.26;
orb.update();

// ══════════════════════════════════════════════
// ENVIRONMENT — hell für Griff-Reflexionen
// ══════════════════════════════════════════════
const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileEquirectangularShader();
const envSc = new THREE.Scene();
envSc.add(new THREE.AmbientLight(0xffffff, 4.0));
const eL1 = new THREE.DirectionalLight(0xffffff, 4.0);
eL1.position.set(1, 2, 3); envSc.add(eL1);
const eL2 = new THREE.DirectionalLight(0xffffff, 3.0);
eL2.position.set(-2, 1, 3); envSc.add(eL2);
const envTex = pmremGen.fromScene(envSc, 0.04).texture;
scene.environment = envTex;

scene.add(new THREE.AmbientLight(0xffffff, 0.42));

const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
keyLight.position.set(2, 4, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 1; keyLight.shadow.camera.far = 12;
keyLight.shadow.camera.left = -1.5; keyLight.shadow.camera.right = 1.5;
keyLight.shadow.camera.top = 2.0; keyLight.shadow.camera.bottom = -0.5;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

const fill = new THREE.DirectionalLight(0xddeeff, 0.5);
fill.position.set(-3, 2.5, 3); scene.add(fill);

const front = new THREE.DirectionalLight(0xffffff, 0.25);
front.position.set(0, 1, 10); scene.add(front);

// Backlight hinter dem Fenster — simuliert Tageslicht durch Glas (ref zeigt helles, weißes Glas)
const backLight = new THREE.DirectionalLight(0xffffff, 3.0);
backLight.position.set(0, 0.6, -5);
scene.add(backLight);

// Spotlight auf Griff: Weltkoord = -WW/2 + HX_local
const chromeLight = new THREE.SpotLight(0xffffff, 8.0, 10, Math.PI / 8, 0.15);
chromeLight.position.set(0.9, 1.8, 5);
chromeLight.target.position.set(0.260, 0.60, 0.10);
scene.add(chromeLight); scene.add(chromeLight.target);

// Boden-Schatten
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(8, 8),
  new THREE.ShadowMaterial({ opacity: 0.10 })
);
gnd.rotation.x = -Math.PI / 2;
gnd.receiveShadow = true;
scene.add(gnd);

// ══════════════════════════════════════════════
// MATERIALIEN
// ══════════════════════════════════════════════
const texLoader = new THREE.TextureLoader();

// doorMat = Flügelrahmen-Fläche, frameMat = Blendrahmen-Streifen, glFrameMat = Glasleiste
// Alle drei bekommen dieselbe Farbe/Holztextur (Fenster ist einheitlich)
const doorMat    = new THREE.MeshStandardMaterial({ color: 0xfcfcfc, roughness: 0.74, metalness: 0 });
const frameMat   = new THREE.MeshStandardMaterial({ color: 0xfcfcfc, roughness: 0.74, metalness: 0 });
const glFrameMat = new THREE.MeshStandardMaterial({ color: 0xfcfcfc, roughness: 0.74, metalness: 0 });
const chromeMat  = new THREE.MeshStandardMaterial({ color: 0xd8dde0, roughness: 0.18, metalness: 0.92, envMapIntensity: 2.5 });
const glassMat   = new THREE.MeshPhysicalMaterial({
  color: 0xdcecf8, metalness: 0, roughness: 0.02,
  transmission: 0.94, thickness: 0.018, ior: 1.5, transparent: true,
  reflectivity: 0.3,
});

// ══════════════════════════════════════════════
// FENSTERDIMENSIONEN — 1-Flügel 900×1200mm
// Maßstab: 1 unit = 1 m
// ══════════════════════════════════════════════
const WW = 0.900;   // Fensterbreite
const WH = 1.200;   // Fensterhöhe
const WD = 0.068;   // Profiltiefe

// Blendrahmen: sichtbare Breite ~45mm, 2 Stufen
const z1w = 0.048, z1d = 0.020;                              // Stufe 1 — breiter Hauptstreifen
const z2off = z1w + 0.004, z2w = 0.007, z2d = 0.010;       // Stufe 2 — Falz-Absatz

// Flügelrahmen + Glasfeld
const OVL  = 0.014;              // Überschlag: Sash überlappt Blendrahmen
const SX0  = z1w - OVL;         // = 0.034 — Sash-Startpunkt X
const SY0  = z1w - OVL;         // = 0.034 — Sash-Startpunkt Y
const FW   = 0.062;              // Flügelrahmen-Profilbreite (jede Seite)
const GX   = SX0 + FW;          // Glasfeld-Beginn X
const GY   = SY0 + FW;          // Glasfeld-Beginn Y
const GW   = WW - 2 * GX;       // Glasfeld-Breite
const GH   = WH - 2 * GY;       // Glasfeld-Höhe

// Handle-Position (Innenansicht: rechts, Mitte)
const HX_local = WW - SX0 - FW / 2;  // Mitte rechtes Stilo
const HY_local = WH * 0.50;          // Mitte Höhe

const windowGroup = new THREE.Group();
let glassObjects = [];
let _curColor = 'weiss-fx';
let _curWood  = null;
let _curGlass = 'klar';

// ── Hilfsfunktion: Rechteck-Streifen vor dem Fenster ──
function strip(x, y, w, h, d, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat || frameMat);
  m.position.set(x + w / 2, y + h / 2, WD + d / 2);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

// ══════════════════════════════════════════════
// buildWindow — Fenstergeometrie aufbauen
// ══════════════════════════════════════════════
function buildWindow() {
  while (windowGroup.children.length > 0) {
    const c = windowGroup.children[0];
    if (c.geometry) c.geometry.dispose();
    windowGroup.remove(c);
  }
  glassObjects = [];

  // ── Hintergrundplatte (weiße Wand hinter dem Fenster — simuliert hellen Hintergrund) ──
  const bgPlate = new THREE.Mesh(
    new THREE.PlaneGeometry(WW * 1.6, WH * 1.5),
    new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 1.0, metalness: 0 })
  );
  bgPlate.position.set(WW / 2, WH / 2, -0.005);
  bgPlate.receiveShadow = true;
  windowGroup.add(bgPlate);

  // ── Blendrahmen — 4 massive weiße Streifen (Hauptrahmen-Körper) ──
  // Jeder Streifen hat die volle Profiltiefe WD
  const BRW = z1w;   // Blendrahmen-Breite sichtbar
  const BRD = WD;    // Blendrahmen-Tiefe
  const blendFn = (x, y, w, h) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, BRD), frameMat);
    m.position.set(x + w/2, y + h/2, BRD / 2);
    m.castShadow = true;
    m.receiveShadow = true;
    return m;
  };
  windowGroup.add(blendFn(0,        WH - BRW, WW,           BRW));  // oben
  windowGroup.add(blendFn(0,        0,         WW,           BRW));  // unten
  windowGroup.add(blendFn(0,        BRW,       BRW, WH - 2*BRW));   // links
  windowGroup.add(blendFn(WW - BRW, BRW,       BRW, WH - 2*BRW));  // rechts

  // ── Blendrahmen Vorderkante — Profil-Stufenabsatz (Stufe 1) ──
  windowGroup.add(strip(0,        WH - z1w, WW,           z1w, z1d));  // oben
  windowGroup.add(strip(0,        0,         WW,           z1w, z1d));  // unten
  windowGroup.add(strip(0,        z1w,       z1w, WH - 2*z1w, z1d));   // links
  windowGroup.add(strip(WW - z1w, z1w,       z1w, WH - 2*z1w, z1d));  // rechts

  // Falz-Absatz (Stufe 2 — innere Kante des Blendrahmens)
  windowGroup.add(strip(z2off,             WH - z2off - z2w, WW - 2*z2off,             z2w, z2d));
  windowGroup.add(strip(z2off,             z2off,             WW - 2*z2off,             z2w, z2d));
  windowGroup.add(strip(z2off,             z2off + z2w,       z2w, WH - 2*(z2off+z2w),  z2d));
  windowGroup.add(strip(WW - z2off - z2w,  z2off + z2w,       z2w, WH - 2*(z2off+z2w),  z2d));

  // ── Flügelrahmen (Sash) als ExtrudeGeometry mit Glasloch ──
  // Sash sitzt etwas vor dem Blendrahmen-Body (Falzebene)
  const sashZ = WD - 0.010;  // Sash-Oberfläche leicht vor Blendrahmen
  {
    const s = new THREE.Shape();
    s.moveTo(SX0,       SY0);
    s.lineTo(WW - SX0,  SY0);
    s.lineTo(WW - SX0,  WH - SY0);
    s.lineTo(SX0,       WH - SY0);
    s.closePath();

    const hole = new THREE.Path();
    hole.moveTo(GX,      GY);
    hole.lineTo(GX + GW, GY);
    hole.lineTo(GX + GW, GY + GH);
    hole.lineTo(GX,      GY + GH);
    hole.closePath();
    s.holes.push(hole);

    const sashDepth = 0.060;
    const body = new THREE.Mesh(
      new THREE.ExtrudeGeometry(s, {
        depth: sashDepth,
        bevelEnabled: true,
        bevelThickness: 0.003,
        bevelSize: 0.002,
        bevelSegments: 2
      }),
      [doorMat, frameMat]
    );
    body.position.z = sashZ - sashDepth;
    body.castShadow = true;
    body.receiveShadow = true;
    windowGroup.add(body);
  }

  // ── Dunkle Dichtungslippe / Falzspalt zwischen Blendrahmen und Sash ──
  const sealMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0 });
  const SEAL = 0.006;
  // Schwarze Dichtungslinie um den Flügelrahmen (sitzt in der Falzebene)
  const sealZ = sashZ - 0.002;
  const sealFn = (x, y, w, h) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.004), sealMat);
    m.position.set(x + w/2, y + h/2, sealZ);
    return m;
  };
  windowGroup.add(sealFn(SX0,                WH - SY0 - SEAL, WW - 2*SX0, SEAL));   // oben
  windowGroup.add(sealFn(SX0,                SY0,              WW - 2*SX0, SEAL));   // unten
  windowGroup.add(sealFn(SX0,                SY0 + SEAL,       SEAL, WH - 2*SY0 - 2*SEAL)); // links
  windowGroup.add(sealFn(WW - SX0 - SEAL,   SY0 + SEAL,       SEAL, WH - 2*SY0 - 2*SEAL)); // rechts

  // ── Glasleiste (schwarze Dichtung um Glasscheibe — Referenzbild zeigt klar schwarze Linie) ──
  const beadMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.85, metalness: 0 });
  const BW = 0.010;  // Glasleisten-Breite
  const BD = 0.008;
  const beadZ = sashZ + 0.001;
  const bf = (x, y, w, h) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, BD), beadMat);
    m.position.set(x + w/2, y + h/2, beadZ);
    m.castShadow = true;
    return m;
  };
  windowGroup.add(bf(GX,           GY + GH,           GW,           BW));   // oben
  windowGroup.add(bf(GX,           GY - BW,           GW,           BW));   // unten
  windowGroup.add(bf(GX - BW,      GY,                BW,           GH));   // links
  windowGroup.add(bf(GX + GW,      GY,                BW,           GH));   // rechts

  // ── Helles Glas-Backing: leuchtendes Weiß direkt hinter der Glasscheibe ──
  // Simuliert Tageslicht / Himmel — wie im Referenzbild (fast weißes Glas)
  const glassBacking = new THREE.Mesh(
    new THREE.PlaneGeometry(GW + 0.002, GH + 0.002),
    new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: 0xffffff,
      emissiveIntensity: 0.85,
      roughness: 1.0,
      metalness: 0,
    })
  );
  glassBacking.position.set(GX + GW / 2, GY + GH / 2, sashZ - 0.028);
  windowGroup.add(glassBacking);

  // ── Glasscheibe ──
  const gm = new THREE.Mesh(
    new THREE.PlaneGeometry(GW - 0.002, GH - 0.002),
    glassMat
  );
  gm.position.set(GX + GW / 2, GY + GH / 2, sashZ - 0.020);
  windowGroup.add(gm);
  glassObjects.push(gm);

  // ── Dreh-Kipp Griff — realistisch mit CylinderGeometry ──
  // Referenzbild: Griff sitzt auf rechtem Stilo, Mitte Höhe
  // Griff hängt senkrecht NACH UNTEN (geschlossene Position)
  const HX = HX_local;
  const HY = HY_local;
  const HZ = sashZ + 0.001;  // direkt auf Sash-Fläche

  // Rosette — ovale Platte flach am Rahmen (etwas elongiert vertikal)
  const rosette = new THREE.Mesh(
    new THREE.CylinderGeometry(0.014, 0.013, 0.010, 20),
    chromeMat
  );
  rosette.rotation.x = Math.PI / 2;
  // Skalierung: etwas höher als breit (oval)
  rosette.scale.set(1.0, 1.5, 1.0);
  rosette.position.set(HX, HY, HZ + 0.005);
  rosette.castShadow = true;
  windowGroup.add(rosette);

  // Rosetten-Ring (Rand-Torus)
  const rosetteRing = new THREE.Mesh(
    new THREE.TorusGeometry(0.014, 0.003, 8, 20),
    chromeMat
  );
  rosetteRing.rotation.x = Math.PI / 2;
  rosetteRing.scale.set(1.0, 1.5, 1.0);
  rosetteRing.position.set(HX, HY, HZ + 0.009);
  rosetteRing.castShadow = true;
  windowGroup.add(rosetteRing);

  // Griffhebel — senkrechter Stab nach UNTEN (Dreh-Kipp Geschlossen-Position)
  // Im Referenzbild zeigt der Griff nach UNTEN
  const leverLen = 0.115;
  const lever = new THREE.Mesh(
    new THREE.CylinderGeometry(0.0085, 0.0085, leverLen, 14),
    chromeMat
  );
  // Senkrecht = keine Rotation nötig (CylinderGeometry ist schon vertikal)
  lever.position.set(HX, HY - leverLen / 2 - 0.010, HZ + 0.024);
  lever.castShadow = true;
  windowGroup.add(lever);

  // Griffkopf-Verbindung (Übergang Rosette → Griffstab, kleiner Zylinder)
  const connLen = 0.020;
  const conn = new THREE.Mesh(
    new THREE.CylinderGeometry(0.010, 0.009, connLen, 12),
    chromeMat
  );
  conn.position.set(HX, HY - connLen / 2 + 0.002, HZ + 0.024);
  conn.castShadow = true;
  windowGroup.add(conn);

  // Griffende — abgerundete Kappe unten
  const capEnd = new THREE.Mesh(
    new THREE.SphereGeometry(0.0095, 12, 8),
    chromeMat
  );
  capEnd.position.set(HX, HY - leverLen - 0.010, HZ + 0.024);
  capEnd.castShadow = true;
  windowGroup.add(capEnd);

  // ── Scharniere / Bänder (links, 2 Stück) ──
  // Referenzbild: Scharniere sind deutliche rechteckige Platten auf der linken Seite
  // Sie sitzen auf dem Flügelrahmen (linkes Stilo), leicht erhaben
  const hingeX = SX0 + FW * 0.42;  // leicht links von Stilo-Mitte
  [WH * 0.17, WH * 0.83].forEach(hy => {
    // Hauptplatte des Scharniers — größer für bessere Sichtbarkeit
    const hingePlate = new THREE.Mesh(
      new THREE.BoxGeometry(0.022, 0.055, 0.007),
      chromeMat
    );
    hingePlate.position.set(hingeX, hy, sashZ + 0.0045);
    hingePlate.castShadow = true;
    windowGroup.add(hingePlate);

    // Abgerundete Ecken simulieren (kleine Zylinder an den Enden der Platte)
    [-0.023, 0.023].forEach(dy => {
      const boltCap = new THREE.Mesh(
        new THREE.CylinderGeometry(0.005, 0.005, 0.008, 10),
        chromeMat
      );
      boltCap.rotation.x = Math.PI / 2;
      boltCap.position.set(hingeX, hy + dy, sashZ + 0.008);
      boltCap.castShadow = true;
      windowGroup.add(boltCap);
    });

    // Scharnierstift (horizontaler Zylinder in der Mitte der Platte)
    const hingePin = new THREE.Mesh(
      new THREE.CylinderGeometry(0.003, 0.003, 0.026, 8),
      chromeMat
    );
    hingePin.position.set(hingeX, hy, sashZ + 0.010);
    hingePin.castShadow = true;
    windowGroup.add(hingePin);
  });
}

buildWindow();
windowGroup.position.set(-WW / 2, 0, 0);
scene.add(windowGroup);

// ── Holztextur-Maps aus allen drei Frame-Materialien entfernen ──
function clearWoodMaps() {
  [doorMat, frameMat, glFrameMat].forEach(mat => {
    ['map', 'bumpMap', 'roughnessMap'].forEach(k => {
      if (mat[k]) { mat[k].dispose(); mat[k] = null; }
    });
  });
}

function findColor(key) {
  const all = [...FARBEN.whites, ...FARBEN.grays, ...FARBEN.colors];
  return all.find(c => c.key === key);
}

// ── Farbe setzen (Unifarbe — Holztextur entfernen) ──
function setColor(key) {
  _curColor = key; _curWood = null;
  clearWoodMaps();

  const colorObj = findColor(key);
  const hex = colorObj?.hex || '#fcfcfc';
  const c = new THREE.Color(hex);

  const isGlatt    = key.endsWith('-gl');
  const isUltiMatt = key.endsWith('-um');
  const roughness  = isUltiMatt ? 0.97 : isGlatt ? 0.20 : 0.74;
  const envInt     = isUltiMatt ? 0.02 : isGlatt ? 0.85 : 0.08;

  [doorMat, frameMat, glFrameMat].forEach(mat => {
    mat.map = null;
    mat.color.copy(c);
    mat.roughness  = roughness;
    mat.metalness  = 0;
    mat.envMapIntensity = envInt;
    mat.needsUpdate = true;
  });
}

// ── Holzdekor setzen — echtes Drutex-Swatch (img/swatches/{key}.webp) ──
function setWood(key) {
  _curWood = key; _curColor = null;
  const p = WOOD_PARAMS[key];
  if (!p) return;

  clearWoodMaps();

  if (key === 'schwarzbraun') {
    [doorMat, frameMat, glFrameMat].forEach(mat => {
      mat.map = null;
      mat.color.set(p.base);
      mat.roughness = 0.88;
      mat.metalness = 0;
      mat.envMapIntensity = 0.04;
      mat.needsUpdate = true;
    });
    return;
  }

  const [rx, ry] = WOOD_REPEAT[key] ?? [1.5, 1];

  texLoader.load('img/swatches/' + key + '.webp', (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.rotation = Math.PI / 2;
    tex.center.set(0.5, 0.5);
    tex.repeat.set(rx, ry);
    tex.needsUpdate = true;

    [doorMat, frameMat, glFrameMat].forEach(mat => {
      mat.map = tex;
      mat.color.set(0xffffff);
      mat.bumpMap = tex;
      mat.bumpScale = 0.025;
      mat.roughness = 0.82;
      mat.metalness = 0;
      mat.envMapIntensity = 0.10;
      mat.needsUpdate = true;
    });
  });
}

// GLASARTEN — 4 Typen wie beim Haustür-Konfigurator
// ══════════════════════════════════════════════
const GLASS_TYPES = [
  { key:'klar',         name:'Klar',         color:0xc8dff0, transmission:0.90, roughness:0.03 },
  { key:'satinato',     name:'Satinato',      color:0xe8eced, transmission:0.18, roughness:0.96 },
  { key:'chinchilla',   name:'Chinchilla',    color:0xffffff, transmission:0.22, roughness:0.88 },
  { key:'master-carre', name:'Master Carré',  color:0xffffff, transmission:0.28, roughness:0.72 },
];

function seededRnd(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function heightToNormal(heightCanvas, strength) {
  const W = heightCanvas.width, H = heightCanvas.height;
  const hData = heightCanvas.getContext('2d').getImageData(0, 0, W, H).data;
  const out = document.createElement('canvas'); out.width = W; out.height = H;
  const nCtx = out.getContext('2d');
  const nImg = nCtx.createImageData(W, H);
  function h(x, y) {
    x = Math.max(0, Math.min(W-1, x)); y = Math.max(0, Math.min(H-1, y));
    return hData[(y * W + x) * 4] / 255.0;
  }
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const dX = (h(x-1,y-1) - h(x+1,y-1)) + 2*(h(x-1,y) - h(x+1,y)) + (h(x-1,y+1) - h(x+1,y+1));
      const dY = (h(x-1,y-1) - h(x-1,y+1)) + 2*(h(x,y-1) - h(x,y+1)) + (h(x+1,y-1) - h(x+1,y+1));
      const nx = dX * strength, ny = dY * strength, nz = 1.0;
      const len = Math.sqrt(nx*nx + ny*ny + nz*nz);
      const i = (y * W + x) * 4;
      nImg.data[i]   = (nx/len * 0.5 + 0.5) * 255;
      nImg.data[i+1] = (ny/len * 0.5 + 0.5) * 255;
      nImg.data[i+2] = (nz/len * 0.5 + 0.5) * 255;
      nImg.data[i+3] = 255;
    }
  }
  nCtx.putImageData(nImg, 0, 0);
  return out;
}

function chinchillaHeight() {
  const W = 512, H = 512;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const rnd = seededRnd(4217);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 300; i++) {
    const x = rnd() * W, y = rnd() * H;
    const r = 18 + rnd() * 28;
    const rx = r * (0.65 + rnd() * 0.7), ry = r * (0.65 + rnd() * 0.7);
    const grad = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
    grad.addColorStop(0,   'rgba(255,255,255,1)');
    grad.addColorStop(0.6, 'rgba(128,128,128,0.5)');
    grad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, rnd() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }
  return cvs;
}

function masterCarreHeight() {
  const W = 256, H = 256;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const STEP = 32, LINE = 8;
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
  for (let pos = 0; pos <= W; pos += STEP) {
    const grad = ctx.createLinearGradient(pos - LINE, 0, pos + LINE, 0);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.5, 'rgba(255,255,255,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad; ctx.fillRect(pos - LINE, 0, LINE*2, H);
  }
  for (let pos = 0; pos <= H; pos += STEP) {
    const grad = ctx.createLinearGradient(0, pos - LINE, 0, pos + LINE);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.5, 'rgba(255,255,255,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad; ctx.fillRect(0, pos - LINE, W, LINE*2);
  }
  return cvs;
}

function buildNormalTex(heightFn, strength, repeatX, repeatY) {
  const tex = new THREE.CanvasTexture(heightToNormal(heightFn(), strength));
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}

function cleanGlassMaps() {
  ['map', 'roughnessMap', 'normalMap'].forEach(k => {
    if (glassMat[k]) { glassMat[k].dispose(); glassMat[k] = null; }
  });
}

function setGlass(key) {
  _curGlass = key;
  const g = GLASS_TYPES.find(t => t.key === key); if (!g) return;

  cleanGlassMaps();

  if (key === 'klar') {
    glassMat.transmission  = 0.94;
    glassMat.roughness     = 0.02;
    glassMat.normalScale?.set(0, 0);
    glassMat.color.set(0xdcecf8);
  } else if (key === 'satinato') {
    glassMat.transmission  = 0.35;
    glassMat.roughness     = 0.96;
    glassMat.color.set(0xe8eeee);
  } else if (key === 'chinchilla') {
    glassMat.transmission  = 0.65;
    glassMat.roughness     = 0.12;
    glassMat.color.set(0xd4e8f0);
    glassMat.normalMap     = buildNormalTex(chinchillaHeight, 4.5, 5, 16);
    glassMat.normalScale   = new THREE.Vector2(1.8, 1.8);
  } else if (key === 'master-carre') {
    glassMat.transmission  = 0.78;
    glassMat.roughness     = 0.06;
    glassMat.color.set(0xd4eaf4);
    glassMat.normalMap     = buildNormalTex(masterCarreHeight, 4.0, 3, 11);
    glassMat.normalScale   = new THREE.Vector2(1.5, 1.5);
  }

  glassMat.needsUpdate = true;
  document.querySelectorAll('.glass-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.key === key)
  );
}

// ── Swatches — echte Drutex-Swatch-Bilder als UI-Buttons ──
function buildSwatches(id, list, onSelect, defaultKey) {
  const el = document.getElementById(id);
  list.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c.key === defaultKey ? ' active' : '');
    if (c.swatchUrl) {
      s.style.backgroundImage = `url(${c.swatchUrl})`;
      s.style.backgroundSize = 'cover';
      s.style.backgroundPosition = 'center';
    } else {
      s.style.background = c.hex || '#888';
    }
    s.innerHTML = `<span class="tooltip">${c.name}</span>`;
    s.onclick = () => {
      document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      onSelect(c);
      document.getElementById('currentLabel').textContent = c.name;
    };
    el.appendChild(s);
  });
}

buildSwatches('whites',     FARBEN.whites,  c => setColor(c.key), 'weiss-fx');
buildSwatches('grays',      FARBEN.grays,   c => setColor(c.key));
buildSwatches('colorGroup', FARBEN.colors,  c => setColor(c.key));
buildSwatches('woods',      FARBEN.woods,   c => setWood(c.key));

// Startzustand: URL-Param ?color= oder Weiß FX
const _urlColor = new URLSearchParams(location.search).get('color');
if (_urlColor) { setColor(_urlColor); }
else { setColor('weiss-fx'); }

// Glasarten-Buttons
(function buildGlassBtns() {
  const el = document.getElementById('glassBtns');
  GLASS_TYPES.forEach(g => {
    const b = document.createElement('button');
    b.className = 'glass-btn' + (g.key === 'klar' ? ' active' : '');
    b.dataset.key = g.key;
    b.textContent = g.name;
    b.onclick = () => setGlass(g.key);
    el.appendChild(b);
  });
})();

// postMessage-Bridge: Konfigurator schickt Farb/Holz/Glas-Änderungen
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || !d.type) return;
  if (d.type === 'setColor') { setColor(d.key); }
  if (d.type === 'setWood')  { setWood(d.key); }
  if (d.type === 'setGlass') { setGlass(d.key); }
});

// ══════════════════════════════════════════════
// RESIZE + RENDER LOOP
// ══════════════════════════════════════════════
function resize() {
  const embed = new URLSearchParams(location.search).has('embed');
  const w = embed ? window.innerWidth  : window.innerWidth  - 290 - 252;
  const h = embed ? window.innerHeight : window.innerHeight - 40;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

if (new URLSearchParams(location.search).has('embed')) {
  document.body.classList.add('embed');
}

(function animate() {
  requestAnimationFrame(animate);
  orb.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
