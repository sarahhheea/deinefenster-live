<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenster 3D — Dreh-Kipp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #e8e8e8; overflow: hidden; }

  body.embed .header    { display: none; }
  body.embed .layout    { height: 100vh; }
  body.embed .ref-panel { display: none; }
  body.embed .controls  { display: none; }
  body.embed #threeCanvas { width: 100% !important; }

  .header {
    background: #1e3a8a; color: white;
    height: 40px; padding: 0 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  .header .model-tag {
    background: rgba(255,255,255,0.18); border-radius: 4px;
    padding: 2px 9px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.5px;
  }

  .layout { display: flex; height: calc(100vh - 40px); }

  .ref-panel {
    width: 290px; min-width: 290px;
    background: #f4f4f4;
    border-right: 1px solid #d8d8d8;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 10px 8px 8px;
    gap: 6px;
  }
  .ref-label {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: #94a3b8;
  }
  .ref-panel img {
    max-height: calc(100vh - 100px);
    max-width: 100%;
    object-fit: contain;
    border-radius: 3px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  }
  .ref-model-name {
    font-size: 10px; font-weight: 700; color: #1e3a8a;
    text-align: center; padding: 3px 0;
    letter-spacing: 0.3px;
  }

  #threeCanvas { flex: 1; display: block; cursor: grab; background: #f5f6f8; }
  #threeCanvas:active { cursor: grabbing; }

  .controls {
    width: 252px; min-width: 252px;
    padding: 10px 10px 20px;
    overflow-y: auto;
    background: white;
    box-shadow: -2px 0 12px rgba(0,0,0,0.07);
  }
  .current-label {
    font-size: 13px; font-weight: 700; color: #1e3a8a;
    text-align: center; padding: 7px 4px 9px;
    border-bottom: 1px solid #e8edf5;
    margin-bottom: 8px;
  }
  .section-title {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.1px;
    color: #94a3b8; margin: 10px 0 5px;
  }
  .section-title:first-of-type { margin-top: 0; }
  .colors { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
  .color-swatch {
    width: 100%; aspect-ratio: 1; border-radius: 4px;
    cursor: pointer; border: 2px solid transparent;
    transition: all 0.1s; position: relative;
  }
  .color-swatch:hover { transform: scale(1.18); z-index: 1; }
  .color-swatch.active {
    border-color: #1e3a8a;
    box-shadow: 0 0 0 2px #1e3a8a;
  }
  .tooltip {
    display: none; position: absolute;
    bottom: 115%; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: white;
    padding: 3px 7px; border-radius: 4px;
    font-size: 10px; white-space: nowrap;
    z-index: 20; pointer-events: none;

  .color-swatch:hover .tooltip { display: block; }

  .glass-btns { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
  .glass-btn {
    flex: 1; min-width: 0;
    padding: 6px 2px; border-radius: 5px;
    border: 2px solid #e0e8f4; background: white;
    cursor: pointer; font-size: 9px; font-weight: 700;
    color: #64748b; text-align: center; line-height: 1.2;
    transition: all 0.1s; letter-spacing: 0.2px;
  }
  .glass-btn.active { border-color: #1e3a8a; color: #1e3a8a; background: #f0f5ff; }
  .glass-btn:hover { border-color: #93a8d4; }
</style>

  <h1>Fenster 3D Konfigurator</h1>
  <select id="modelSelect" style="background:#2a4fa0;color:white;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:3px 8px;font-size:12px;font-weight:600;cursor:pointer;">

<script type="importmap">
{ "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ══════════════════════════════════════════════
// RENDERER
// ══════════════════════════════════════════════
const canvasEl = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);  // Solider Hintergrund — fix für Glass-Transmission

const camera = new THREE.OrthographicCamera(-0.75, 0.75, 0.75, -0.75, 0.1, 50);
camera.position.set(0, 0.60, 5.5);

const orb = new OrbitControls(camera, canvasEl);
orb.target.set(0, 0.60, 0);
orb.enablePan = false;
orb.maxPolarAngle = Math.PI * 0.52;
orb.minPolarAngle = Math.PI * 0.48;
orb.minAzimuthAngle = -0.10;
orb.maxAzimuthAngle =  0.10;
orb.update();

// ══════════════════════════════════════════════
// ENVIRONMENT — hell für Griff-Reflexionen
// ══════════════════════════════════════════════
const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileEquirectangularShader();
const envSc = new THREE.Scene();
envSc.add(new THREE.AmbientLight(0xffffff, 5.0));
const eL1 = new THREE.DirectionalLight(0xffffff, 4.0);
eL1.position.set(0, 0, 5); envSc.add(eL1);
const eL2 = new THREE.DirectionalLight(0xffffff, 3.0);
eL2.position.set(-1, 1, 4); envSc.add(eL2);
const eL3 = new THREE.DirectionalLight(0xffffff, 2.0);
eL3.position.set(1, -1, 4); envSc.add(eL3);
const envTex = pmremGen.fromScene(envSc, 0.04).texture;
scene.environment = envTex;

// Ambient: niedrig damit weiße Rahmen Schatten haben und vom Hintergrund abheben
scene.add(new THREE.AmbientLight(0xffffff, 0.55));

// Key-Licht von oben-links — klassische Produktfoto-Beleuchtung, erzeugt Rahmenschatten
const keyLight = new THREE.DirectionalLight(0xffffff, 1.9);
keyLight.position.set(-3, 5, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 1; keyLight.shadow.camera.far = 15;
keyLight.shadow.camera.left = -1.5; keyLight.shadow.camera.right = 1.5;
keyLight.shadow.camera.top = 2.0; keyLight.shadow.camera.bottom = -0.5;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

// Fill-Licht rechts — beleuchtet rechten Außenrand des Blendrahmens
const fillRight = new THREE.DirectionalLight(0xffffff, 0.50);
fillRight.position.set(4, 0.6, 5);
scene.add(fillRight);

// Fill-Licht unten — beleuchtet unteren Außenrand des Blendrahmens
const fillBottom = new THREE.DirectionalLight(0xffffff, 0.40);
fillBottom.position.set(0, -4, 5);
scene.add(fillBottom);

// Backlight hinter dem Fenster — simuliert Tageslicht durch Glas
const backLight = new THREE.DirectionalLight(0xffffff, 5.0);
backLight.position.set(0, 0.6, -5);
scene.add(backLight);

// Spotlight auf Griff — brushedMat braucht weniger Intensität als Hochglanz
const chromeLight = new THREE.SpotLight(0xffffff, 5.0, 10, Math.PI / 5, 0.35);
chromeLight.position.set(0.6, 1.2, 5);
chromeLight.target.position.set(0.36, 0.60, 0.12);
scene.add(chromeLight); scene.add(chromeLight.target);

// ══════════════════════════════════════════════
// MATERIALIEN
// ══════════════════════════════════════════════
const texLoader = new THREE.TextureLoader();

// doorMat = Flügelrahmen-Fläche, frameMat = Blendrahmen-Streifen, glFrameMat = Glasleiste
// Alle drei bekommen dieselbe Farbe/Holztextur (Fenster ist einheitlich)
const doorMat    = new THREE.MeshStandardMaterial({ color: 0xfafafa, roughness: 0.72, metalness: 0 });
const frameMat   = new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: 0.76, metalness: 0 });
const glFrameMat = new THREE.MeshStandardMaterial({ color: 0xfafafa, roughness: 0.72, metalness: 0 });
const chromeMat  = new THREE.MeshStandardMaterial({ color: 0xb8bec2, roughness: 0.22, metalness: 0.95, envMapIntensity: 4.0 });
const brushedMat = new THREE.MeshStandardMaterial({ color: 0xb2b8bc, roughness: 0.30, metalness: 0.82, envMapIntensity: 2.0 });
const glassMat   = new THREE.MeshPhysicalMaterial({
  color: 0xffffff, metalness: 0, roughness: 0.0,
  transmission: 0.05, thickness: 0.018, ior: 1.5, transparent: true,
  reflectivity: 0.08,
  depthWrite: false,  // blockiert sonst glassBacking dahinter
});

// ══════════════════════════════════════════════
// FENSTERDIMENSIONEN — 1-Flügel 900×1200mm
// Maßstab: 1 unit = 1 m
// ══════════════════════════════════════════════
const WW = 0.900;   // Fensterbreite
const WH = 1.200;   // Fensterhöhe
const WD = 0.068;   // Profiltiefe

// Blendrahmen: sichtbare Breite ~45mm, 2 Stufen
const z1w = 0.048, z1d = 0.020;                              // Stufe 1 — breiter Hauptstreifen
const z2off = z1w + 0.004, z2w = 0.007, z2d = 0.010;       // Stufe 2 — Falz-Absatz

// Flügelrahmen + Glasfeld
const OVL  = 0.014;              // Überschlag: Sash überlappt Blendrahmen
const SX0  = z1w - OVL;         // = 0.034 — Sash-Startpunkt X
const SY0  = z1w - OVL;         // = 0.034 — Sash-Startpunkt Y
const FW   = 0.062;              // Flügelrahmen-Profilbreite (jede Seite)
const GX   = SX0 + FW;          // Glasfeld-Beginn X
const GY   = SY0 + FW;          // Glasfeld-Beginn Y
const GW   = WW - 2 * GX;       // Glasfeld-Breite
const GH   = WH - 2 * GY;       // Glasfeld-Höhe

// Handle-Position (Innenansicht: rechts, Mitte)
const HX_local = WW - SX0 - FW / 2;  // Mitte rechtes Stilo
const HY_local = WH * 0.50;          // Mitte Höhe

const windowGroup = new THREE.Group();
let glassObjects = [];
let _curColor = 'weiss-fx';
let _curWood  = null;
let _curGlass = 'klar';

// ── Hilfsfunktion: Rechteck-Streifen vor dem Fenster ──
function strip(x, y, w, h, d, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat || frameMat);
  m.position.set(x + w / 2, y + h / 2, WD + d / 2);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

// ══════════════════════════════════════════════
// buildWindow — Fenstergeometrie aufbauen
// ══════════════════════════════════════════════
function buildWindow() {
  while (windowGroup.children.length > 0) {
    const c = windowGroup.children[0];
    if (c.geometry) c.geometry.dispose();
    windowGroup.remove(c);
  }
  glassObjects = [];

  // ────────────────────────────────────────────
  // DIMENSIONEN
  // Blendrahmen-Vorderfläche: breit (0.078m) und wenig tief (flacher Look)
  // ────────────────────────────────────────────
  const BR_W = 0.078;   // sichtbare Blendrahmen-Breite (jeden Seite)
  const BR_D = WD;      // volle Profiltiefe
  const BR_FACE = 0.014; // Stufe die nach vorne steht (flacher Look)

  // Flügelrahmen
  const OVL  = 0.020;           // Überschlag (Flügel überlappt Blendrahmen)
  const SX0f = BR_W - OVL;      // Flügel-Start X = 0.058
  const SY0f = BR_W - OVL;      // Flügel-Start Y = 0.058
  const FWf  = 0.065;           // Flügelrahmen Profilbreite
  const GXf  = SX0f + FWf;      // Glasfeld-Beginn X = 0.123
  const GYf  = SY0f + FWf;      // Glasfeld-Beginn Y = 0.123
  const GWf  = WW - 2 * GXf;    // Glasfeld-Breite
  const GHf  = WH - 2 * GYf;    // Glasfeld-Höhe

  // Z-Ebenen
  // sashZ muss VOR der Blendrahmen-Vorderkante liegen (BR_D + BR_FACE = 0.082)
  const sashZ = BR_D + BR_FACE + 0.015;   // Flügelrahmen sitzt 15mm vor Blendrahmen (erzeugt sichtbaren Schattensprung)

  // Griff-Position: rechtes Stilo, leicht unterhalb Mitte
  const HX = WW - SX0f - FWf * 0.55;
  const HY = WH * 0.490;

  // ────────────────────────────────────────────
  // 1. WEISSE BACKING-PLANE (simuliert Tageslicht)
  //    Liegt auf Sash-Vorderfläche — garantiert sichtbar
  // ────────────────────────────────────────────
  const glassBacking = new THREE.Mesh(
    new THREE.PlaneGeometry(GWf, GHf),
    new THREE.MeshBasicMaterial({ color: 0xffffff, toneMapped: false })
  );
  glassBacking.position.set(GXf + GWf / 2, GYf + GHf / 2, sashZ + 0.001);
  glassBacking.renderOrder = 1;
  windowGroup.add(glassBacking);

  // ────────────────────────────────────────────
  // 2. BLENDRAHMEN — 4 Streifen (volle Tiefe)
  // ────────────────────────────────────────────
  const blendFn = (x, y, w, h) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, BR_D), frameMat);
    m.position.set(x + w/2, y + h/2, BR_D / 2);
    m.castShadow = true;
    m.receiveShadow = true;
    return m;
  };
  windowGroup.add(blendFn(0,          WH - BR_W, WW,             BR_W));  // oben
  windowGroup.add(blendFn(0,          0,          WW,             BR_W));  // unten
  windowGroup.add(blendFn(0,          BR_W,       BR_W, WH - 2*BR_W));    // links
  windowGroup.add(blendFn(WW - BR_W,  BR_W,       BR_W, WH - 2*BR_W));   // rechts

  // Blendrahmen-Vorderkante (flache Aufkantung — gibt Schatteneffekt)
  const bfFace = (x, y, w, h) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, BR_FACE), frameMat);
    m.position.set(x + w/2, y + h/2, BR_D + BR_FACE / 2);
    m.castShadow = true;
    m.receiveShadow = true;
    return m;
  };
  windowGroup.add(bfFace(0,          WH - BR_W, WW,             BR_W));
  windowGroup.add(bfFace(0,          0,          WW,             BR_W));
  windowGroup.add(bfFace(0,          BR_W,       BR_W, WH - 2*BR_W));
  windowGroup.add(bfFace(WW - BR_W,  BR_W,       BR_W, WH - 2*BR_W));

  // ────────────────────────────────────────────
  // 3. FLÜGELRAHMEN (Sash) — ExtrudeGeometry mit Glasloch
  // ────────────────────────────────────────────
  {
    const s = new THREE.Shape();
    s.moveTo(SX0f,       SY0f);
    s.lineTo(WW - SX0f,  SY0f);
    s.lineTo(WW - SX0f,  WH - SY0f);
    s.lineTo(SX0f,       WH - SY0f);
    s.closePath();

    const hole = new THREE.Path();
    hole.moveTo(GXf,       GYf);
    hole.lineTo(GXf + GWf, GYf);
    hole.lineTo(GXf + GWf, GYf + GHf);
    hole.lineTo(GXf,       GYf + GHf);
    hole.closePath();
    s.holes.push(hole);

    const sashDepth = 0.055;
    const body = new THREE.Mesh(
      new THREE.ExtrudeGeometry(s, {
        depth: sashDepth,
        bevelEnabled: true,
        bevelThickness: 0.003,
        bevelSize: 0.002,
        bevelSegments: 2
      }),
      [doorMat, frameMat]
    );
    body.position.z = sashZ - sashDepth;
    body.castShadow = true;
    body.receiveShadow = true;
    windowGroup.add(body);
  }

  // ────────────────────────────────────────────
  // 4. SCHWARZE GUMMIDICHTUNG um Glasscheibe
  //    Prominente schwarze Streifen ~10mm breit
  //    Sitzen auf der Vorderfläche des Flügelrahmens
  // ────────────────────────────────────────────
  const sealMat = new THREE.MeshStandardMaterial({
    color: 0x111111, roughness: 0.95, metalness: 0
  });
  const SW = 0.012;  // Dichtungsbreite — 12mm (prominent schwarz wie im Referenzbild)
  const SD = 0.008;  // Dichtungstiefe (leicht erhaben)
  const seZ = sashZ + 0.001;

  // Dichtung oben (sitzt direkt am Glasrand)
  const dichtFn = (x, y, w, h) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, SD), sealMat);
    m.position.set(x + w/2, y + h/2, seZ);
    m.castShadow = true;
    return m;
  };
  windowGroup.add(dichtFn(GXf,           GYf + GHf,      GWf,           SW)); // oben
  windowGroup.add(dichtFn(GXf,           GYf - SW,       GWf,           SW)); // unten
  windowGroup.add(dichtFn(GXf - SW,      GYf,            SW,            GHf)); // links
  windowGroup.add(dichtFn(GXf + GWf,     GYf,            SW,            GHf)); // rechts

  // Glas: nur MeshBasicMaterial-Backing (glassBacking oben, Section 1)
  glassObjects.push(glassBacking);

  // ────────────────────────────────────────────
  // 6. BÜGELGRIFF — D-Form, gebürstetes Edelstahl
  //    Gemessen im Referenzbild: 120mm hoch, 40mm Ausladung
  // ────────────────────────────────────────────
  const HZ      = sashZ + 0.003;
  const hHalfH  = 0.060;   // ±60mm → 120mm Gesamthöhe
  const hReach  = 0.042;   // 42mm Ausladung nach links
  const hFwd    = 0.030;   // 30mm zum Betrachter
  const hRad    = 0.0090;  // 9mm Rohrradius — gut sichtbar

  // Parametrischer D-Bogen (26 Punkte, halbe Ellipse)
  const arcPts = [];
  for (let i = 0; i <= 26; i++) {
    const t = (i / 26) * Math.PI;
    arcPts.push(new THREE.Vector3(
      HX - hReach * Math.sin(t),
      HY + hHalfH * Math.cos(t),
      HZ + hFwd   * Math.sin(t)
    ));
  }
  const bowMesh = new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(arcPts), 48, hRad, 14, false),
    brushedMat
  );
  bowMesh.castShadow = true;
  windowGroup.add(bowMesh);

  // Montage-Escutcheons (runde Scheiben oben + unten)
  [HY + hHalfH, HY - hHalfH].forEach(ey => {
    const esc = new THREE.Mesh(
      new THREE.CylinderGeometry(0.015, 0.015, 0.006, 20),
      brushedMat
    );
    esc.rotation.x = Math.PI / 2;
    esc.position.set(HX, ey, HZ + 0.004);
    esc.castShadow = true;
    windowGroup.add(esc);
  });

  // ────────────────────────────────────────────
  // 7. SCHARNIERE — links, 2 flache Rechteckplatten
  //    Oben = Scherenlager (~85%), Unten = Ecklager (~12%)
  // ────────────────────────────────────────────
  const hingeX = SX0f + 0.008;  // 8mm innerhalb der Sash-Außenkante

  [
    { hy: WH * 0.12, hw: 0.034, hh: 0.034 },  // Ecklager
    { hy: WH * 0.85, hw: 0.034, hh: 0.046 },  // Scherenlager (höher)
  ].forEach(({ hy, hw, hh }) => {
    const plate = new THREE.Mesh(
      new THREE.BoxGeometry(hw, hh, 0.007),
      brushedMat
    );
    plate.position.set(hingeX, hy, sashZ + 0.004);
    plate.castShadow = true;
    windowGroup.add(plate);

    // 2 Schraubenköpfe
    [-hh * 0.28, hh * 0.28].forEach(dy => {
      const sc = new THREE.Mesh(
        new THREE.CylinderGeometry(0.003, 0.003, 0.003, 8),
        brushedMat
      );
      sc.rotation.x = Math.PI / 2;
      sc.position.set(hingeX, hy + dy, sashZ + 0.009);
      windowGroup.add(sc);
    });
  });
}

buildWindow();
windowGroup.position.set(-WW / 2, 0, 0);
scene.add(windowGroup);


// ══════════════════════════════════════════════
// FARBEN — alle 41 echten Drutex-Dekore
// Identisch mit Haustür-System
// ══════════════════════════════════════════════
const CDN = 'https://www.drutex.de/media/webp/80/';
const FARBEN = {
  whites: [
    { key:'weiss-fx',      name:'Weiß FX',            hex:'#fcfcfc', swatchUrl:CDN+'L21lZGlhL191cGxvYWQva29sb3J5L29rbGVpbnkvYmlhbHktZnguanBn.webp' },

// ── Holztextur-Maps aus allen drei Frame-Materialien entfernen ──
function clearWoodMaps() {
  [doorMat, frameMat, glFrameMat].forEach(mat => {
    ['map', 'bumpMap', 'roughnessMap'].forEach(k => {
      if (mat[k]) { mat[k].dispose(); mat[k] = null; }
    });
  });
}

function findColor(key) {
  const all = [...FARBEN.whites, ...FARBEN.grays, ...FARBEN.colors];
  return all.find(c => c.key === key);
}

// ── Farbe setzen (Unifarbe — Holztextur entfernen) ──
function setColor(key) {
  _curColor = key; _curWood = null;
  clearWoodMaps();

  const colorObj = findColor(key);
  const hex = colorObj?.hex || '#fcfcfc';
  const c = new THREE.Color(hex);

  const isGlatt    = key.endsWith('-gl');
  const isUltiMatt = key.endsWith('-um');
  const roughness  = isUltiMatt ? 0.97 : isGlatt ? 0.20 : 0.74;
  const envInt     = isUltiMatt ? 0.02 : isGlatt ? 0.85 : 0.08;

  [doorMat, frameMat, glFrameMat].forEach(mat => {
    mat.map = null;
    mat.color.copy(c);
    mat.roughness  = roughness;
    mat.metalness  = 0;
    mat.envMapIntensity = envInt;
    mat.needsUpdate = true;
  });
}

// ── Holzdekor setzen — echtes Drutex-Swatch (img/swatches/{key}.webp) ──
function setWood(key) {
  _curWood = key; _curColor = null;
  const p = WOOD_PARAMS[key];
  if (!p) return;

  clearWoodMaps();

  if (key === 'schwarzbraun') {
    [doorMat, frameMat, glFrameMat].forEach(mat => {
      mat.map = null;
      mat.color.set(p.base);
      mat.roughness = 0.88;
      mat.metalness = 0;
      mat.envMapIntensity = 0.04;
      mat.needsUpdate = true;
    });
    return;
  }

  const [rx, ry] = WOOD_REPEAT[key] ?? [1.5, 1];

  texLoader.load('img/swatches/' + key + '.webp', (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.rotation = Math.PI / 2;
    tex.center.set(0.5, 0.5);
    tex.repeat.set(rx, ry);
    tex.needsUpdate = true;

    [doorMat, frameMat, glFrameMat].forEach(mat => {
      mat.map = tex;
      mat.color.set(0xffffff);
      mat.bumpMap = tex;
      mat.bumpScale = 0.025;
      mat.roughness = 0.82;
      mat.metalness = 0;
      mat.envMapIntensity = 0.10;
      mat.needsUpdate = true;
    });
  });
}

const GLASS_TYPES = [
  { key:'klar',         name:'Klar',         color:0xc8dff0, transmission:0.90, roughness:0.03 },
  { key:'satinato',     name:'Satinato',      color:0xe8eced, transmission:0.18, roughness:0.96 },
  { key:'chinchilla',   name:'Chinchilla',    color:0xffffff, transmission:0.22, roughness:0.88 },
  { key:'master-carre', name:'Master Carré',  color:0xffffff, transmission:0.28, roughness:0.72 },
];

function seededRnd(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function heightToNormal(heightCanvas, strength) {
  const W = heightCanvas.width, H = heightCanvas.height;
  const hData = heightCanvas.getContext('2d').getImageData(0, 0, W, H).data;
  const out = document.createElement('canvas'); out.width = W; out.height = H;
  const nCtx = out.getContext('2d');
  const nImg = nCtx.createImageData(W, H);
  function h(x, y) {
    x = Math.max(0, Math.min(W-1, x)); y = Math.max(0, Math.min(H-1, y));
    return hData[(y * W + x) * 4] / 255.0;
  }
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const dX = (h(x-1,y-1) - h(x+1,y-1)) + 2*(h(x-1,y) - h(x+1,y)) + (h(x-1,y+1) - h(x+1,y+1));
      const dY = (h(x-1,y-1) - h(x-1,y+1)) + 2*(h(x,y-1) - h(x,y+1)) + (h(x+1,y-1) - h(x+1,y+1));
      const nx = dX * strength, ny = dY * strength, nz = 1.0;
      const len = Math.sqrt(nx*nx + ny*ny + nz*nz);
      const i = (y * W + x) * 4;
      nImg.data[i]   = (nx/len * 0.5 + 0.5) * 255;
      nImg.data[i+1] = (ny/len * 0.5 + 0.5) * 255;
      nImg.data[i+2] = (nz/len * 0.5 + 0.5) * 255;
      nImg.data[i+3] = 255;
    }
  }
  nCtx.putImageData(nImg, 0, 0);
  return out;
}

function chinchillaHeight() {
  const W = 512, H = 512;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const rnd = seededRnd(4217);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 300; i++) {
    const x = rnd() * W, y = rnd() * H;
    const r = 18 + rnd() * 28;
    const rx = r * (0.65 + rnd() * 0.7), ry = r * (0.65 + rnd() * 0.7);
    const grad = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
    grad.addColorStop(0,   'rgba(255,255,255,1)');
    grad.addColorStop(0.6, 'rgba(128,128,128,0.5)');
    grad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, rnd() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }
  return cvs;
}

function masterCarreHeight() {
  const W = 256, H = 256;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const STEP = 32, LINE = 8;
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
  for (let pos = 0; pos <= W; pos += STEP) {
    const grad = ctx.createLinearGradient(pos - LINE, 0, pos + LINE, 0);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.5, 'rgba(255,255,255,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad; ctx.fillRect(pos - LINE, 0, LINE*2, H);
  }
  for (let pos = 0; pos <= H; pos += STEP) {
    const grad = ctx.createLinearGradient(0, pos - LINE, 0, pos + LINE);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.5, 'rgba(255,255,255,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad; ctx.fillRect(0, pos - LINE, W, LINE*2);
  }
  return cvs;
}

function buildNormalTex(heightFn, strength, repeatX, repeatY) {
  const tex = new THREE.CanvasTexture(heightToNormal(heightFn(), strength));
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}

function cleanGlassMaps() {
  ['map', 'roughnessMap', 'normalMap'].forEach(k => {
    if (glassMat[k]) { glassMat[k].dispose(); glassMat[k] = null; }
  });
}

function setGlass(key) {
  _curGlass = key;
  const g = GLASS_TYPES.find(t => t.key === key); if (!g) return;

  cleanGlassMaps();

  if (key === 'klar') {
    glassMat.transmission  = 0.05;
    glassMat.roughness     = 0.0;
    glassMat.normalScale?.set(0, 0);
    glassMat.color.set(0xffffff);
  } else if (key === 'satinato') {
    glassMat.transmission  = 0.35;
    glassMat.roughness     = 0.96;
    glassMat.color.set(0xe8eeee);
  } else if (key === 'chinchilla') {
    glassMat.transmission  = 0.65;
    glassMat.roughness     = 0.12;
    glassMat.color.set(0xd4e8f0);
    glassMat.normalMap     = buildNormalTex(chinchillaHeight, 4.5, 5, 16);
    glassMat.normalScale   = new THREE.Vector2(1.8, 1.8);
  } else if (key === 'master-carre') {
    glassMat.transmission  = 0.78;
    glassMat.roughness     = 0.06;
    glassMat.color.set(0xd4eaf4);
    glassMat.normalMap     = buildNormalTex(masterCarreHeight, 4.0, 3, 11);
    glassMat.normalScale   = new THREE.Vector2(1.5, 1.5);
  }

  glassMat.needsUpdate = true;
  document.querySelectorAll('.glass-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.key === key)
  );
}

// ── Swatches — echte Drutex-Swatch-Bilder als UI-Buttons ──
function buildSwatches(id, list, onSelect, defaultKey) {
  const el = document.getElementById(id);
  list.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c.key === defaultKey ? ' active' : '');
    if (c.swatchUrl) {
      s.style.backgroundImage = `url(${c.swatchUrl})`;
      s.style.backgroundSize = 'cover';
      s.style.backgroundPosition = 'center';
    } else {
      s.style.background = c.hex || '#888';
    }
    s.innerHTML = `<span class="tooltip">${c.name}</span>`;
    s.onclick = () => {
      document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      onSelect(c);
      document.getElementById('currentLabel').textContent = c.name;
    };
    el.appendChild(s);
  });
}

    b.className = 'glass-btn' + (g.key === 'klar' ? ' active' : '');
    b.dataset.key = g.key;
    b.textContent = g.name;
    b.onclick = () => setGlass(g.key);
    el.appendChild(b);
  });
})();

// postMessage-Bridge: Konfigurator schickt Farb/Holz/Glas-Änderungen
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || !d.type) return;
  if (d.type === 'setColor') { setColor(d.key); }
  if (d.type === 'setWood')  { setWood(d.key); }
  if (d.type === 'setGlass') { setGlass(d.key); }
});

// ══════════════════════════════════════════════
// RESIZE + RENDER LOOP
// ══════════════════════════════════════════════
function resize() {
  const embed = new URLSearchParams(location.search).has('embed');
  const w = embed ? window.innerWidth  : window.innerWidth  - 290 - 252;
  const h = embed ? window.innerHeight : window.innerHeight - 40;
  renderer.setSize(w, h);
  const aspect = w / h;
  const vh = 0.75;
  camera.left   = -vh * aspect;
  camera.right  =  vh * aspect;
  camera.top    =  vh;
  camera.bottom = -vh;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

if (new URLSearchParams(location.search).has('embed')) {
  document.body.classList.add('embed');
}

(function animate() {
  requestAnimationFrame(animate);
  orb.update();
  renderer.render(scene, camera);
})();
</script>
<script src="js/chatbot.js" defer></script>
</body>
</html>
