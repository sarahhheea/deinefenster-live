const camera = new THREE.PerspectiveCamera(16, 1, 0.1, 60);

// ══════════════════════════════════════════════
// ENVIRONMENT
// ══════════════════════════════════════════════
const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileEquirectangularShader();
// Neutrales Szenen-Env aus Licht (für Rahmen/Glas — unverändert, keine Farb-Regression)
const envSc = new THREE.Scene();
envSc.add(new THREE.AmbientLight(0xffffff, 4.0));
const eL1 = new THREE.DirectionalLight(0xffffff, 4.0);
eL1.position.set(1, 2, 3); envSc.add(eL1);
const eL2 = new THREE.DirectionalLight(0xffffff, 3.0);
eL2.position.set(-2, 1, 3); envSc.add(eL2);
scene.environment = pmremGen.fromScene(envSc, 0.04).texture;

// Kontrastreiche STUDIO-Umgebung (Gradient + Softbox-Band) — NUR für den Griff (eigene envMap).
// Gibt Metall/Lack echte Reflex-Verläufe → kein „Knete"-Look, ohne Rahmen/Glas zu verändern.
function _makeStudioEnvTex(){
  const c = document.createElement('canvas'); c.width = 1024; c.height = 512;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0.00, '#dfe4ea');
  grad.addColorStop(0.34, '#c6cdd5');
  grad.addColorStop(0.52, '#a7afb9');
  grad.addColorStop(0.68, '#878f99');
  grad.addColorStop(1.00, '#5c636b');
  g.fillStyle = grad; g.fillRect(0, 0, 1024, 512);
  // helle Softbox-Bänder (Reflex-Streifen auf gekrümmten Metallflächen) — lokal, kein globales Auswaschen
  function band(y0, y1, a){ const b = g.createLinearGradient(0, y0, 0, y1);
    b.addColorStop(0,'rgba(255,255,255,0)'); b.addColorStop(0.5,'rgba(255,255,255,'+a+')'); b.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle = b; g.fillRect(0, y0, 1024, y1 - y0); }
  band(70, 140, 0.92);
  band(205, 245, 0.35);
  const t = new THREE.CanvasTexture(c);
  t.mapping = THREE.EquirectangularReflectionMapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const _handleEnv = pmremGen.fromEquirectangular(_makeStudioEnvTex()).texture;

// Ambient — gerade genug damit Außen-/Seitenflächen sichtbar, aber Schatten erhalten
scene.add(new THREE.AmbientLight(0xffffff, 0.48));  // Realismus-Pass: weniger Grundhelligkeit → Profil-Relief sichtbar

// Key-Licht maximal stark → starke Schatten an Profilkanten = max. 3D-Tiefe
const keyLight = new THREE.DirectionalLight(0xffffff, 3.5);
keyLight.position.set(-2, 4, 6);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(4096, 4096);   // hochauflösende Schatten
keyLight.shadow.camera.near = 1; keyLight.shadow.camera.far = 22;
keyLight.shadow.camera.left = -2.8; keyLight.shadow.camera.right = 2.8;
keyLight.shadow.camera.top = 2.6; keyLight.shadow.camera.bottom = -2.6;
keyLight.shadow.bias = -0.001;
keyLight.shadow.radius = 5;   // weiche, aber sichtbare Schlagschatten → Tiefe (Fenster-Niveau)
scene.add(keyLight);

// Fill von links — hebt Schatten leicht auf
const fillLight = new THREE.DirectionalLight(0xffffff, 0.45);
fillLight.position.set(-3, 1, 3); scene.add(fillLight);

// Frontlicht leicht von oben — Front-Fläche aufhellen ohne Blob
const frontLight = new THREE.DirectionalLight(0xffffff, 0.35);
frontLight.position.set(0, 3, 10); scene.add(frontLight);

// Spotlight für Stoßgriff-Highlight (HST: Bügel in Bildmitte nach Centering)
const handleSpot = new THREE.SpotLight(0xffffff, 0.0, 10, Math.PI / 9, 0.16);
handleSpot.position.set(0.5, 0.8, 6.5);
handleSpot.target.position.set(-0.1, 0.0, 0.20);   // Begegnungskante (Griff sitzt nahe Mitte)
scene.add(handleSpot); scene.add(handleSpot.target);

// Rim-/Backlight — hellt Rückseite und Seitenflächen auf
const rimLight = new THREE.DirectionalLight(0xffffff, 0.75);
rimLight.position.set(0, 3, -5);
scene.add(rimLight);

// Side-Light von rechts — Seitenflächen klar erhellen
const sideLight = new THREE.DirectionalLight(0xffffff, 0.55);
sideLight.position.set(5, 1, 0);
scene.add(sideLight);

// Soft-Light von unten-rechts — füllt dunkle Schattenseiten
const bottomFill = new THREE.DirectionalLight(0xfff5e8, 0.30);
bottomFill.position.set(3, -2, 4);
scene.add(bottomFill);

// Hinge-Highlight von links — Scharnier-Walzen klarer sichtbar
const hingeSpot = new THREE.SpotLight(0xffffff, 2.5, 8, Math.PI / 10, 0.20);
hingeSpot.position.set(-2.0, 0.0, 4.5);
hingeSpot.target.position.set(-0.48, 0.00, 0.09);
scene.add(hingeSpot); scene.add(hingeSpot.target);

// Bodenschatten entfernt — Referenzbild zeigt reinen weißen Hintergrund ohne Schatten

// ══════════════════════════════════════════════
// MATERIALIEN
// ══════════════════════════════════════════════
const texLoader = new THREE.TextureLoader();
const frameMat  = new THREE.MeshStandardMaterial({ color: 0xfcfcfc, roughness: 0.68, metalness: 0.0 });
const sashMat   = new THREE.MeshStandardMaterial({ color: 0xfcfcfc, roughness: 0.68, metalness: 0.0 });
const grooveMat = new THREE.MeshStandardMaterial({ color: 0x252829, roughness: 0.70 });
const sealMat   = new THREE.MeshStandardMaterial({ color: 0x1a1c1e, roughness: 0.78 });
// Subtile Nut-Linie — nur Tiefenwirkung, kein schwarzer Strich
const subtleNutMat = new THREE.MeshStandardMaterial({ color: 0xdcdcdc, roughness: 0.65 });
const spacerMat = new THREE.MeshStandardMaterial({ color: 0x22262a, roughness: 0.55, metalness: 0.45 });
const handleMat = new THREE.MeshStandardMaterial({ color: 0xd8dde0, roughness: 0.18, metalness: 0.92, envMapIntensity: 2.5 });
const hingeMat  = new THREE.MeshStandardMaterial({ color: 0xbabfc2, roughness: 0.55, metalness: 0.05 });
// Alu-Schiene unten — eloxiertes Aluminium, deutliches Profil mit Laufschienen
const schieneMat = new THREE.MeshStandardMaterial({ color: 0xc4c8cd, roughness: 0.38, metalness: 0.70, envMapIntensity: 1.6 });
// HST-Griff (Aluminium-Profil, eckig) — Drutex IGLO-HS Standard: Weiß/Braun/Silber wählbar
// Default: Weiß (Kunde-Konfigurator-Default 'weiss-std')
// MeshPhysicalMaterial mit Klarlack-Schicht (clearcoat) → echte lackierte/polierte Hardware-Oberfläche statt mattem „Knete"-Look
const hstGriffMat = new THREE.MeshPhysicalMaterial({ color: 0xa9afb6, roughness: 0.33, metalness: 0.55, envMapIntensity: 1.2, clearcoat: 0.7, clearcoatRoughness: 0.14 });
hstGriffMat.envMap = _handleEnv;   // eigene kontrastreiche Studio-Reflexion nur für den Griff
// Alte chromeMat bleibt als Fallback für andere Metallteile (Schlüsselzylinder etc.)
const chromeMat   = new THREE.MeshStandardMaterial({ color: 0xc4c8cc, roughness: 0.28, metalness: 0.85, envMapIntensity: 2.0 });
// Glas: helles, leicht BLAUES Isolierglas mit vertikalem Himmel-Verlauf (Canvas-Map).
// Wirkt wie echte Glasreflexion: oben heller/kühler, unten etwas tiefer-blau + dezente
// diagonale Reflexstreifen. Niedrige Roughness + envMap → realistischer Glanz, nicht spiegelnd.
// Glas 1:1 wie die anderen Produkte (fenster-3d / balkontuer-3d): sauberes, gleichmäßiges
// blaugraues Isolierglas OHNE Himmel-Gradient-Map — Reflexe kommen aus dem Szenen-Env.
const glassMat  = new THREE.MeshStandardMaterial({
  color: 0xe6edf1, metalness: 0.06, roughness: 0.05, envMapIntensity: 2.4,
  transparent: true, opacity: 0.86,
});

// ── Canvas-Gradient für Isolierglas-Reflexion ──────────
// Vertikaler Himmel-Verlauf (oben hell → unten kühler/dunkler) + 2 weiche diagonale Glanzstreifen.
function buildGlassGradientTex() {
  const W = 256, H = 512;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  // Vertikaler Himmel-Verlauf (deutlicher blau als zuvor)
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0.00, '#e6f1f9');   // oben: heller Himmel
  g.addColorStop(0.28, '#cfe5f3');
  g.addColorStop(0.60, '#b6d6ec');   // Mitte: klares Hellblau
  g.addColorStop(1.00, '#94bcdc');   // unten: kühler/tiefer Himmel
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // Dezente diagonale Reflexstreifen (weiches Streiflicht) — heller Hauptstreif oben
  ctx.globalCompositeOperation = 'lighter';
  [[-0.05, 0.22, 0.22], [0.40, 0.74, 0.09]].forEach(([cx, cy, alpha]) => {
    ctx.save();
    ctx.translate(cx * W, cy * H);
    ctx.rotate(-0.62);
    const sg = ctx.createLinearGradient(-W*0.5, 0, W*0.5, 0);
    sg.addColorStop(0.00, 'rgba(255,255,255,0)');
    sg.addColorStop(0.50, 'rgba(255,255,255,' + alpha + ')');
    sg.addColorStop(1.00, 'rgba(255,255,255,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(-W*0.6, -H*0.7, W*1.2, H*1.4);
    ctx.restore();
  });
  ctx.globalCompositeOperation = 'source-over';
  const tex = new THREE.CanvasTexture(cvs);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.minFilter = THREE.LinearFilter;
  return tex;
}
const _glassGradientTex = buildGlassGradientTex();

// ══════════════════════════════════════════════
// HST-KONSTANTEN — Drutex IGLO-HS (Hebe-Schiebetür)
// 1 unit = 1 m · 2400 × 2100 × 176 mm · 2-spurige Alu-Schiene 40mm
// 2 Flügel: links Festflügel, rechts Schiebeflügel (verschiebt sich nach links beim Öffnen)
// ══════════════════════════════════════════════
// ── System-abhängige Proportionen & Schwelle ──
// HS/HST: sehr breit + raumhoch + flache Alu-Bodenschiene (fast schwellenlos).
// PSK:    kompakter (schmaler + niedriger) + sichtbar erhöhte Schwelle (~50mm).
const FW   = IS_PSK ? 1.900 : 2.400;   // Außenbreite gesamt — PSK kompakter
const FH   = IS_PSK ? 1.700 : 2.100;   // Außenhöhe gesamt — PSK weniger raumhoch
const FD   = 0.176;   // Rahmentiefe — beide brauchen 2 Spuren hintereinander

const FRT  = 0.072;   // Blendrahmen oben/seitlich
// Schwelle unten: HS = flache Alu-Schiene 40mm; PSK = erhöhte Schwelle ~50mm (deutlicher Block)
const SCH_H = IS_PSK ? 0.050 : 0.040;
const SOVL = 0.020;   // Falzüberdeckung
const FST  = 0.078;   // Flügel-Profilbreite (Sash etwas breiter als Fenster)

// Z-Versatz der beiden Spuren (Fest hinten, Schiebe vorne)
const TRACK_BACK_Z  = FD * 0.30;       // hintere Schiene (Festflügel)
const TRACK_FRONT_Z = FD * 0.68;       // vordere Schiene (Schiebeflügel)
const SASH_DEPTH    = 0.060;            // Flügel-Tiefe (Glas + Profil)

// Flügel-Breite — jeder Flügel knapp halbe Breite, leichte Überlappung in Mitte
const HALF_W = FW / 2;                                  // 1.200
const PANEL_OVERLAP = 0.060;                            // 60mm Überlappung
const PANEL_W = HALF_W + PANEL_OVERLAP / 2 - (FRT - SOVL);  // 1.178

// Flügel-Höhe — zwischen Top-Profil und Alu-Schiene
const yT_in = FRT - SOVL;            // 0.052
const SH = FH - SCH_H - yT_in;       // 2.008

// Y-Origin Flügel
const y0 = SCH_H;                    // 0.040
// X-Position Linker (Fest) und Rechter (Schiebe) Flügel
const X_FEST  = FRT - SOVL;                              // 0.052
const X_SLIDE = FW - (FRT - SOVL) - PANEL_W;             // ≈ 1.170

// Abstandhalter (Spacer bar) sichtbare Breite
const SBW = 0.012;

// Glasmaße pro Flügel
const GW = PANEL_W - 2 * FST - 2 * SBW;
const GH = SH - 2 * FST - 2 * SBW;

const winGroup    = new THREE.Group();
const festGroup   = new THREE.Group();   // Festflügel (links, statisch)
const slideGroup  = new THREE.Group();   // Schiebeflügel (rechts, animiert)

winGroup.add(slideGroup);

let glassObjects   = [];
let handleObjects  = [];   // Hebel/Rosette/Achse — Click-Targets fürs Öffnen
let _curColor = 'anthrazitgrau';
let _curWood  = null;
let _curGlass = 'klar';
let _hwFrameLum = 0.5;     // zuletzt gesetzte Rahmen-Helligkeit (steuert weiß vs. silber Griff)
let _curGripKey = 'weiss-std';
let sashOpen  = false;
let sashAnim  = 0;         // 0 = zu, 1 = ganz auf

const SLIDE_OPEN_DX = -(PANEL_W * 0.85);   // 85% der Flügel-Breite nach links

// ── Helper: Box zentriert an (cx,cy,cz) ──────────────
function bx(cx, cy, cz, w, h, d, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat || frameMat);
  m.position.set(cx, cy, cz);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

// ── Profilnut (dekorative Rille auf Vorderfläche) ────
function nut(x1, y1, x2, y2, faceZ, mat) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  const isH = Math.abs(dx) > Math.abs(dy);
  const gw = 0.0046, gd = 0.0036;
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(isH ? len : gw, isH ? gw : len, gd),
    mat || grooveMat
  );
  m.position.set((x1 + x2) / 2, (y1 + y2) / 2, faceZ + 0.0012);
  return m;
}

// ROLLLADEN (Aufsatzrollladen) — analog Balkontür: Kasten oben + seitliche
// Führungsschienen + Panzer (Lamellen-Vorhang, ca. zur Hälfte heruntergelassen).
// Wird nur gebaut wenn _rollSpec.roll != 'ohne'. Sitzt VOR der Tür (kamera-seitig),
// damit er in der Vorschau klar sichtbar ist (gleiches Prinzip wie balkontuer-3d).
// ══════════════════════════════════════════════
const ROL_BOX_DEPTH = 0.230;   // Kasten-Tiefe 230 mm
const ROL_SCHIENE_W = 0.035;   // Führungsschiene Breite 35 mm
const ROL_SCHIENE_D = 0.025;   // Führungsschiene Tiefe 25 mm
const ROL_END_H     = 0.045;   // Endschiene Höhe 45 mm
const _rollSpec = {
  roll:       new URLSearchParams(location.search).get('roll')       || 'ohne',
  rollKasten: new URLSearchParams(location.search).get('rollKasten') || '175',
  rollSeite:  new URLSearchParams(location.search).get('rollSeite')  || 'rechts',
  panzerHex:  new URLSearchParams(location.search).get('panzerHex')  || '#8d9094',
};
const _panzerMats = {};
function _panzerMat() {
  let hex = _rollSpec.panzerHex || '#8d9094';
  if (!hex || hex === 'rahmen') return frameMat;
  if (!_panzerMats[hex]) _panzerMats[hex] = new THREE.MeshStandardMaterial({ color: new THREE.Color(hex), roughness: 0.68, metalness: 0.0 });
  return _panzerMats[hex];
}
// Wie viel der Rollladen-Kasten ÜBER FH hinausragt (für Kamera-Fit)
function _rollTopExtra() {
  if (!_rollSpec.roll || _rollSpec.roll === 'ohne') return 0;
  return (parseInt(_rollSpec.rollKasten, 10) || 175) / 1000;
}
function _addRolladen() {
  if (!_rollSpec.roll || _rollSpec.roll === 'ohne') return;
  const baseY   = SCH_H;                       // Unterkante = Schwelle
  const kastenH = (parseInt(_rollSpec.rollKasten, 10) || 175) / 1000;
  const kastenY = FH + kastenH / 2;
  const kastenZ = FD / 2 + 0.115;
  const kastenD = ROL_BOX_DEPTH;
  const fzc     = FD / 2;
  const _panzMat = _panzerMat();

  // Kasten (Rahmenfarbe) + feine Profilnuten an der Front
  winGroup.add(bx(FW / 2, kastenY, kastenZ, FW + 2 * ROL_SCHIENE_W, kastenH, kastenD, frameMat));
  const kastenFront = kastenZ + kastenD / 2;
  const kxL = -ROL_SCHIENE_W + 0.012, kxR = FW + ROL_SCHIENE_W - 0.012;
  const kyB = FH + 0.012, kyT = FH + kastenH - 0.012;
  winGroup.add(nut(kxL, kyB, kxR, kyB, kastenFront, subtleNutMat));
  winGroup.add(nut(kxL, kyT, kxR, kyT, kastenFront, subtleNutMat));
  winGroup.add(nut(kxL, kyB, kxL, kyT, kastenFront, subtleNutMat));
  winGroup.add(nut(kxR, kyB, kxR, kyT, kastenFront, subtleNutMat));

  // Seitliche Führungsschienen (Rahmenfarbe)
  const schieneH = FH - baseY;
  const schieneY = baseY + schieneH / 2;
  const schieneZ = fzc + 0.005;
  winGroup.add(bx(-ROL_SCHIENE_W / 2,      schieneY, schieneZ, ROL_SCHIENE_W, schieneH, ROL_SCHIENE_D, frameMat));
  winGroup.add(bx(FW + ROL_SCHIENE_W / 2,  schieneY, schieneZ, ROL_SCHIENE_W, schieneH, ROL_SCHIENE_D, frameMat));

  // Panzer (Lamellen-Vorhang, ca. zur Hälfte herunter) — klar VOR der Tür
  const _pzZ   = FD / 2 + 0.122;          // vor Glas + Griff (Griff-Front ~0.18)
  const _pzW   = FW + 2 * ROL_SCHIENE_W;
  const _pzTop = FH - 0.004;              // direkt unter dem Kasten
  const _pzBot = FH * 0.50;               // bedeckt das obere halbe Türblatt
  const _pzPitch = 0.046;
  const _pzSlatH = 0.037;
  const _pzSlatD = 0.016;
  // dunkles Backing → Fugen wirken dunkel, kein Durchblick aufs Glas
  winGroup.add(bx(FW / 2, (_pzTop + _pzBot) / 2, _pzZ - 0.006, _pzW, _pzTop - _pzBot, 0.006, spacerMat));
  // kräftige Endleiste unten (Panzerfarbe)
  winGroup.add(bx(FW / 2, _pzBot + ROL_END_H / 2, _pzZ, _pzW, ROL_END_H, _pzSlatD + 0.004, _panzMat));
  // Lamellen gestapelt nach oben bis unter den Kasten
  for (let _ly = _pzBot + ROL_END_H + _pzPitch / 2; _ly + _pzSlatH / 2 <= _pzTop; _ly += _pzPitch) {
    winGroup.add(bx(FW / 2, _ly, _pzZ, _pzW, _pzSlatH, _pzSlatD, _panzMat));
  }
}

// ══════════════════════════════════════════════
// buildWindow — Fenstergeometrie aufbauen
// Koordinaten: (0,0) = Blendrahmen unten-links
// Gruppe wird danach um (-FW/2, -FH/2, 0) verschoben
// ══════════════════════════════════════════════
function buildWindow() {
  // Cleanup: alle Gruppen leeren
  [festGroup, slideGroup].forEach(g => {
    while (g.children.length > 0) {
      const c = g.children[0];
      if (c.geometry) c.geometry.dispose();
      g.remove(c);
    }
  });
  while (winGroup.children.length > 0) {
    const c = winGroup.children[0];
    if (c === festGroup || c === slideGroup) { winGroup.remove(c); continue; }
    if (c.geometry) c.geometry.dispose();
    winGroup.remove(c);
  }
  winGroup.add(festGroup);
  winGroup.add(slideGroup);
  festGroup.position.set(0, 0, 0);
  slideGroup.position.set(0, 0, 0);
  glassObjects = [];
  handleObjects = [];

  const fzc = FD / 2;         // Frame z center (Blendrahmen)
  const ffz = FD;              // Frame front face Z

  // ── Blendrahmen — TOP + LEFT + RIGHT (unten ist Alu-Schiene) ──
  const sideH = FH - SCH_H - FRT;
  const sideCy = SCH_H + sideH / 2;
  winGroup.add(bx(FW/2,          FH - FRT/2,    fzc, FW,           FRT,         FD, frameMat));
  winGroup.add(bx(FRT/2,         sideCy,         fzc, FRT,          sideH,       FD, frameMat));
  winGroup.add(bx(FW - FRT/2,    sideCy,         fzc, FRT,          sideH,       FD, frameMat));

  // ── Schwelle unten — system-abhängig ──
  const railZ1 = TRACK_BACK_Z;
  const railZ2 = TRACK_FRONT_Z;
  if (IS_PSK) {
    // PSK: sichtbar ERHÖHTE Schwelle (~50mm) — Kunststoff-Block in Rahmenfarbe (nicht barrierefrei).
    // Optisches Erkennungsmerkmal vs. flacher HS-Schiene.
    winGroup.add(bx(FW/2, SCH_H/2, fzc, FW, SCH_H, FD, frameMat));
    // Abgeschrägte Oberkante als dunklere Tiefenlinie + schmale Alu-Laufnut obendrauf
    winGroup.add(bx(FW/2, SCH_H - 0.003, grooveZSafe(railZ1, railZ2), FW - 0.020, 0.0040, 0.016, sealMat));
    winGroup.add(bx(FW/2, SCH_H + 0.002, railZ2, FW - 0.030, 0.006, 0.012, schieneMat));
    // Vordere Profil-Linie der Schwelle für Tiefenwirkung
    winGroup.add(bx(FW/2, SCH_H * 0.5, ffz - 0.004, FW - 0.020, 0.0016, 0.0016, subtleNutMat));
  } else {
    // HS/HST: flache 2-spurige Alu-Bodenschiene (fast schwellenlos).
    winGroup.add(bx(FW/2, SCH_H/2, fzc, FW, SCH_H, FD, schieneMat));
    const railH = 0.006;     // sichtbare Erhebung
    const railW = 0.018;
    winGroup.add(bx(FW/2, SCH_H + railH/2, railZ1, FW - 0.020, railH, railW, schieneMat));
    winGroup.add(bx(FW/2, SCH_H + railH/2, railZ2, FW - 0.020, railH, railW, schieneMat));
    // Dunkle Rille zwischen den Schienen
    const grooveZ = (railZ1 + railZ2) / 2;
    winGroup.add(bx(FW/2, SCH_H - 0.001, grooveZ, FW - 0.020, 0.0018, 0.014, sealMat));
    // Profil-Linie auf Schiene (vorne) für Tiefenwirkung
    winGroup.add(bx(FW/2, SCH_H - 0.002, ffz - 0.004, FW - 0.020, 0.0014, 0.0014, sealMat));
  }
  function grooveZSafe(a,b){ return (a+b)/2; }

  // Profilnut Blendrahmen — Top + Seiten innen/außen
  const fni = FRT - 0.012;
  winGroup.add(nut(fni, FH - fni, FW - fni, FH - fni, ffz, subtleNutMat));
  winGroup.add(nut(fni, SCH_H, fni, FH - fni, ffz, subtleNutMat));
  winGroup.add(nut(FW - fni, SCH_H, FW - fni, FH - fni, ffz, subtleNutMat));
  const fno = 0.012;
  winGroup.add(nut(fno, FH - fno, FW - fno, FH - fno, ffz, subtleNutMat));
  winGroup.add(nut(fno, SCH_H, fno, FH - fno, ffz, subtleNutMat));
  winGroup.add(nut(FW - fno, SCH_H, FW - fno, FH - fno, ffz, subtleNutMat));

  // ── Pro Flügel: Rahmen + Glas + Spacer ──
  function buildPanel(group, panelX, panelZc, isSliding) {
    const pfz = panelZc;                    // panel z center
    const pfront = panelZc + SASH_DEPTH/2;  // front face

    // 4 Profile (Rahmen des Flügels)
    group.add(bx(panelX + PANEL_W/2,           y0 + FST/2,        pfz, PANEL_W, FST,        SASH_DEPTH, sashMat));
    group.add(bx(panelX + PANEL_W/2,           y0 + SH - FST/2,   pfz, PANEL_W, FST,        SASH_DEPTH, sashMat));
    group.add(bx(panelX + FST/2,               y0 + SH/2,         pfz, FST,     SH - 2*FST, SASH_DEPTH, sashMat));
    group.add(bx(panelX + PANEL_W - FST/2,     y0 + SH/2,         pfz, FST,     SH - 2*FST, SASH_DEPTH, sashMat));

    // Profilnuten (innere Linie)
    const sniL  = panelX + FST * 0.54;
    const sniR  = panelX + PANEL_W - FST * 0.54;
    const sniB  = y0 + FST * 0.54;
    const sniT  = y0 + SH - FST * 0.54;
    group.add(nut(sniL, sniB, sniR, sniB, pfront, subtleNutMat));
    group.add(nut(sniL, sniT, sniR, sniT, pfront, subtleNutMat));
    group.add(nut(sniL, sniB, sniL, sniT, pfront, subtleNutMat));
    group.add(nut(sniR, sniB, sniR, sniT, pfront, subtleNutMat));

    // Glas
    const gcx = panelX + PANEL_W / 2;
    const gcy = y0 + FST + SBW + GH / 2;
    const gm = new THREE.Mesh(new THREE.BoxGeometry(GW, GH, 0.006), glassMat);
    gm.position.set(gcx, gcy, pfz + 0.002);
    gm.castShadow = true;
    group.add(gm);
    glassObjects.push(gm);

    // Spacer
    const sbd = 0.004;
    group.add(bx(gcx, gcy + GH/2 + SBW/2, pfz, GW + SBW * 2, SBW, sbd, spacerMat));
    group.add(bx(gcx, gcy - GH/2 - SBW/2, pfz, GW + SBW * 2, SBW, sbd, spacerMat));
    group.add(bx(gcx - GW/2 - SBW/2, gcy, pfz, SBW, GH, sbd, spacerMat));
    group.add(bx(gcx + GW/2 + SBW/2, gcy, pfz, SBW, GH, sbd, spacerMat));

    return { gcx, gcy, pfront };
  }

  // Festflügel (hintere Spur)
  buildPanel(festGroup,  X_FEST,  TRACK_BACK_Z + SASH_DEPTH/2, false);
  // Schiebeflügel (vordere Spur) — verschiebt sich entlang X beim Öffnen
  const slidePanel = buildPanel(slideGroup, X_SLIDE, TRACK_FRONT_Z + SASH_DEPTH/2, true);

  // ── GRIFF — system-abhängig auf dem SCHIEBEFLÜGEL an der Begegnungskante (mittig), Hüfthöhe ──
  // Begegnungskante = Innenkante des Schiebeflügels (zum Festflügel hin). slide ist rechts → linke Kante.
  const GRIP_CX  = X_SLIDE + FST * 0.55;                    // an der mittleren Begegnungskante
  const DOOR_FZ  = TRACK_FRONT_Z + SASH_DEPTH/2 + 0.001;
  // Standard-Drückerhöhe ~1050mm (gekappt auf Flügelhöhe)
  const HIP_CY   = y0 + Math.min(1.050, SH * 0.45);

  if (IS_PSK) {
    // ── PSK-DREHGRIFF — sieht aus wie ein (etwas größerer) FENSTERGRIFF ──
    // Verifiziert an echten Produktbildern (GU PSK-Drehgriff K-12920 / Siegenia SI-LINE 200):
    // ein gebogener Hoppe-L-Hebel auf einer mittleren, abgerundeten Platte/Rosette (~150mm),
    // Hebel zeigt in Schließstellung nach UNTEN. KEINE Griffmuschel, KEIN langer Zug-Bügel.
    // Hebel-Geometrie 1:1 vom guten Fenstergriff (fenster-3d.html: Tube-Curve + Olive).
    const SHIELD_LEN = 0.105;   // kompakte NEVADA-Rosette; Hebel hängt frei darunter
    const SHIELD_W   = 0.038;   // ~38mm breit
    const SHIELD_Z   = DOOR_FZ + 0.006;
    // deutlich zur Flügelmitte gerückt, damit der Griff frei auf weißem Flügel sitzt (nicht auf der dunklen Kante)
    const SHIELD_CX  = GRIP_CX + 0.062;
    const SHIELD_CY  = HIP_CY;   // Platte mittig auf Drückerhöhe
    // Hebel-Nabe etwa in Plattenmitte (Fenstergriff-typisch), Hebel hängt darunter
    const hubCY = SHIELD_CY + 0.020;

    // 1) Mittlere Platte — abgerundete Kapsel, leicht erhaben
    const shield = new THREE.Mesh(
      new THREE.CapsuleGeometry(SHIELD_W/2, SHIELD_LEN - SHIELD_W, 6, 24),
      hstGriffMat
    );
    shield.scale.set(1.0, 1.0, 0.55);
    shield.position.set(SHIELD_CX, SHIELD_CY, SHIELD_Z + 0.006);
    shield.castShadow = true; shield.userData.isHandle = true;
    slideGroup.add(shield); handleObjects.push(shield);
    // 1a) dünne dunkle Fuge rund um die Platte → hebt weiße Platte vom weißen Flügel ab
    const shieldBack = new THREE.Mesh(
      new THREE.BoxGeometry(SHIELD_W + 0.006, SHIELD_LEN + 0.006, 0.004),
      sealMat
    );
    shieldBack.position.set(SHIELD_CX, SHIELD_CY, SHIELD_Z + 0.002);
    slideGroup.add(shieldBack);
    // 1b) zwei dezente Schraub-Punkte oben/unten an der Platte
    [SHIELD_CY + SHIELD_LEN/2 - 0.018, SHIELD_CY - SHIELD_LEN/2 + 0.018].forEach(sy => {
      const sc = new THREE.Mesh(new THREE.CylinderGeometry(0.0032, 0.0032, 0.004, 16), sealMat);
      sc.rotation.x = Math.PI/2;
      sc.position.set(SHIELD_CX, sy, SHIELD_Z + 0.013);
      slideGroup.add(sc);
    });

    // 2) Rosetten-Nabe (Drücker-Lagerung) — kleine erhabene Scheibe auf der Platte
    const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.014, 24), hstGriffMat);
    hub.rotation.x = Math.PI/2;
    hub.position.set(SHIELD_CX, hubCY, SHIELD_Z + 0.014);
    hub.castShadow = true; hub.userData.isHandle = true;
    slideGroup.add(hub); handleObjects.push(hub);

    // 3) Fenstergriff-Hebel als durchgehender gebogener Tube: aus der Nabe nach vorne,
    //    dann diagonal nach UNTEN+AUSSEN gebogen (Schließstellung, klassischer Hoppe-L).
    const z0 = SHIELD_Z + 0.014;
    const levPts = [
      new THREE.Vector3(SHIELD_CX,          hubCY,          z0 + 0.002),
      new THREE.Vector3(SHIELD_CX,          hubCY,          z0 + 0.020),
      new THREE.Vector3(SHIELD_CX + 0.012,  hubCY - 0.014,  z0 + 0.028),
      new THREE.Vector3(SHIELD_CX + 0.024,  hubCY - 0.048,  z0 + 0.030),
      new THREE.Vector3(SHIELD_CX + 0.026,  hubCY - 0.090,  z0 + 0.030),
      new THREE.Vector3(SHIELD_CX + 0.022,  hubCY - 0.128,  z0 + 0.030),
    ];
    const levCurve = new THREE.CatmullRomCurve3(levPts, false, 'centripetal', 0.5);
    const lSegs = 56, rSegs = 20;
    const levGeo = new THREE.TubeGeometry(levCurve, lSegs, 0.0115, rSegs, false);
    const lp = levGeo.attributes.position;
    for (let i = 0; i <= lSegs; i++) {
      const t = i / lSegs;
      const pt = levCurve.getPointAt(t);
      const sf = 1.0 - 0.16 * Math.pow(t, 1.4);
      for (let j = 0; j <= rSegs; j++) {
        const idx = i * (rSegs + 1) + j;
        lp.setX(idx, pt.x + (lp.getX(idx) - pt.x) * sf);
        lp.setY(idx, pt.y + (lp.getY(idx) - pt.y) * sf);
        lp.setZ(idx, pt.z + (lp.getZ(idx) - pt.z) * sf);
      }
    }
    lp.needsUpdate = true; levGeo.computeVertexNormals();
    const lever = new THREE.Mesh(levGeo, hstGriffMat);
    lever.castShadow = true; lever.userData.isHandle = true;
    slideGroup.add(lever); handleObjects.push(lever);

    // 4) Olive — fließender Halbkugel-Abschluss am Hebel-Ende (unten/außen)
    const olive = new THREE.Mesh(new THREE.SphereGeometry(0.0115 * 0.84, 24, 18), hstGriffMat);
    olive.position.set(SHIELD_CX + 0.022, hubCY - 0.128, z0 + 0.030);
    olive.castShadow = true; olive.userData.isHandle = true;
    slideGroup.add(olive); handleObjects.push(olive);

    // 5) Schließzylinder-Andeutung UNTEN auf der Platte (PSK mit Aussperrsicherung)
    const cylCY = SHIELD_CY - SHIELD_LEN/2 + 0.026;
    const cylRing = new THREE.Mesh(new THREE.CylinderGeometry(0.0078, 0.0078, 0.006, 24), hstGriffMat);
    cylRing.rotation.x = Math.PI/2;
    cylRing.position.set(SHIELD_CX, cylCY, SHIELD_Z + 0.013);
    cylRing.castShadow = true;
    slideGroup.add(cylRing);
    const cylSlot = new THREE.Mesh(new THREE.CylinderGeometry(0.0044, 0.0044, 0.004, 20), sealMat);
    cylSlot.rotation.x = Math.PI/2;
    cylSlot.position.set(SHIELD_CX, cylCY, SHIELD_Z + 0.016);
    slideGroup.add(cylSlot);
  } else {
    // ── SMART-SLIDE Innengriff (flach, eingelassen) — echtes Drutex IGLO-HS Produkt ──
    // Senkrechte flache Platte mit länglicher Griffmulde in der Mitte (Referenz: smart-slide-9016).
    // Kein Hebel: bündige Platte, in der Mitte eine eingelassene Mulde (sichtbare Tiefe).
    const rr = (w, h, r) => {
      const s = new THREE.Shape();
      const x = -w / 2, y = -h / 2;
      s.moveTo(x + r, y);
      s.lineTo(x + w - r, y); s.quadraticCurveTo(x + w, y, x + w, y + r);
      s.lineTo(x + w, y + h - r); s.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      s.lineTo(x + r, y + h); s.quadraticCurveTo(x, y + h, x, y + h - r);
      s.lineTo(x, y + r); s.quadraticCurveTo(x, y, x + r, y);
      return s;
    };
    const SS_W = 0.048, SS_H = 0.212, SS_R = 0.010;   // Platte ~48×212 mm, leicht runde Ecken (rechteckiger)
    const SS_PROUD = 0.009;                            // steht ~9 mm vor dem Flügel
    const M_W = 0.021, M_H = 0.124, M_R = 0.0085;      // Griffmulde ~21×124 mm
    const SS_CX = GRIP_CX + 0.055;                     // auf dem Schiebeflügel, etwas zur Mitte
    const SS_CY = HIP_CY;
    const SS_ZF = DOOR_FZ;                              // Flügel-Vorderfläche

    // 1) Mulden-Boden (dunkler, tief zurückgesetzt) — sorgt für sichtbare Tiefe in der Mulde
    const muldeMat = new THREE.MeshStandardMaterial({ color: 0x80868d, roughness: 0.6, metalness: 0.2, envMap: _handleEnv, envMapIntensity: 0.5 });
    const floorGeo = new THREE.ExtrudeGeometry(rr(M_W - 0.001, M_H - 0.001, M_R), { depth: 0.0025, bevelEnabled: false, curveSegments: 14 });
    floorGeo.translate(SS_CX, SS_CY, SS_ZF + 0.0005);   // Boden tief unten → Mulde wirkt ~6 mm tief
    const muldeFloor = new THREE.Mesh(floorGeo, muldeMat);
    muldeFloor.receiveShadow = true;
    slideGroup.add(muldeFloor);

    // 2) Platte als Rahmen (außen rund, innen Loch = Mulde) → das Loch wirkt eingelassen
    const plateShape = rr(SS_W, SS_H, SS_R);
    plateShape.holes.push(rr(M_W, M_H, M_R));
    const plateGeo = new THREE.ExtrudeGeometry(plateShape, {
      depth: SS_PROUD, bevelEnabled: true, bevelThickness: 0.0015, bevelSize: 0.0015, bevelSegments: 2, curveSegments: 18
    });
    plateGeo.translate(SS_CX, SS_CY, SS_ZF);
    const plate = new THREE.Mesh(plateGeo, hstGriffMat);
    plate.castShadow = true; plate.userData.isHandle = true;
    slideGroup.add(plate); handleObjects.push(plate);

    // 3) dünne dunkle Fuge hinter der Platte → hebt die (weiße) Platte vom Flügel ab
    const ssBack = new THREE.Mesh(new THREE.BoxGeometry(SS_W + 0.005, SS_H + 0.005, 0.003), sealMat);
    ssBack.position.set(SS_CX, SS_CY, SS_ZF - 0.0014);
    slideGroup.add(ssBack);

    // 4) zwei dezente Schraub-Punkte oben/unten auf der Platte
    [SS_CY + SS_H/2 - 0.016, SS_CY - SS_H/2 + 0.016].forEach(sy => {
      const sc = new THREE.Mesh(new THREE.CylinderGeometry(0.0026, 0.0026, 0.004, 16), sealMat);
      sc.rotation.x = Math.PI / 2;
      sc.position.set(SS_CX, sy, SS_ZF + SS_PROUD - 0.001);
      slideGroup.add(sc);
    });
  }

  // ── MUSCHELGRIFF außen (eingelassen, auf Rückseite des Schiebeflügels) ──
  // Drutex-Standard: außen sitzt kein Bügel sondern eine eingelassene Muschel.
  // Wir zeigen Innenansicht — die Muschel ist als dunkler Tiefenakzent sichtbar.
  const muschelW = 0.110;
  const muschelH = 0.045;
  const muschelD = 0.012;
  const muschel = new THREE.Mesh(
    new THREE.BoxGeometry(muschelW, muschelH, muschelD),
    sealMat
  );
  muschel.position.set(GRIP_CX, HIP_CY, TRACK_FRONT_Z - muschelD/2 - 0.001);
  slideGroup.add(muschel);

  // Rollladen (Kasten + Schienen + Panzer) zuletzt, wenn gewählt
  _addRolladen();
}

// ── Farbe anwenden ────────────────────────────────────
function clearWoodMaps() {
  ['map', 'bumpMap', 'roughnessMap'].forEach(k => {
    if (frameMat[k]) { frameMat[k].dispose(); frameMat[k] = null; }
    if (sashMat[k])  { sashMat[k].dispose();  sashMat[k]  = null; }
  });
}

function findColor(key) {
  return [...FARBEN.whites, ...FARBEN.grays, ...FARBEN.colors].find(c => c.key === key);
}

function setColor(key) {
  _curColor = key; _curWood = null;
  clearWoodMaps();

  const colorObj = findColor(key);
  // Hex-Farben sind für Print/Foto kalibriert; Three.js-Studio braucht leicht aufgehellte
  // Werte damit dunkle Farben (Anthrazit) als sichtbares Grau erscheinen, nicht als Schwarz
  const c = new THREE.Color(colorObj?.hex || '#888888');
  const lum = c.r * 0.299 + c.g * 0.587 + c.b * 0.114;
  const boost = lum < 0.12 ? 1.7 : lum < 0.25 ? 1.35 : 1.0;
  c.multiplyScalar(boost);

  frameMat.color.copy(c);
  sashMat.color.copy(c);
  grooveMat.color.copy(c).multiplyScalar(0.50);        // Realismus-Pass: tiefere Profil-Rillen
  subtleNutMat.color.copy(c).multiplyScalar(0.70);     // subtile Tiefenlinie folgt Rahmenfarbe
  sealMat.color.copy(c).multiplyScalar(0.42);          // Falz-Schatten — deutlich dunkler für Tiefe

  const isGlatt    = key.endsWith('-gl');
  const isUltiMatt = key.endsWith('-um');
  // Standard-PVC: dezenter Satin-Glanz (nicht stumpf-matt) — Realismus-Pass.
  const roughness  = isUltiMatt ? 0.97 : isGlatt ? 0.20 : 0.56;
  const envInt     = isUltiMatt ? 0.02 : isGlatt ? 0.85 : 0.22;

  frameMat.roughness = sashMat.roughness = roughness;
  frameMat.metalness = sashMat.metalness = 0;
  frameMat.envMapIntensity = sashMat.envMapIntensity = envInt;
  frameMat.needsUpdate = true;
  sashMat.needsUpdate  = true;

  // Griff + Scharniere folgen Rahmenfarbe (Kunde-Vorgabe 16.05.2026):
  // Bei hellen/weißen Tönen → Kunststoff in Rahmenfarbe (kein Chrom)
  // Bei dunklen Farben + Edelstahl-Optik → silbern wie real
  applyHardwareColor(c.clone(), lum);
  // Griff-Finish neu auswerten (weiß-Kunststoff bei hellem Rahmen vs. echte Farbe)
  if (typeof setHstGriff === 'function') setHstGriff(_curGripKey);

  document.getElementById('currentLabel').textContent = colorObj?.name || key;
}

// Griff/Scharniere an Rahmenfarbe anpassen — bei hellen Tönen DEUTLICH dunkler für Sichtbarkeit
function applyHardwareColor(frameColor, frameLum) {
  // _hwFrameLum merken, damit setHstGriff bei hellem Rahmen weißen Kunststoff statt Silber zeigt
  _hwFrameLum = frameLum;
  if (frameLum >= 0.6) {
    // Sehr helle/weiße Rahmen: Griff/Hardware in WEISSEM Kunststoff (1:1 wie Fenster-Renderer),
    // leicht abgetönt → Schatten + Kantenglanz geben Tiefe, klar sichtbar (nicht silbern).
    handleMat.color.copy(frameColor).multiplyScalar(0.42);
    handleMat.roughness = 0.45;
    handleMat.metalness = 0.0;
    handleMat.envMapIntensity = 0.15;
    hingeMat.color.copy(frameColor).multiplyScalar(0.40);
    hingeMat.roughness = 0.45;
    hingeMat.metalness = 0.0;
    hingeMat.envMapIntensity = 0.12;
  } else if (frameLum >= 0.35) {
    // Mittel-helle Rahmen: Aluminium-Optik mit mittlerem Kontrast
    handleMat.color.setHex(0xb0b6bd);
    handleMat.roughness = 0.22;
    handleMat.metalness = 0.85;
    handleMat.envMapIntensity = 2.0;
    hingeMat.color.setHex(0xa8aeb4);
    hingeMat.roughness = 0.50;
    hingeMat.metalness = 0.10;
    hingeMat.envMapIntensity = 1.5;
  } else {
    // Dunkle Rahmen: Standard Chrom-Silber
    handleMat.color.setHex(0xd8dde0);
    handleMat.roughness = 0.18;
    handleMat.metalness = 0.92;
    handleMat.envMapIntensity = 2.5;
    hingeMat.color.setHex(0xbabfc2);
    hingeMat.roughness = 0.55;
    hingeMat.metalness = 0.05;
  }
  handleMat.needsUpdate = true;
  hingeMat.needsUpdate = true;
  // HST/PSK-Griff (hstGriffMat) an Rahmenhelligkeit koppeln: heller Rahmen → weiß-grauer Kunststoff
  if (frameLum >= 0.6) {
    // Echte HS/PSK-Griffe sind ALUMINIUM (kein mattes Plastik): gebürstetes Silber mit Glanz
    // → wirkt wie echte Hardware + hebt sich klar vom weißen Flügel ab.
    hstGriffMat.color.setHex(0xa9afb6);
    hstGriffMat.roughness = 0.34;
    hstGriffMat.metalness = 0.55;
    hstGriffMat.envMapIntensity = 1.2;
    hstGriffMat.needsUpdate = true;
  }
}

function setWood(key) {
  _curWood = key; _curColor = null;
  const p = WOOD_PARAMS[key];
  if (!p) return;

  clearWoodMaps();

  // Bei Holzdekoren immer Chrom-Hardware (echtes Drutex-Verhalten)
  handleMat.color.setHex(0xd8dde0);
  handleMat.roughness = 0.18;
  handleMat.metalness = 0.92;
  handleMat.envMapIntensity = 2.5;
  hingeMat.color.setHex(0xbabfc2);
  hingeMat.roughness = 0.55;
  hingeMat.metalness = 0.05;
  handleMat.needsUpdate = true;
  hingeMat.needsUpdate = true;

  if (key === 'schwarzbraun') {
    [frameMat, sashMat].forEach(m => {
      m.map = null;
      m.color.set(p.base);
      m.roughness = 0.88; m.metalness = 0;
      m.envMapIntensity = 0.04;
      m.needsUpdate = true;
    });
    grooveMat.color.set(p.grain); grooveMat.needsUpdate = true;
    return;
  }

  const [rx, ry] = WOOD_REPEAT[key] ?? [1.5, 1];

  texLoader.load('img/swatches/' + key + '.webp', (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.rotation = Math.PI / 2;
    tex.center.set(0.5, 0.5);
    tex.repeat.set(rx, ry);
    tex.needsUpdate = true;

    [frameMat, sashMat].forEach(m => {
      m.map = tex;
      m.color.set(0xffffff);
      m.bumpMap = tex;
      m.bumpScale = 0.025;
      m.roughness = 0.82; m.metalness = 0;
      m.envMapIntensity = 0.10;
      m.needsUpdate = true;
    });
  });

  grooveMat.color.set(p.grain); grooveMat.needsUpdate = true;

  const colorObj = FARBEN.woods.find(w => w.key === key);
  if (colorObj) document.getElementById('currentLabel').textContent = colorObj.name;
}

// ══════════════════════════════════════════════
// GLASARTEN
// ══════════════════════════════════════════════
const GLASS_TYPES = [
  { key:'klar',         name:'Klar'         },
  { key:'satinato',     name:'Satinato'     },
  { key:'chinchilla',   name:'Chinchilla'   },
  { key:'master-carre', name:'Master Carré' },
];

function seededRnd(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function heightToNormal(hCanvas, strength) {
  const W = hCanvas.width, H = hCanvas.height;
  const hData = hCanvas.getContext('2d').getImageData(0, 0, W, H).data;
  const out = document.createElement('canvas'); out.width = W; out.height = H;
  const nCtx = out.getContext('2d');
  const nImg = nCtx.createImageData(W, H);
  function h(x, y) {
    x = Math.max(0, Math.min(W-1, x)); y = Math.max(0, Math.min(H-1, y));
    return hData[(y * W + x) * 4] / 255.0;
  }
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const dX = (h(x-1,y-1)-h(x+1,y-1)) + 2*(h(x-1,y)-h(x+1,y)) + (h(x-1,y+1)-h(x+1,y+1));
      const dY = (h(x-1,y-1)-h(x-1,y+1)) + 2*(h(x,y-1)-h(x,y+1)) + (h(x+1,y-1)-h(x+1,y+1));
      const nx = dX * strength, ny = dY * strength, nz = 1.0;
      const len = Math.sqrt(nx*nx + ny*ny + nz*nz);
      const i = (y * W + x) * 4;
      nImg.data[i]   = (nx/len * 0.5 + 0.5) * 255;
      nImg.data[i+1] = (ny/len * 0.5 + 0.5) * 255;
      nImg.data[i+2] = (nz/len * 0.5 + 0.5) * 255;
      nImg.data[i+3] = 255;
    }
  }
  nCtx.putImageData(nImg, 0, 0);
  return out;
}

function chinchillaHeight() {
  const W = 512, H = 512;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const rnd = seededRnd(4217);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 300; i++) {
    const x = rnd()*W, y = rnd()*H, r = 18 + rnd()*28;
    const rx = r*(0.65+rnd()*0.7), ry = r*(0.65+rnd()*0.7);
    const g = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.6, 'rgba(128,128,128,0.5)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(x, y, rx, ry, rnd()*Math.PI, 0, Math.PI*2); ctx.fill();
  }
  return cvs;
}

function masterCarreHeight() {
  const W = 256, H = 256;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const STEP = 32, LINE = 8;
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
  for (let pos = 0; pos <= W; pos += STEP) {
    const g = ctx.createLinearGradient(pos-LINE, 0, pos+LINE, 0);
    g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(0.5, 'rgba(255,255,255,1)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(pos-LINE, 0, LINE*2, H);
  }
  for (let pos = 0; pos <= H; pos += STEP) {
    const g = ctx.createLinearGradient(0, pos-LINE, 0, pos+LINE);
    g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(0.5, 'rgba(255,255,255,1)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0, pos-LINE, W, LINE*2);
  }
  return cvs;
}

function buildNormalTex(heightFn, strength, repeatX, repeatY) {
  const tex = new THREE.CanvasTexture(heightToNormal(heightFn(), strength));
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}

function cleanGlassMaps() {
  // normalMap/roughnessMap werden pro Glasart neu erzeugt → disposen.
  // map ist die GETEILTE Gradient-Textur (_glassGradientTex) → niemals disposen, nur lösen.
  ['roughnessMap', 'normalMap'].forEach(k => {
    if (glassMat[k]) { glassMat[k].dispose(); glassMat[k] = null; }
  });
  glassMat.map = null;
}

function setGlass(key) {
  _curGlass = key;
  cleanGlassMaps();

  if (key === 'klar') {
    // Klares Isolierglas — 1:1 wie Fenster/Balkontür (gleiche Werte), KEINE Himmel-Map.
    // (Der frühere „Sonnen"-Fleck kam vom handleSpot, der ist jetzt aus → sauberes Glas.)
    glassMat.color.set(0xe6edf1);
    glassMat.map = null;
    glassMat.roughness = 0.05;
    glassMat.metalness = 0.06; glassMat.envMapIntensity = 2.4;
    glassMat.opacity = 0.86;
  } else if (key === 'satinato') {
    // Mattglas: Verlauf bleibt (leicht blau), aber stark gestreut → milchig.
    glassMat.color.set(0xeef4f8);
    glassMat.map = _glassGradientTex;
    glassMat.roughness = 0.90;
    glassMat.metalness = 0; glassMat.envMapIntensity = 0.12;
    glassMat.opacity = 0.94;
  } else if (key === 'chinchilla') {
    glassMat.color.set(0xffffff);
    glassMat.map = _glassGradientTex;
    glassMat.roughness = 0.18;
    glassMat.metalness = 0.05; glassMat.envMapIntensity = 0.55;
    glassMat.opacity = 0.92;
    glassMat.normalMap   = buildNormalTex(chinchillaHeight, 3.0, 5, 16);
    glassMat.normalScale = new THREE.Vector2(1.2, 1.2);
  } else if (key === 'master-carre') {
    glassMat.color.set(0xffffff);
    glassMat.map = _glassGradientTex;
    glassMat.roughness = 0.08;
    glassMat.metalness = 0.08; glassMat.envMapIntensity = 0.7;
    glassMat.opacity = 0.92;
    glassMat.normalMap   = buildNormalTex(masterCarreHeight, 3.0, 3, 11);
    glassMat.normalScale = new THREE.Vector2(1.2, 1.2);
  }

  glassMat.needsUpdate = true;
  document.querySelectorAll('.glass-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.key === key)
  );
}

// ── UI: Farbswatches bauen ────────────────────────────
function buildSwatches(id, list, onSelect, defaultKey) {
  const el = document.getElementById(id);
  list.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c.key === defaultKey ? ' active' : '');
    if (c.swatchUrl) {
      s.style.backgroundImage  = `url(${c.swatchUrl})`;
      s.style.backgroundSize   = 'cover';
      s.style.backgroundPosition = 'center';
    } else {
      s.style.background = c.hex || '#888';
    }
    s.innerHTML = `<span class="tooltip">${c.name}</span>`;
    s.onclick = () => {
      document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      onSelect(c);
    };
    el.appendChild(s);
  });
}

buildSwatches('whites',     FARBEN.whites,  c => setColor(c.key));

// Glasarten-Buttons

// Startzustand aus URL-Params
const _urlColor = new URLSearchParams(location.search).get('color');

else           setColor('anthrazitgrau');

else           setGlass('klar');

// HST-Griff-Initialfarbe aus URL (?grip=weiss-std|braun-std|silber-std|...)
// setHstGriff wird hier nach buildWindow() aufgerufen, daher hier am Ende
const _urlGrip = new URLSearchParams(location.search).get('grip');
setHstGriff(_urlGrip || 'weiss-std');

// RESIZE + RENDER LOOP
// ══════════════════════════════════════════════
// Kamera so setzen, dass die GANZE Tür immer in den Rahmen passt — egal ob die Vorschau
// breit oder hochkant ist. Fit an Breite UND Höhe (je nach Seitenverhältnis) → kein Rauszoomen nötig.
function fitCameraToDoor() {
  const margin = 1.10;                      // etwas Luft rundherum
  const fovV = camera.fov * Math.PI / 180;
  const fovH = 2 * Math.atan(Math.tan(fovV / 2) * camera.aspect);
  const distH = (FH / 2 + _rollTopExtra()) / Math.tan(fovV / 2);   // Höhe inkl. Rollladen-Kasten
  const distW = (FW / 2) / Math.tan(fovH / 2);   // Distanz, damit die Breite passt
  const dist = Math.max(distH, distW) * margin;
  // Blickrichtung beibehalten (falls gedreht), nur den Abstand auf den Fit-Wert setzen
  const dir = camera.position.clone().sub(orb.target);
  if (dir.lengthSq() < 1e-6) dir.set(0, 0.05, 1);
  dir.setLength(dist);
  camera.position.copy(orb.target).add(dir);
  orb.minDistance = dist * 0.82;            // Zoom bleibt nah am Fit → bleibt zentriert
  orb.maxDistance = dist * 1.45;
  camera.updateProjectionMatrix();
  orb.update();
}
function resize() {
  const embed = new URLSearchParams(location.search).has('embed');
  const w = embed ? window.innerWidth  : window.innerWidth  - 252;
  const h = embed ? window.innerHeight : window.innerHeight - 40;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  fitCameraToDoor();
}
window.addEventListener('resize', resize);
resize();

if (new URLSearchParams(location.search).has('embed')) {

}

// HST-Griff-Farbe setzen (Drutex Innen-Finish: weiß/braun/silber)
// Akzeptiert den hstGriff-Key aus konfigurator P.hstGriff (z.B. 'weiss-std', 'braun-si', 'ws-sia')
function setHstGriff(key) {
  if (!key) return;
  _curGripKey = key;
  const k = String(key).toLowerCase();
  const isSilber  = k.startsWith('silber');
  const isBraun   = k.startsWith('braun');
  const isSchwarz = k.startsWith('schwarz');
  // Bei hellem/weißem Rahmen + weißem Griff: weiß-grauer Kunststoff (Tiefe statt weiß-auf-weiß).
  // Sonst echte Finish-Farbe (Schwarz/Braun/Silber explizit, Weiß default).
  if (isSchwarz) {
    // Schwarzer Smart-Slide (RAL 9005) — matt-dunkler Kunststoff
    hstGriffMat.color.setHex(0x2b2e32);
    hstGriffMat.metalness = 0.30;
    hstGriffMat.roughness = 0.52;
    hstGriffMat.envMapIntensity = 0.55;
  } else if (!isSilber && !isBraun && _hwFrameLum >= 0.6) {
    // Weißer Rahmen + Standard-Griff: gebürstetes ALUMINIUM (echte HS/PSK-Hardware),
    // hebt sich klar vom weißen Flügel ab — kein verwaschenes Plastik.
    hstGriffMat.color.setHex(0xa9afb6);
    hstGriffMat.metalness = 0.55;
    hstGriffMat.roughness = 0.34;
    hstGriffMat.envMapIntensity = 1.2;
  } else if (isBraun) {
    hstGriffMat.color.set('#5c3218');
    hstGriffMat.metalness = 0.0;
    hstGriffMat.roughness = 0.45;
    hstGriffMat.envMapIntensity = 0.4;
  } else {
    // Silber-Finish ODER dunkler Rahmen → gebürstetes Aluminium
    hstGriffMat.color.setHex(0xa9afb6);
    hstGriffMat.metalness = 0.55;
    hstGriffMat.roughness = 0.34;
    hstGriffMat.envMapIntensity = 1.2;
  }
  hstGriffMat.needsUpdate = true;
}

// postMessage-Bridge: Konfigurator schickt Farb/Glas-Änderungen
// Rollladen ändern: Spec mergen → NUR bei echter Änderung Geometrie neu bauen.
// Wichtig: der Konfigurator sendet roll-Params in JEDEM update-Payload mit — ohne
// diesen Dirty-Check würde jede Farb-/Glas-Änderung die ganze Tür (inkl. Griff-Tube) neu bauen.
function setRoll(d) {
  let changed = false;
  if (d.roll       !== undefined && d.roll       !== null && d.roll              !== _rollSpec.roll)       { _rollSpec.roll       = d.roll;              changed = true; }
  if (d.rollKasten !== undefined && d.rollKasten !== null && String(d.rollKasten) !== _rollSpec.rollKasten) { _rollSpec.rollKasten = String(d.rollKasten); changed = true; }
  if (d.rollSeite  !== undefined && d.rollSeite  !== null && d.rollSeite          !== _rollSpec.rollSeite)  { _rollSpec.rollSeite  = d.rollSeite;         changed = true; }
  if (d.panzerHex  !== undefined && d.panzerHex  !== null && d.panzerHex          !== _rollSpec.panzerHex)  { _rollSpec.panzerHex  = d.panzerHex;         changed = true; }
  if (!changed) return;
  buildWindow();
  if (typeof setView === 'function') setView(_currentView);   // Griff-Sichtbarkeit nach Neuaufbau
  if (typeof fitCameraToDoor === 'function') fitCameraToDoor(); // Kasten höher → neu einpassen
}

window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || !d.type) return;
  if (d.type === 'setColor')    setColor(d.key);
  if (d.type === 'setWood')     setWood(d.key);
  if (d.type === 'setGlass')    setGlass(d.key);
  if (d.type === 'setSide')     setSide(d.key);
  if (d.type === 'setHstGriff') setHstGriff(d.key);
  if (d.type === 'toggleOpen')  sashOpen = !sashOpen;
  if (d.type === 'setView')     setView(d.view);
  if (d.type === 'setRoll') setRoll(d);
  if (d.type === 'update') {
    // Rollladen zuerst: ändert die Geometrie → buildWindow() neu, danach Materialien/Griff/Ansicht
    if (d.roll !== undefined || d.rollKasten !== undefined || d.rollSeite !== undefined || d.panzerHex !== undefined) {
      setRoll(d);
    }
    if (d.wood)  setWood(d.wood);
    else         setColor(d.color || 'anthrazitgrau');
    setGlass(d.glass || 'klar');
    if (d.side)     setSide(d.side);
    if (d.hstGriff) setHstGriff(d.hstGriff);
    if (d.view)     setView(d.view);
  }
  // Griff-Sichtbarkeit nach evtl. Neuaufbau erneut anwenden
  if (typeof setView === 'function') setView(_currentView);
});

// Click-to-Open: Klick auf Griff/Hebel toggelt die Öffnung
const raycaster = new THREE.Raycaster();
const ndc       = new THREE.Vector2();
canvasEl.addEventListener('click', (ev) => {
  const rect = canvasEl.getBoundingClientRect();
  ndc.x =  ((ev.clientX - rect.left) / rect.width)  * 2 - 1;
  ndc.y = -((ev.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(handleObjects, false);
  if (hits.length > 0) sashOpen = !sashOpen;
});

// Sanfte Öffnen/Schließen-Animation — HST: Schiebeflügel verschiebt sich entlang X
function updateSashAnimation() {
  const target = sashOpen ? 1 : 0;
  if (Math.abs(sashAnim - target) < 0.001) { sashAnim = target; return; }
  sashAnim += (target - sashAnim) * 0.08;   // ease-out
  // Schiebe-Translation: Schiebeflügel nach links bewegen (vor Festflügel)
  slideGroup.position.x = sashAnim * SLIDE_OPEN_DX;
}

(function animate() {
  requestAnimationFrame(animate);
  orb.update();
  updateSashAnimation();
  renderer.render(scene, camera);
})();

<script>
/* Bridge: dismiss Parent-Hint wenn User 3D wirklich bewegt */
(function(){
  if (window.parent === window) return;
  var dX=0, dY=0, isDown=false, fired=false;
  window.addEventListener('pointerdown', function(e){ isDown=true; fired=false; dX=e.clientX; dY=e.clientY; }, {passive:true,capture:true});
  window.addEventListener('pointermove', function(e){
    if (!isDown || fired) return;
    if (Math.abs(e.clientX-dX) + Math.abs(e.clientY-dY) > 12) {
      try { window.parent.postMessage({type:'3d-rotated'}, '*'); } catch(_){}
      fired = true;
    }
  }, {passive:true,capture:true});
  window.addEventListener('pointerup', function(){ isDown=false; }, {passive:true,capture:true});
  window.addEventListener('wheel', function(){ try{ window.parent.postMessage({type:'3d-rotated'},'*'); }catch(_){}}, {passive:true,once:true,capture:true});
})();
</script>
