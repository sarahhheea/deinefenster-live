<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ══════════════════════════════════════════════

const canvasEl = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
// Im Embed-Modus dunkler Hintergrund (passt zum Konfigurator-Dark-Glass),
// in der Standalone-Sandbox bleibt es hell.
const _isEmbed = new URLSearchParams(location.search).has('embed');
// Kundenwunsch 17.05.2026: exakt gleicher Solid-Blau wie Fenster-3D (#0a1530) statt Verlauf
const _bgLight = new URLSearchParams(location.search).get('bg')==='light';
scene.background = new THREE.Color(_isEmbed ? (_bgLight ? 0xeef3fb : 0x0a1530) : 0xf0f2f5);
if(_bgLight){var _s=document.createElement('style');_s.textContent='html.is-embed body,html body.embed{background:#eef3fb !important}';document.head.appendChild(_s);}

const camera = new THREE.PerspectiveCamera(18, 1, 0.1, 50);
camera.position.set(0, 1.05, 8.5);  // gleicher Abstand wie Fenster-3D (Kundenwunsch 17.05.): proportionaler Atemraum oben/unten/links/rechts

const orb = new OrbitControls(camera, canvasEl);
orb.target.set(0, 1.05, 0);
orb.enablePan = false;
orb.minDistance = 4.0;
orb.maxDistance = 12.0;
orb.maxPolarAngle = Math.PI * 0.54;   // kaum vertikale Drehung
orb.minPolarAngle = Math.PI * 0.46;
orb.minAzimuthAngle = -0.22;           // max ~12° horizontal
orb.maxAzimuthAngle =  0.22;
orb.update();

// ══════════════════════════════════════════════
// ENVIRONMENT — hell für Chrome-Reflexionen
// ══════════════════════════════════════════════
const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileEquirectangularShader();
const envSc = new THREE.Scene();
envSc.add(new THREE.AmbientLight(0xffffff, 4.0));
const eL1 = new THREE.DirectionalLight(0xffffff, 4.0);
eL1.position.set(1, 2, 3); envSc.add(eL1);
const eL2 = new THREE.DirectionalLight(0xffffff, 3.0);
eL2.position.set(-2, 1, 3); envSc.add(eL2);
const envTex = pmremGen.fromScene(envSc, 0.04).texture;
scene.environment = envTex;

// ── Szenen-Beleuchtung ──────────────────────────────
// Nur SO VIEL Ambient dass Anthrazit als dunkelgrau sichtbar ist
scene.add(new THREE.AmbientLight(0xffffff, 0.42));

// Key-Licht von oben-rechts-leicht-vorne (klassische Produktfoto-Beleuchtung)
const key = new THREE.DirectionalLight(0xffffff, 1.6);
key.position.set(2, 4, 5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1; key.shadow.camera.far = 12;
key.shadow.camera.left = -1.5; key.shadow.camera.right = 1.5;
key.shadow.camera.top = 3; key.shadow.camera.bottom = -0.5;
key.shadow.bias = -0.001;
scene.add(key);

// Fill-Licht von links (Schatten aufhellen)
const fill = new THREE.DirectionalLight(0xddeeff, 0.5);
fill.position.set(-3, 2.5, 3); scene.add(fill);

// Sehr schwaches Frontlicht — verhindert pure-black bei Anthrazit
const front = new THREE.DirectionalLight(0xffffff, 0.25);
front.position.set(0, 1, 10); scene.add(front);

// ── SpotLight für Stoßgriff ──────────────────────────
// Zielt genau auf Bar-Mitte in Weltkoordinaten: X=-0.38, Y=1.24, Z=0.11
// Erzeugt das silberne Highlight auf dem Chrome-Stab
const chromeLight = new THREE.SpotLight(0xffffff, 10.0, 12, Math.PI / 8, 0.15);
chromeLight.position.set(-1.6, 2.5, 5);
chromeLight.target.position.set(-0.385, 1.21, 0.10);
scene.add(chromeLight); scene.add(chromeLight.target);

const chromeLight2 = new THREE.SpotLight(0xffffff, 6.0, 10, Math.PI / 7, 0.2);
chromeLight2.position.set(0.4, 1.8, 5);
chromeLight2.target.position.set(-0.385, 1.21, 0.10);
scene.add(chromeLight2); scene.add(chromeLight2.target);

// Boden-Schatten
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(8, 8),
  new THREE.ShadowMaterial({ opacity: 0.10 })
);
gnd.rotation.x = -Math.PI / 2;
gnd.receiveShadow = true;
scene.add(gnd);

// ══════════════════════════════════════════════
// MATERIALIEN
// ══════════════════════════════════════════════
const texLoader = new THREE.TextureLoader();
const doorMat   = new THREE.MeshStandardMaterial({ color: 0x232729, roughness: 0.36, metalness: 0.02 });
const frameMat  = new THREE.MeshStandardMaterial({ color: 0x232729, roughness: 0.36, metalness: 0.02 });
const grooveMat = new THREE.MeshStandardMaterial({ color: 0x181b1d, roughness: 0.68 });
// Chrome/Edelstahl: leicht breiteres Highlight (roughness 0.18) damit Stab als
// SILBER sichtbar ist, nicht als dunkler Spiegel. Metalness 0.92 = Minimalanteil Diffus.
const chromeMat    = new THREE.MeshStandardMaterial({ color: 0xd8dde0, roughness: 0.18, metalness: 0.92, envMapIntensity: 2.5 });
// Bracket-Kopf: heller Silber/Chrome, gut sichtbar vor dunkler Tür
const bracketMat   = new THREE.MeshStandardMaterial({ color: 0xe0e6ea, roughness: 0.22, metalness: 0.65, envMapIntensity: 3.0 });
// Bandscharniere (WALA AXM Drutex-Standard): Aluminium-eloxiert silber, matter als Chrom.
const hingeMat     = new THREE.MeshStandardMaterial({ color: 0xc4c8cc, roughness: 0.40, metalness: 0.60, envMapIntensity: 1.6 });
// Drücker 30A + Langschild: gebürstetes Edelstahl, etwas matter als Stoßgriff-Chrome.
const handleMat    = new THREE.MeshStandardMaterial({ color: 0xd4d8dc, roughness: 0.45, metalness: 0.88, envMapIntensity: 1.8 });
const glFrameMat= new THREE.MeshStandardMaterial({ color: 0xd0d5d8, roughness: 0.22, metalness: 0.70, envMapIntensity: 2.0 });  // Silber/Chrome Edelstahl wie Referenz
const glassMat  = new THREE.MeshPhysicalMaterial({
  color: 0x3a5267, metalness: 0, roughness: 0.03,
  transmission: 0.90, thickness: 0.02, ior: 1.5, transparent: true,
});

// ══════════════════════════════════════════════
// DOOR CONSTANTS — 1:1 vom Referenzfoto
// Maßstab: 1 unit = 1 m · Tür 1000×2100×70 mm
// ══════════════════════════════════════════════
const DW = 1.000;   // Türbreite
const DH = 2.100;   // Türhöhe
const DD = 0.070;   // Türtiefe

const doorGroup  = new THREE.Group();  // schwenkbares Türblatt + Beschlag
const frameGroup = new THREE.Group();  // Zarge (statisch, schwenkt NICHT)

// ── Hilfsfunktion: Rechteck-Strip ──────────────────
function strip(x, y, w, h, d, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat || frameMat);
  m.position.set(x + w/2, y + h/2, DD + d/2);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

// ── Hilfsfunktion: Profilnut ──────────────────────
function nut(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  const isH = Math.abs(dx) > Math.abs(dy);
  const gw = 0.0052, gd = 0.0042;
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(isH ? len : gw, isH ? gw : len, gd),
    grooveMat
  );
  m.position.set((x1 + x2) / 2, (y1 + y2) / 2, DD + 0.0008);
  m.receiveShadow = true;
  return m;
}

// ── Hilfsfunktion: Ovale Schloss-Form ─────────────
function roundedRectShape(w, h, r) {
  const s = new THREE.Shape();
  s.moveTo(-w/2 + r, -h/2);
  s.lineTo( w/2 - r, -h/2);
  s.absarc( w/2 - r, -h/2 + r, r, -Math.PI/2, 0, false);
  s.lineTo( w/2,      h/2 - r);
  s.absarc( w/2 - r,  h/2 - r, r, 0, Math.PI/2, false);
  s.lineTo(-w/2 + r,  h/2);
  s.absarc(-w/2 + r,  h/2 - r, r, Math.PI/2, Math.PI, false);
  s.lineTo(-w/2,     -h/2 + r);
  s.absarc(-w/2 + r, -h/2 + r, r, Math.PI, Math.PI * 1.5, false);
  return s;
}

// Schrumpft eine Kontur um konstante Randbreite d (Meter) — pro Achse, damit hohe Formen nicht verzerren
function insetShape(shape, d) {
  const pts = shape.getPoints(90);
  let minx = Infinity, maxx = -Infinity, miny = Infinity, maxy = -Infinity;
  pts.forEach(p => { minx = Math.min(minx, p.x); maxx = Math.max(maxx, p.x); miny = Math.min(miny, p.y); maxy = Math.max(maxy, p.y); });
  const cx = (minx + maxx) / 2, cy = (miny + maxy) / 2;
  const fx = Math.max(0.1, 1 - 2 * d / (maxx - minx)), fy = Math.max(0.1, 1 - 2 * d / (maxy - miny));
  const s2 = new THREE.Shape();
  pts.forEach((p, i) => { const x = cx + (p.x - cx) * fx, y = cy + (p.y - cy) * fy; i ? s2.lineTo(x, y) : s2.moveTo(x, y); });
  s2.closePath(); return s2;
}

// Echter, GLEICHMÄSSIGER Inward-Offset einer Kontur um Distanz d (konstante Rahmenbreite überall)
function offsetShape(shape, d) {
  let pts = shape.getPoints(120).map(p => ({x: p.x, y: p.y}));
  if (pts.length > 1) { const a = pts[0], b = pts[pts.length - 1]; if (Math.abs(a.x - b.x) < 1e-6 && Math.abs(a.y - b.y) < 1e-6) pts.pop(); }
  const n = pts.length;
  let area = 0; for (let i = 0; i < n; i++) { const a = pts[i], b = pts[(i + 1) % n]; area += a.x * b.y - b.x * a.y; }
  const ccw = area > 0;
  const out = [];
  for (let i = 0; i < n; i++) {
    const prev = pts[(i - 1 + n) % n], cur = pts[i], next = pts[(i + 1) % n];
    let e1x = cur.x - prev.x, e1y = cur.y - prev.y; const l1 = Math.hypot(e1x, e1y) || 1;
    let e2x = next.x - cur.x, e2y = next.y - cur.y; const l2 = Math.hypot(e2x, e2y) || 1;
    let n1x, n1y, n2x, n2y;
    if (ccw) { n1x = -e1y / l1; n1y = e1x / l1; n2x = -e2y / l2; n2y = e2x / l2; }
    else { n1x = e1y / l1; n1y = -e1x / l1; n2x = e2y / l2; n2y = -e2x / l2; }
    let bx = n1x + n2x, by = n1y + n2y; const bl = Math.hypot(bx, by) || 1; bx /= bl; by /= bl;
    const cosang = Math.max(0.4, bx * n1x + by * n1y);
    out.push([cur.x + bx * d / cosang, cur.y + by * d / cosang]);
  }
  const s2 = new THREE.Shape();
  out.forEach((p, i) => i ? s2.lineTo(p[0], p[1]) : s2.moveTo(p[0], p[1]));
  s2.closePath(); return s2;
}

// ══════════════════════════════════════════════
// buildDoor — baut Türgeometrie für gewähltes Modell
// ══════════════════════════════════════════════
function buildDoor(modelKey) {
  // doorGroup (Türblatt + Beschlag) + frameGroup (Zarge) leeren
  [doorGroup, frameGroup].forEach(g => {
    while (g.children.length > 0) {
      const c = g.children[0];
      if (c.geometry) c.geometry.dispose();
      g.remove(c);
    }
  });
  glassObjects = [];

  const model = MODELLE[modelKey] || MODELLE['colorado-inox'];
  const panels = model.panels || [];
  const modelStrips = model.strips || [];
  let customShapes = model.shapeFn ? model.shapeFn(THREE) : [];   // Glasformen mit Inox-Rahmen (Schenkel)
  let inoxShapes   = model.inoxShapeFn ? model.inoxShapeFn(THREE) : []; // solide Inox-Flächen (Band/Schienen/Sichel-Feld)
  let glassInsets  = model.glassInsetFn ? model.glassInsetFn(THREE) : []; // weiße Glas-Fenster AUF dem Inox (kein Rahmen)
  let outlines     = model.outlineFn ? model.outlineFn(THREE) : []; // Inox-UMRISSE (Ring), dunkel innen
  // mirrorX: asymmetrische Motive an der Türmitte (x→1-x) spiegeln, damit sie im Default-View (side=r) zur Katalogvorlage passen
  if (model.mirrorX) {
    const mir = (sh) => { const pts = sh.getPoints(200); const s = new THREE.Shape(); pts.forEach((p,i)=> i ? s.lineTo(1-p.x, p.y) : s.moveTo(1-p.x, p.y)); s.closePath(); return s; };
    customShapes = customShapes.map(mir);
    inoxShapes   = inoxShapes.map(mir);
    glassInsets  = glassInsets.map(mir);
    outlines     = outlines.map(o => ({ shape: mir(o.shape), w: o.w }));
  }

  // ── Zarge (3-stufig) — IN frameGroup, schwenkt NICHT ──
  const z1w = 0.043, z1d = 0.032;
  frameGroup.add(strip(0,             DH - z1w,  DW,           z1w, z1d));
  frameGroup.add(strip(0,             0,         DW,           z1w, z1d));
  frameGroup.add(strip(0,             z1w,       z1w,  DH - 2*z1w, z1d));
  frameGroup.add(strip(DW - z1w,      z1w,       z1w,  DH - 2*z1w, z1d));

  const z2off = z1w + 0.009, z2w = 0.021, z2d = 0.018;
  frameGroup.add(strip(z2off,             DH - z2off - z2w, DW - 2*z2off,            z2w, z2d));
  frameGroup.add(strip(z2off,             z2off,             DW - 2*z2off,            z2w, z2d));
  frameGroup.add(strip(z2off,             z2off + z2w,       z2w, DH - 2*(z2off+z2w), z2d));
  frameGroup.add(strip(DW - z2off - z2w,  z2off + z2w,       z2w, DH - 2*(z2off+z2w), z2d));

  const z3off = z2off + z2w + 0.006, z3w = 0.009, z3d = 0.007;
  frameGroup.add(strip(z3off,             DH - z3off - z3w, DW - 2*z3off,            z3w, z3d));
  frameGroup.add(strip(z3off,             z3off,             DW - 2*z3off,            z3w, z3d));
  frameGroup.add(strip(z3off,             z3off + z3w,       z3w, DH - 2*(z3off+z3w), z3d));
  frameGroup.add(strip(DW - z3off - z3w,  z3off + z3w,       z3w, DH - 2*(z3off+z3w), z3d));

  // ── Türblatt mit Glasausschnitten ──────────────────
  {
    const s = new THREE.Shape();
    s.moveTo(0, 0); s.lineTo(DW, 0); s.lineTo(DW, DH); s.lineTo(0, DH); s.closePath();
    panels.forEach(p => {
      const hole = new THREE.Path();
      hole.moveTo(p.x, p.y);
      hole.lineTo(p.x + p.w, p.y);
      hole.lineTo(p.x + p.w, p.y + p.h);
      hole.lineTo(p.x,       p.y + p.h);
      hole.closePath();
      s.holes.push(hole);
    });
    // Custom-Glasformen als Löcher (Y / Sichel)
    customShapes.forEach(sh => s.holes.push(sh));
    const body = new THREE.Mesh(
      new THREE.ExtrudeGeometry(s, {
        depth: DD,
        bevelEnabled: true, bevelThickness: 0.003, bevelSize: 0.002, bevelSegments: 2
      }),
      [doorMat, frameMat]
    );
    body.castShadow = true; body.receiveShadow = true;
    doorGroup.add(body);
  }

  // ── Motiv-Decal: exaktes Katalog-Motiv (Silber+weißes Glas) als flaches Overlay, Rest transparent ──
  // Pixelgenau aus der Drutex-Vorlage extrahiert → 1:1-Optik; Türfarbe scheint durch die transparenten Stellen.
  if (model.decalTexture) {
    texLoader.load(model.decalTexture, (tex) => {
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8; tex.minFilter = THREE.LinearMipmapLinearFilter;
      const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.05, depthWrite: false });
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(DW, DH), mat);
      plane.position.set(DW / 2, DH / 2, DD + 0.014);
      plane.renderOrder = 5;
      doorGroup.add(plane);
    });
  }

  // ── Profilnut ─────────────────────────────────────
  const NUT = 0.095;
  doorGroup.add(nut(NUT,      NUT,      DW - NUT, NUT));
  doorGroup.add(nut(NUT,      DH - NUT, DW - NUT, DH - NUT));
  doorGroup.add(nut(NUT,      NUT,      NUT,      DH - NUT));
  doorGroup.add(nut(DW - NUT, NUT,      DW - NUT, DH - NUT));

  // ── Glas + Glasrahmen pro Panel ───────────────────
  const GFW = 0.040;  // gemessen: 40-42mm Glasrahmen-Breite im Referenzfoto
  const GFD = DD + 0.010;
  const glBackMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
  panels.forEach(p => {
    // Weißer Hintergrund hinter Glas (simulates interior light)
    const backing = new THREE.Mesh(new THREE.PlaneGeometry(p.w, p.h), glBackMat);
    backing.position.set(p.x + p.w/2, p.y + p.h/2, 0.002);
    doorGroup.add(backing);

    const gm = new THREE.Mesh(
      new THREE.PlaneGeometry(p.w - 0.008, p.h - 0.008),
      glassMat
    );
    gm.position.set(p.x + p.w/2, p.y + p.h/2, DD/2);
    doorGroup.add(gm);
    glassObjects.push(gm);

    const gf = (x, y, w, h) => {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, GFD), glFrameMat);
      m.position.set(x, y, GFD / 2);
      m.castShadow = true; m.receiveShadow = true;
      return m;
    };
    if (!model.noPanelFrame) {
      doorGroup.add(gf(p.x + p.w/2,         p.y + p.h + GFW/2, p.w + GFW*2, GFW));
      doorGroup.add(gf(p.x + p.w/2,         p.y - GFW/2,       p.w + GFW*2, GFW));
      doorGroup.add(gf(p.x - GFW/2,         p.y + p.h/2,       GFW,         p.h));
      doorGroup.add(gf(p.x + p.w + GFW/2,   p.y + p.h/2,       GFW,         p.h));
    }
  });

  // ── Custom-Glasformen (Y / Sichel): Glas + Inox-Rahmenring ──
  // Deko-Glas: weiß-matt (wie flache Zeichnung) wenn model.whiteGlass, sonst normales Glas
  const decoGlass = model.whiteGlass
    ? new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.85, metalness: 0.0, emissive: 0xeef3f7, emissiveIntensity: 0.78 })
    : glassMat;
  // gebürstetes Mittel-Silber für alle Inox-Motive (Rahmen/Schienen/Sichel) — kontrastiert gegen weißes Glas
  const motifSilver = new THREE.MeshStandardMaterial({ color: 0xa6afb6, roughness: 0.42, metalness: 0.58, envMapIntensity: 1.4, side: THREE.DoubleSide });

  // ── customShapes: Glasform mit umlaufendem Inox-Rahmen (z.B. die 2 Schenkel bei Pennsylvania 1) ──
  customShapes.forEach(sh => {
    const inset = offsetShape(sh, 0.026);
    const back = new THREE.Mesh(new THREE.ShapeGeometry(inset), glBackMat);
    back.position.z = 0.004; doorGroup.add(back);
    const glass = new THREE.Mesh(new THREE.ShapeGeometry(inset), decoGlass);
    glass.position.z = DD / 2; doorGroup.add(glass); glassObjects.push(glass);
    const ring = new THREE.Shape();
    sh.getPoints(90).forEach((p, i) => i ? ring.lineTo(p.x, p.y) : ring.moveTo(p.x, p.y)); ring.closePath();
    const h = new THREE.Path();
    inset.getPoints(90).forEach((p, i) => i ? h.lineTo(p.x, p.y) : h.moveTo(p.x, p.y)); h.closePath();
    ring.holes.push(h);
    const frame = new THREE.Mesh(new THREE.ShapeGeometry(ring), motifSilver);
    frame.position.z = DD - 0.003; frame.castShadow = true; doorGroup.add(frame);
  });

  // ── inoxShapes: gefüllte Inox-Flächen auf der Front (Wellen-Schienen, Sichel-Feld) ──
  inoxShapes.forEach(sh => {
    const m = new THREE.Mesh(new THREE.ShapeGeometry(sh, 64), motifSilver);
    m.position.z = DD + 0.006; m.castShadow = true; doorGroup.add(m);
  });

  // ── outlines: nur Inox-UMRISS (Ring), Inneres bleibt dunkel (Türfarbe) — z.B. Dreieck bei Pennsylvania 1 ──
  outlines.forEach(o => {
    const ring = new THREE.Shape();
    o.shape.getPoints(90).forEach((p, i) => i ? ring.lineTo(p.x, p.y) : ring.moveTo(p.x, p.y)); ring.closePath();
    const inner = offsetShape(o.shape, o.w || 0.028);
    const h = new THREE.Path();
    inner.getPoints(90).forEach((p, i) => i ? h.lineTo(p.x, p.y) : h.moveTo(p.x, p.y)); h.closePath();
    ring.holes.push(h);
    const m = new THREE.Mesh(new THREE.ShapeGeometry(ring), motifSilver);
    m.position.z = DD + 0.006; m.castShadow = true; doorGroup.add(m);
  });

  // ── glassInsets: weiße Glas-Fenster AUF dem Inox (kein eigener Rahmen) — Glas-Rechteck Penn 3, Schlitz Penn 1 ──
  glassInsets.forEach(sh => {
    const back = new THREE.Mesh(new THREE.ShapeGeometry(sh), glBackMat);
    back.position.z = DD + 0.0095; doorGroup.add(back);
    const glass = new THREE.Mesh(new THREE.ShapeGeometry(sh), decoGlass);
    glass.position.z = DD + 0.011; doorGroup.add(glass); glassObjects.push(glass);
  });

  // ── Glas-Kacheln auf der Front (weiße Quadrate im Filmstreifen) ──
  // fw/fh = Inox-Rahmenmaße (z.B. volle Kanalbreite zwischen den Schienen); sonst quadratischer Rand
  (model.tiles || []).forEach(t => {
    const fw = t.fw || (t.w + 0.024), fh = t.fh || (t.h + 0.024);
    const fr = new THREE.Mesh(new THREE.PlaneGeometry(fw, fh), motifSilver);
    fr.position.set(t.x + t.w/2, t.y + t.h/2, DD + 0.0080); doorGroup.add(fr);  // Inox-Rahmen/Rung
    const back = new THREE.Mesh(new THREE.PlaneGeometry(t.w, t.h), glBackMat);
    back.position.set(t.x + t.w/2, t.y + t.h/2, DD + 0.0085); doorGroup.add(back);
    const g = new THREE.Mesh(new THREE.PlaneGeometry(t.w - 0.006, t.h - 0.006), decoGlass);
    g.position.set(t.x + t.w/2, t.y + t.h/2, DD + 0.009); doorGroup.add(g); glassObjects.push(g);
  });

  // ── Dunkle Akzent-Linie auf dem Glas (z.B. Sichel bei pennsylvania-3) ──
  if (model.darkLineFn) {
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x0d111a, roughness: 0.5, metalness: 0.2 });
    model.darkLineFn(THREE).forEach(sh0 => {
      let sh = sh0;
      if (model.mirrorX) { const pts = sh0.getPoints(120); sh = new THREE.Shape(); pts.forEach((p,i)=> i ? sh.lineTo(1-p.x,p.y) : sh.moveTo(1-p.x,p.y)); sh.closePath(); }
      const m = new THREE.Mesh(new THREE.ShapeGeometry(sh, 40), darkMat);
      m.position.z = DD + 0.016; m.renderOrder = 6; doorGroup.add(m);  // vor dem Inox/Glas
    });
  }

  // ── Dekorative Edelstahl-Strips ───────────────────
  modelStrips.forEach(st => {
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(st.w, st.h, 0.008),
      chromeMat
    );
    m.position.set(st.x + st.w/2, st.y + st.h/2, DD + 0.004);
    m.castShadow = true;
    doorGroup.add(m);
  });

  if (_curView === 'aussen') buildAussenBeschlag();
  else                       buildInnenBeschlag();

  // Ref-Panel zeigt korrektes Modell-Foto für direkten Vergleich
  setModelRefPhoto(modelKey);
}

// AUSSEN-BESCHLAG: Stoßgriff (Drutex Z1/Q-Serie, eckig) + Schloss-Langschild
function buildAussenBeschlag() {
  const HX    = 0.115;
  const BAR_W = 0.026;
  const BAR_D = 0.040;
  const BAR_B = 0.670;
  const BAR_T = 1.740;
  const BAR_L = BAR_T - BAR_B;

  const bar = new THREE.Mesh(new THREE.BoxGeometry(BAR_W, BAR_L, BAR_D), chromeMat);
  bar.position.set(HX, BAR_B + BAR_L / 2, DD + BAR_D / 2);
  bar.castShadow = true;
  doorGroup.add(bar);

  const AW = 0.016, AH = 0.014, AD = BAR_D + 0.002;
  const AX = HX - BAR_W / 2 - AW / 2;
  [BAR_T - 0.110, BAR_B + 0.110].forEach(bracketY => {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(AW, AH, AD), bracketMat);
    arm.position.set(AX, bracketY, DD + AD / 2);
    arm.castShadow = true;
    doorGroup.add(arm);
  });

  const LX = 0.082, LY = 1.110;
  const lsShape = roundedRectShape(0.024, 0.072, 0.012);
  const lsGeom  = new THREE.ExtrudeGeometry(lsShape, { depth: 0.007, bevelEnabled: false });
  const lsPlate = new THREE.Mesh(lsGeom, chromeMat);
  lsPlate.position.set(LX, LY, DD + 0.020);
  lsPlate.castShadow = true;
  doorGroup.add(lsPlate);

  const keyCyl = new THREE.Mesh(
    new THREE.CylinderGeometry(0.007, 0.007, 0.009, 20), chromeMat
  );
  keyCyl.rotation.x = Math.PI / 2;
  keyCyl.position.set(LX, LY + 0.014, DD + 0.029);
  keyCyl.castShadow = true;

  const darkM = new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.95 });
  const slot = new THREE.Mesh(new THREE.BoxGeometry(0.004, 0.009, 0.002), darkM);
  slot.position.set(LX, LY + 0.014, DD + 0.033);

}

// INNEN-BESCHLAG: Drücker 30A auf Langschild RECHTS + 3 WALA-AXM Bandscharniere LINKS
// DIN-rechts Tür → Bänder LINKS innen, Klinke RECHTS. DIN 18101: Drücker Y=1050mm.
function buildInnenBeschlag() {
  // 3 Bandscharniere LINKS innen (WALA AXM, Alu-eloxiert silber, ø22mm h130mm)
  // X-Position muss AUSSERHALB der 43mm breiten Zarge sein, sonst unsichtbar:
  // Bandscharnier sitzt real auf dem Türblatt-Rand, halb über die Zarge ragend.
  const HINGE_R = 0.011;
  const HINGE_H = 0.130;
  const HINGE_X = 0.055;          // 55mm vom linken Rand (sichtbar VOR der Zarge z1w=43mm)
  const HINGE_Z = DD + 0.022;     // 2mm vor der Türblatt-Front, deutlich hervorstehend
  [0.230, DH * 0.5, DH - 0.230].forEach(yPos => {
    const hinge = new THREE.Mesh(
      new THREE.CylinderGeometry(HINGE_R, HINGE_R, HINGE_H, 20),
      hingeMat
    );
    hinge.position.set(HINGE_X, yPos, HINGE_Z);
    hinge.castShadow = true;
    doorGroup.add(hinge);
  });

  // SCHMALRAHMEN-LANGSCHILD: schmale Stadium-Plate aus 2 Cylindern (Top/Bottom-Caps)
  // + zentrale Box. Eigenes plateMat (matter eloxiert, weniger chrome) fuer Realismus.
  const KX = DW - 0.090;
  const KY_HANDLE = 1.050;
  const KY_LOCK   = 0.962;  // DIN 18252: 88mm PZ-Achsabstand

  const PLATE_W = 0.032;     // 32mm Schmalrahmen-Standard
  const PLATE_R = 0.016;     // Halbkreis-Endenradius = halbe Breite
  const PLATE_TOTAL_LEN = 0.220;  // 220mm Gesamtlaenge
  const PLATE_BOX_LEN   = PLATE_TOTAL_LEN - 2 * PLATE_R;  // zentrale Box-Hoehe
  const PLATE_THK = 0.005;
  const PLATE_Z_BASE = DD + 0.013;
  const plateY = (KY_HANDLE + KY_LOCK) / 2;

  // Mattes Aluminium-Eloxiert-Material fuer Plate (weniger glaenzend als Lever-Chrome)
  const plateMat = new THREE.MeshStandardMaterial({
    color: 0xb4b7ba, roughness: 0.68, metalness: 0.55, envMapIntensity: 0.85
  });

  // 1) Zentrale Box (Hauptkoerper der Plate)
  const plateBox = new THREE.Mesh(
    new THREE.BoxGeometry(PLATE_W, PLATE_BOX_LEN, PLATE_THK),
    plateMat
  );
  plateBox.position.set(KX, plateY, PLATE_Z_BASE + PLATE_THK / 2);
  plateBox.castShadow = true;
  plateBox.receiveShadow = true;
  doorGroup.add(plateBox);

  // 2) Top-Cap (Halbkreis-Ende oben)
  const plateTop = new THREE.Mesh(
    new THREE.CylinderGeometry(PLATE_R, PLATE_R, PLATE_THK, 32),
    plateMat
  );
  plateTop.rotation.x = Math.PI / 2;
  plateTop.position.set(KX, plateY + PLATE_BOX_LEN / 2, PLATE_Z_BASE + PLATE_THK / 2);
  plateTop.castShadow = true;
  plateTop.receiveShadow = true;
  doorGroup.add(plateTop);

  // 3) Bottom-Cap (Halbkreis-Ende unten)
  const plateBottom = new THREE.Mesh(
    new THREE.CylinderGeometry(PLATE_R, PLATE_R, PLATE_THK, 32),
    plateMat
  );
  plateBottom.rotation.x = Math.PI / 2;
  plateBottom.position.set(KX, plateY - PLATE_BOX_LEN / 2, PLATE_Z_BASE + PLATE_THK / 2);
  plateBottom.castShadow = true;
  plateBottom.receiveShadow = true;
  doorGroup.add(plateBottom);

  // 4) Sub-Drueckerrosette: erhabener Disc um den Hebel-Hals (mechanischer Look)
  const SUB_ROSETTE_R = 0.014;   // 28mm, etwas schmaler als Plate
  const SUB_ROSETTE_THK = 0.004; // 4mm proud vor der Plate
  const subRosette = new THREE.Mesh(
    new THREE.CylinderGeometry(SUB_ROSETTE_R, SUB_ROSETTE_R, SUB_ROSETTE_THK, 32),
    plateMat
  );
  subRosette.rotation.x = Math.PI / 2;
  subRosette.position.set(KX, KY_HANDLE, PLATE_Z_BASE + PLATE_THK + SUB_ROSETTE_THK / 2);
  subRosette.castShadow = true;
  doorGroup.add(subRosette);

  // alte ROSETTE_* Variablen-Namen weiter unten unterstuetzen:
  const ROSETTE_Z_BASE = PLATE_Z_BASE;
  const ROSETTE_THK    = PLATE_THK + SUB_ROSETTE_THK;  // Lever-Anschluss-Hoehe

  // PZ-Zylinder-Stirnflaeche (dunkel, in der Mitte der PZ-Rosette)
  const PZ_HOLE_R = 0.0085;
  const pzCylMat = new THREE.MeshStandardMaterial({
    color: 0x101012, roughness: 0.85, metalness: 0.4
  });
  const pzFace = new THREE.Mesh(
    new THREE.CylinderGeometry(PZ_HOLE_R, PZ_HOLE_R, 0.003, 32),
    pzCylMat
  );
  pzFace.rotation.x = Math.PI / 2;
  pzFace.position.set(KX, KY_LOCK, ROSETTE_Z_BASE + ROSETTE_THK + 0.001);
  doorGroup.add(pzFace);

  // SCHLUESSELLOCH auf der PZ-Stirnflaeche (Bowling-Pin: rund + Schlitz)
  const keyMat = new THREE.MeshStandardMaterial({ color: 0xcfd3d6, roughness: 0.5, metalness: 0.7 });
  const KEY_ROUND_R  = 0.0025;
  const KEY_SLOT_W   = 0.0018;
  const KEY_SLOT_H   = 0.004;
  const keyFrontZ    = ROSETTE_Z_BASE + ROSETTE_THK + 0.0025;

  const keyRound = new THREE.Mesh(
    new THREE.CylinderGeometry(KEY_ROUND_R, KEY_ROUND_R, 0.0008, 24),
    keyMat
  );
  keyRound.rotation.x = Math.PI / 2;
  keyRound.position.set(KX, KY_LOCK + 0.0015, keyFrontZ);
  doorGroup.add(keyRound);

  const keySlot = new THREE.Mesh(
    new THREE.BoxGeometry(KEY_SLOT_W, KEY_SLOT_H, 0.0008),
    keyMat
  );
  keySlot.position.set(KX, KY_LOCK + 0.0015 - KEY_ROUND_R - KEY_SLOT_H / 2 + 0.0008, keyFrontZ);
  doorGroup.add(keySlot);

  // KLINKE: Standard Drutex-Innendrücker (Hoppe-Stil L-Form).
  // Charakteristik: kurzer Hals senkrecht zur Tür (Z-Achse), 90°-Bogen,
  // dann gerader Hebel PARALLEL zur Türfläche (Z konstant).
  // Material: gebürstetes Edelstahl (handleMat).
  const LEVER_R         = 0.0095;  // ~19mm Durchmesser, schlanker Hoppe-Stil
  const LEVER_BASE_Z    = ROSETTE_Z_BASE + ROSETTE_THK + 0.0005;  // Hals tritt aus der Drueckerrosette aus
  const LEVER_NECK_LEN  = 0.025;   // Hals 25mm aus der Tür raus
  const LEVER_BAR_LEN   = 0.110;   // Hebel 110mm zur Türmitte
  const LEVER_FRONT_Z   = LEVER_BASE_Z + LEVER_NECK_LEN;

  // SCHWANENHALS-Form: Hals (Z hoch) -> 90°-Bogen -> Hebel mit sanftem Y-Aufwaerts-Bogen
  // (wie im echten Hoppe-Foto: Spitze leicht ueber Hals-Basis)
  const leverPath = new THREE.CatmullRomCurve3([
    new THREE.Vector3(KX,                       KY_HANDLE,             LEVER_BASE_Z),
    new THREE.Vector3(KX,                       KY_HANDLE,             LEVER_BASE_Z + 0.010),
    new THREE.Vector3(KX,                       KY_HANDLE,             LEVER_BASE_Z + 0.018),
    new THREE.Vector3(KX - 0.005,               KY_HANDLE,             LEVER_FRONT_Z - 0.002),
    new THREE.Vector3(KX - 0.018,               KY_HANDLE + 0.001,     LEVER_FRONT_Z),
    new THREE.Vector3(KX - 0.045,               KY_HANDLE + 0.004,     LEVER_FRONT_Z),
    new THREE.Vector3(KX - 0.075,               KY_HANDLE + 0.008,     LEVER_FRONT_Z),
    new THREE.Vector3(KX - 0.095,               KY_HANDLE + 0.010,     LEVER_FRONT_Z),
    new THREE.Vector3(KX - LEVER_BAR_LEN,       KY_HANDLE + 0.009,     LEVER_FRONT_Z),
  ], false, 'catmullrom', 0.5);
  const leverGeom = new THREE.TubeGeometry(leverPath, 96, LEVER_R, 20, false);
  const lever = new THREE.Mesh(leverGeom, handleMat);
  lever.castShadow = true;
  doorGroup.add(lever);

  // Endkappe (gerundet, an der hochgewoelbten Spitze)
  const tipCap = new THREE.Mesh(new THREE.SphereGeometry(LEVER_R, 20, 14), handleMat);
  tipCap.position.set(KX - LEVER_BAR_LEN, KY_HANDLE + 0.009, LEVER_FRONT_Z);
  tipCap.castShadow = true;
  doorGroup.add(tipCap);
}

// Pivot-Group für Tür-Öffnen-Animation (Bandkante = Drehachse).
// doorGroup → doorPivot → scene. Pivot sitzt auf der Bandkante.
// frameGroup (Zarge) wird DIREKT zur scene hinzugefügt — bleibt also stehen,
// auch wenn das Türblatt schwenkt.
const doorPivot = new THREE.Group();
doorPivot.add(doorGroup);
scene.add(doorPivot);
scene.add(frameGroup);
// Zarge bleibt zentriert (symmetrisch — keine Spiegelung nötig)
frameGroup.position.set(-DW/2, 0, 0);

// setSide — DIN-Konvention:
//   'r' = DIN-Rechts: Bänder RECHTS, Griff LINKS (von außen gesehen).
//         Pivot sitzt rechts (+DW/2), doorGroup ist gespiegelt.
//   'l' = DIN-Links:  Bänder LINKS, Griff RECHTS (von außen gesehen).
//         Pivot sitzt links (-DW/2), doorGroup unverändert.
let _curSide = 'r';
function setSide(s) {
  _curSide = (s === 'l') ? 'l' : 'r';
  // Beim Seiten-Wechsel: Tür auf zu setzen
  if (_doorAnim) { cancelAnimationFrame(_doorAnim); _doorAnim = null; }
  doorPivot.rotation.y = 0;
  _doorOpen = false;
  if (_curSide === 'r') {
    doorGroup.scale.x    = -1;
    doorPivot.position.x =  DW / 2;
  } else {
    doorGroup.scale.x    =  1;
    doorPivot.position.x = -DW / 2;
  }
  doorGroup.position.set(0, 0, 0);
  doorPivot.position.y = 0;
  doorPivot.position.z = 0;
}

// ── Tür-Öffnen-Animation ──────────────────────────────────────
// Schwenkt um die Bandkante zum Innenraum (+Z, Richtung Kamera).
// Drehrichtung hängt von der Seite ab: DIN-r → +Y rotation, DIN-l → -Y.
let _doorOpen = false;
let _doorAnim = null;
const DOOR_OPEN_MAG  = Math.PI / 3;   // ~ 60°
const DOOR_ANIM_DUR  = 950;            // ms
function _doorOpenAngle() {
  // Haustueren oeffnen STANDARD nach INNEN (DIN-Standard fuer deutsche Wohnungen).
  // Camera sitzt bei +Z (sowohl Aussen- als auch Innenansicht).
  // - INNEN-View zeigt Innenseite der Tuer: nach innen oeffnen = Griff-Kante schwingt zur
  //   Kamera (+Z) = positive Rotation fuer DIN-r.
  // - AUSSEN-View zeigt Aussenseite: nach innen oeffnen = Griff-Kante schwingt VON der
  //   Kamera weg (-Z) = invertierte Rotation.
  const baseAngle = _curSide === 'r' ? +DOOR_OPEN_MAG : -DOOR_OPEN_MAG;
  return _curView === 'aussen' ? -baseAngle : baseAngle;
}
function setDoorOpen(open) {
  const target = !!open;
  _doorOpen = target;
  const startAngle = doorPivot.rotation.y;
  const endAngle   = target ? _doorOpenAngle() : 0;
  const t0 = performance.now();
  if (_doorAnim) cancelAnimationFrame(_doorAnim);
  function step(now) {
    const t = Math.min(1, (now - t0) / DOOR_ANIM_DUR);
    const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
    doorPivot.rotation.y = startAngle + (endAngle - startAngle) * e;
    if (t < 1) _doorAnim = requestAnimationFrame(step);
    else _doorAnim = null;
  }
  _doorAnim = requestAnimationFrame(step);
}

// ── Farbe setzen (Unifarbe — entfernt Holztextur) ──
function clearWoodMaps() {
  ['map','bumpMap','roughnessMap'].forEach(k => {
    if (doorMat[k]) { doorMat[k].dispose(); doorMat[k] = null; }
  });
  if (frameMat.map) { frameMat.map.dispose(); frameMat.map = null; }
}

// Findet Farbobjekt aus FARBEN anhand key
function findColor(key) {
  const all = [...FARBEN.whites, ...FARBEN.grays, ...FARBEN.colors];
  return all.find(c => c.key === key);
}

function setColor(key) {
  _curColor = key; _curWood = null;
  clearWoodMaps();
  frameMat.map = null;
  doorMat.map = null;

  const colorObj = findColor(key);
  const hex = colorObj?.hex || '#888888';
  const c = new THREE.Color(hex);

  // Exakter Drutex-Farbwert direkt auf Tür + Zarge
  doorMat.color.copy(c);
  frameMat.color.copy(c);
  grooveMat.color.copy(c).multiplyScalar(0.62);

  // Finish-Eigenschaften
  const isGlatt    = key.endsWith('-gl');
  const isUltiMatt = key.endsWith('-um');
  const roughness  = isUltiMatt ? 0.97 : isGlatt ? 0.20 : 0.74;
  const envInt     = isUltiMatt ? 0.02 : isGlatt ? 0.85 : 0.08;

  doorMat.roughness  = frameMat.roughness  = roughness;
  doorMat.metalness  = frameMat.metalness  = 0;
  doorMat.envMapIntensity = envInt;
  doorMat.needsUpdate = true;
  frameMat.needsUpdate = true;
}

// ── Holzdekor setzen — echtes Drutex-Swatch-Foto (img/swatches/{key}.webp) ──
function setWood(key) {
  _curWood = key; _curColor = null;
  const p = WOOD_PARAMS[key];
  if (!p) return;

  clearWoodMaps();

  // Schwarzbraun = fast kein Holzmuster sichtbar → Vollton
  if (key === 'schwarzbraun') {
    doorMat.map = null;
    doorMat.color.set(p.base);
    doorMat.roughness = 0.88;
    doorMat.metalness = 0;
    doorMat.envMapIntensity = 0.04;
    doorMat.needsUpdate = true;
    frameMat.color.set(p.base);
    frameMat.roughness = 0.88;
    frameMat.metalness = 0;
    frameMat.needsUpdate = true;
    grooveMat.color.set(p.grain);
    grooveMat.needsUpdate = true;
    return;
  }

  const [rx, ry] = WOOD_REPEAT[key] ?? [1.5, 1];

  // Echtes Drutex-Holzswatch laden — Maserung läuft vertikal (rotation 90°)
  texLoader.load('img/swatches/' + key + '.webp', (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.rotation = Math.PI / 2;     // Maserung vertikal (hoch statt quer)
    tex.center.set(0.5, 0.5);
    tex.repeat.set(rx, ry);
    tex.needsUpdate = true;

    // Türblatt + Zarge bekommen dieselbe Holztextur
    doorMat.map = tex;
    doorMat.color.set(0xffffff);
    doorMat.bumpMap = tex;
    doorMat.bumpScale = 0.025;
    doorMat.roughness = 0.82;
    doorMat.metalness = 0;
    doorMat.envMapIntensity = 0.10;
    doorMat.needsUpdate = true;

    frameMat.map = tex;
    frameMat.color.set(0xffffff);
    frameMat.roughness = 0.78;
    frameMat.metalness = 0;
    frameMat.needsUpdate = true;
  });

  grooveMat.color.set(p.grain);
  grooveMat.needsUpdate = true;
}

// ══════════════════════════════════════════════
// GLASARTEN — 4 Typen passend zum Konfigurator
//
// roughnessMap-Prinzip: weiß = gestreut/matt (opak), schwarz = klar (transparent)
// Diese Map multipliziert mit glassMat.roughness → erzeugt SICHTBARE Muster
// ══════════════════════════════════════════════
const GLASS_TYPES = [
  { key:'klar',         name:'Klar',         color:0xc8dff0, transmission:0.90, roughness:0.03 },
  { key:'satinato',     name:'Satinato',      color:0xe8eced, transmission:0.18, roughness:0.96 },
  { key:'chinchilla',   name:'Chinchilla',    color:0xffffff, transmission:0.22, roughness:0.88 },
  { key:'master-carre', name:'Master Carré',  color:0xffffff, transmission:0.28, roughness:0.72 },
];

// Deterministischer Pseudozufallsgenerator (Seed → reproduzierbare Muster)
function seededRnd(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

// ── Glas-Normalmap: Heightmap → Normalmap via Sobel ──────────────────────────
// Weiß = Erhöhung (Glaserhebung), Schwarz = flach → erzeugt echten 3D-Schliff
function heightToNormal(heightCanvas, strength) {
  const W = heightCanvas.width, H = heightCanvas.height;
  const hData = heightCanvas.getContext('2d').getImageData(0, 0, W, H).data;
  const out = document.createElement('canvas'); out.width = W; out.height = H;
  const nCtx = out.getContext('2d');
  const nImg = nCtx.createImageData(W, H);
  function h(x, y) {
    x = Math.max(0, Math.min(W-1, x)); y = Math.max(0, Math.min(H-1, y));
    return hData[(y * W + x) * 4] / 255.0;
  }
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const dX = (h(x-1,y-1) - h(x+1,y-1)) + 2*(h(x-1,y) - h(x+1,y)) + (h(x-1,y+1) - h(x+1,y+1));
      const dY = (h(x-1,y-1) - h(x-1,y+1)) + 2*(h(x,y-1) - h(x,y+1)) + (h(x+1,y-1) - h(x+1,y+1));
      const nx = dX * strength, ny = dY * strength, nz = 1.0;
      const len = Math.sqrt(nx*nx + ny*ny + nz*nz);
      const i = (y * W + x) * 4;
      nImg.data[i]   = (nx/len * 0.5 + 0.5) * 255;
      nImg.data[i+1] = (ny/len * 0.5 + 0.5) * 255;
      nImg.data[i+2] = (nz/len * 0.5 + 0.5) * 255;
      nImg.data[i+3] = 255;
    }
  }
  nCtx.putImageData(nImg, 0, 0);
  return out;
}

// Chinchilla Heightmap: unregelmäßige Pebble-Hügel wie echter Chinchilla-Schliff
function chinchillaHeight() {
  const W = 512, H = 512;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const rnd = seededRnd(4217);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 300; i++) {
    const x = rnd() * W, y = rnd() * H;
    const r = 18 + rnd() * 28;
    const rx = r * (0.65 + rnd() * 0.7), ry = r * (0.65 + rnd() * 0.7);
    const grad = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
    grad.addColorStop(0,   'rgba(255,255,255,1)');  // Hügelkuppe = weiß
    grad.addColorStop(0.6, 'rgba(128,128,128,0.5)');
    grad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, rnd() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }
  return cvs;
}

// Master Carré Heightmap: erhabene Gitterlinien wie echter Glas-Raster
function masterCarreHeight() {
  const W = 256, H = 256;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const STEP = 32, LINE = 8;
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);   // Quadratflächen = tief
  // Erhabene Linien mit weichem Rand (wie Glas-Riffel)
  for (let pos = 0; pos <= W; pos += STEP) {
    const grad = ctx.createLinearGradient(pos - LINE, 0, pos + LINE, 0);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.5, 'rgba(255,255,255,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad; ctx.fillRect(pos - LINE, 0, LINE*2, H);
  }
  for (let pos = 0; pos <= H; pos += STEP) {
    const grad = ctx.createLinearGradient(0, pos - LINE, 0, pos + LINE);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.5, 'rgba(255,255,255,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad; ctx.fillRect(0, pos - LINE, W, LINE*2);
  }
  return cvs;
}

function buildNormalTex(heightFn, strength, repeatX, repeatY) {
  const tex = new THREE.CanvasTexture(heightToNormal(heightFn(), strength));
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}

function cleanGlassMaps() {
  ['map','roughnessMap','normalMap'].forEach(k => {
    if (glassMat[k]) { glassMat[k].dispose(); glassMat[k] = null; }
  });
}

function setGlass(key) {
  _curGlass = key;
  const g = GLASS_TYPES.find(t => t.key === key); if (!g) return;

  cleanGlassMaps();

  if (key === 'klar') {
    // Klar: sauber transparent, leicht blaues Glas-Tint
    glassMat.transmission  = 0.92;
    glassMat.roughness     = 0.02;
    glassMat.normalScale?.set(0, 0);
    glassMat.color.set(0xd0e8f4);
  } else if (key === 'satinato') {
    // Satinato: uniform milchig-weiß — hohe Streuung, kein Muster
    glassMat.transmission  = 0.35;
    glassMat.roughness     = 0.96;
    glassMat.color.set(0xe8eeee);
  } else if (key === 'chinchilla') {
    // Chinchilla: Normalmap aus Pebble-Hügeln → echter 3D-Schliff
    glassMat.transmission  = 0.65;
    glassMat.roughness     = 0.12;
    glassMat.color.set(0xd4e8f0);
    glassMat.normalMap     = buildNormalTex(chinchillaHeight, 4.5, 5, 16);
    glassMat.normalScale   = new THREE.Vector2(1.8, 1.8);
  } else if (key === 'master-carre') {
    // Master Carré: subtile Gitterlinien — normalScale niedrig für echten Glaserschliff
    glassMat.transmission  = 0.78;
    glassMat.roughness     = 0.06;
    glassMat.color.set(0xd4eaf4);
    glassMat.normalMap     = buildNormalTex(masterCarreHeight, 4.0, 3, 11);
    glassMat.normalScale   = new THREE.Vector2(1.5, 1.5);
  }

  glassMat.needsUpdate = true;
  document.querySelectorAll('.glass-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.key === key)
  );
}

// ── Swatches — echte Drutex-Swatch-Bilder als UI-Buttons ──
function buildSwatches(id, list, onSelect, defaultKey) {
  const el = document.getElementById(id);
  list.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c.key === defaultKey ? ' active' : '');
    if (c.swatchUrl) {
      // Echtes Drutex-Swatch-Foto: Farbe/Holzmaserung sichtbar im Button
      s.style.backgroundImage = `url(${c.swatchUrl})`;
      s.style.backgroundSize = 'cover';
      s.style.backgroundPosition = 'center';
    } else {
      s.style.background = c.hex || '#888';
    }
    s.innerHTML = `<span class="tooltip">${c.name}</span>`;
    s.onclick = () => {
      document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      onSelect(c);
      document.getElementById('currentLabel').textContent = c.name;
    };
    el.appendChild(s);
  });
}
buildSwatches('whites',     FARBEN.whites,  c => { setColor(c.key); setRefPhoto(c.key); });

// RESIZE + RENDER LOOP
// ══════════════════════════════════════════════
function resize() {
  const embed = new URLSearchParams(location.search).has('embed');
  const isMobile = window.innerWidth < 768;
  let w, h;
  if (embed) {
    w = window.innerWidth;
    h = window.innerHeight;
  } else if (isMobile) {
    w = window.innerWidth;
    h = Math.max(window.innerHeight * 0.55, 320);
  } else {
    w = window.innerWidth - 290 - 252;
    h = window.innerHeight - 40;
  }
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// postMessage-Bridge: Konfigurator schickt Farb/Holz/Glas-Änderungen
// ── 3D-Kamera-Animation (Kundenwunsch 16.05.2026 v3) ──
// Sanftes "Drüberfahren" der Kamera passend zum aktuellen Konfigurations-Schritt
const CAMERA_PRESETS = {
  default: { pos: [0, 1.05, 8.5],  target: [0, 1.05, 0] },
  griff:   { pos: [-0.9, 1.20, 4.8], target: [0.16, 1.20, 0] },  // Stoßgriff links groß
  glas:    { pos: [0, 1.55, 4.2],   target: [0.50, 1.10, 0] },   // Glasfeld zentral
  rahmen:  { pos: [-1.4, 1.05, 6.0], target: [0, 1.05, 0] },     // Zarge/Profil von schräg links
  innen:   { pos: [0.9, 1.20, 4.8],  target: [0.93, 1.05, 0] }   // Innen-Klinke rechts groß
};
let _camAnim = null;
function focusCamera(presetKey) {
  const p = CAMERA_PRESETS[presetKey] || CAMERA_PRESETS.default;
  if (_camAnim) cancelAnimationFrame(_camAnim);
  const start = performance.now();
  const dur = 850;
  const fromPos = camera.position.clone();
  const fromTarget = orb.target.clone();
  const toPos = new THREE.Vector3(p.pos[0], p.pos[1], p.pos[2]);
  const toTarget = new THREE.Vector3(p.target[0], p.target[1], p.target[2]);
  function tick(now) {
    const t = Math.min(1, (now - start) / dur);
    const e = 1 - Math.pow(1 - t, 3); // ease-out cubic
    camera.position.lerpVectors(fromPos, toPos, e);
    orb.target.lerpVectors(fromTarget, toTarget, e);
    orb.update();
    if (t < 1) _camAnim = requestAnimationFrame(tick);
  }
  _camAnim = requestAnimationFrame(tick);
}

window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || !d.type) return;
  if (d.type === 'setColor') setColor(d.key);
  if (d.type === 'setWood')  setWood(d.key);
  if (d.type === 'setGlass') setGlass(d.key);
  if (d.type === 'setModel') setModel(d.key);
  if (d.type === 'setSide')  setSide(d.key);
  if (d.type === 'toggleOpen') setDoorOpen(!_doorOpen);
  if (d.type === 'setOpen')    setDoorOpen(!!d.open);
  if (d.type === 'cameraFocus') focusCamera(d.focus || 'default');
  if (d.type === 'setView') {
    const newView = (d.key === 'innen') ? 'innen' : 'aussen';
    if (newView !== _curView) {
      _curView = newView;
      const currentModel = document.getElementById('modelSelect')?.value || 'florida-lr-inox';
      setModel(currentModel);
    }
  }
  if (d.type === 'update') {
    // Atomare Aktualisierung: alles in einem Tick → kein Zwischenframe
    if (d.view) _curView = (d.view === 'innen') ? 'innen' : 'aussen';
    buildDoor(d.model);
    setSide(d.side || 'r');
    if (d.wood)  setWood(d.wood);
    else         setColor(d.color || 'anthrazitgrau');
    setGlass(d.glass || 'klar');
  }
});

(function animate() {
  requestAnimationFrame(animate);
  orb.update();
  renderer.render(scene, camera);
})();

<script>
/* Bridge: dismiss Parent-Hint wenn User 3D wirklich bewegt */
(function(){
  if (window.parent === window) return;
  var dX=0, dY=0, isDown=false, fired=false;
  window.addEventListener('pointerdown', function(e){ isDown=true; fired=false; dX=e.clientX; dY=e.clientY; }, {passive:true,capture:true});
  window.addEventListener('pointermove', function(e){
    if (!isDown || fired) return;
    if (Math.abs(e.clientX-dX) + Math.abs(e.clientY-dY) > 12) {
      try { window.parent.postMessage({type:'3d-rotated'}, '*'); } catch(_){}
      fired = true;
    }
  }, {passive:true,capture:true});
  window.addEventListener('pointerup', function(){ isDown=false; }, {passive:true,capture:true});
  window.addEventListener('wheel', function(){ try{ window.parent.postMessage({type:'3d-rotated'},'*'); }catch(_){}}, {passive:true,once:true,capture:true});
})();
</script>
