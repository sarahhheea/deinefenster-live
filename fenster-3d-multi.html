<!DOCTYPE html>

<title>Fenster 3D — Drutex Iglo 5</title>
<script>
  // Embed-Klasse SOFORT setzen (vor CSS-Render) damit Header nicht aufflackert
  if (new URLSearchParams(location.search).has('embed')) {
    document.documentElement.classList.add('is-embed');
    document.addEventListener('DOMContentLoaded', () => document.body.classList.add('embed'));
  }

<style>
  html.is-embed body { background: #f4f7fc !important; }
  html.is-embed .header, html.is-embed .controls { display: none !important; }

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; overflow: hidden; }

  body.embed { background: #f4f7fc !important; }
  body.embed .header   { display: none !important; }
  body.embed .layout   { height: 100vh !important; }
  body.embed .controls { display: none !important; }
  body.embed #threeCanvas { width: 100% !important; }

  .header {
    background: #1e3a8a; color: white;
    height: 40px; padding: 0 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  .header .model-tag {
    background: rgba(255,255,255,0.18); border-radius: 4px;
    padding: 2px 9px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.5px;
  }

  .layout { display: flex; height: calc(100vh - 40px); position: relative; }
  .roll-label {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%); z-index: 20;
    background: rgba(34,94,170,0.95); color: #fff; font-weight: 700;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-size: 13px;
    padding: 6px 16px; border-radius: 999px; letter-spacing: 0.3px;
    box-shadow: 0 4px 14px rgba(20,40,80,0.28); pointer-events: none; white-space: nowrap;
  }

  #threeCanvas { flex: 1; display: block; cursor: grab; }
  #threeCanvas:active { cursor: grabbing; }

  .controls {
    width: 252px; min-width: 252px;
    padding: 10px 10px 20px;
    overflow-y: auto;
    background: white;
    box-shadow: -2px 0 12px rgba(0,0,0,0.07);
  }
  .current-label {
    font-size: 13px; font-weight: 700; color: #1e3a8a;
    text-align: center; padding: 7px 4px 9px;
    border-bottom: 1px solid #e8edf5;
    margin-bottom: 8px;
  }
  .section-title {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.1px;
    color: #94a3b8; margin: 10px 0 5px;
  }
  .section-title:first-of-type { margin-top: 0; }
  .colors { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
  .color-swatch {
    width: 100%; aspect-ratio: 1; border-radius: 4px;
    cursor: pointer; border: 2px solid transparent;
    transition: all 0.1s; position: relative;
  }
  .color-swatch:hover { transform: scale(1.18); z-index: 1; }
  .color-swatch.active {
    border-color: #1e3a8a;
    box-shadow: 0 0 0 2px #1e3a8a;
  }
  .tooltip {
    display: none; position: absolute;
    bottom: 115%; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: white;
    padding: 3px 7px; border-radius: 4px;
    font-size: 10px; white-space: nowrap;
    z-index: 20; pointer-events: none;
  }
  .color-swatch:hover .tooltip { display: block; }

  .glass-btns { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
  .glass-btn {
    flex: 1; min-width: 0;
    padding: 6px 2px; border-radius: 5px;
    border: 2px solid #e0e8f4; background: white;
    cursor: pointer; font-size: 9px; font-weight: 700;
    color: #64748b; text-align: center; line-height: 1.2;
    transition: all 0.1s; letter-spacing: 0.2px;
  }
  .glass-btn.active { border-color: #1e3a8a; color: #1e3a8a; background: #f0f5ff; }
  .glass-btn:hover { border-color: #93a8d4; }
</style>

<body>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ══════════════════════════════════════════════
// RENDERER
// ══════════════════════════════════════════════
const canvasEl = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({
  canvas: canvasEl, antialias: true, preserveDrawingBuffer: true,
  powerPreference: 'high-performance', alpha: false
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 3));   // max Schärfe
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.02;   // etwas heller, Weiß knackig (Realismus-Pass)
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
// Im Konfigurator-Embed-Modus dunkler Hintergrund (passt zum Konfi-Theme),
// sonst Standard weiß (für Standalone-Ansicht)
const _embed = new URLSearchParams(location.search).has('embed');
const _bgLight = new URLSearchParams(location.search).get('bg')==='light';
scene.background = new THREE.Color(_embed ? (_bgLight ? 0xf4f7fc : 0x0a1530) : 0xffffff);
if(_bgLight){var _s=document.createElement('style');_s.textContent='html.is-embed body,html body.embed{background:#f4f7fc !important}';document.head.appendChild(_s);}

// Orthografische Kamera — flacher Produktfoto-Look (Referenzfotos sind orthografisch).
// Vermeidet Perspektiv-Verzerrung, durch die bei mehreren Flügeln einer optisch breiter
// wirkte als die anderen, obwohl alle exakt gleich breit modelliert sind.
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 50);
camera.position.set(0, 0, 8.0);

// Rollladenkasten-Höhe (m) des aktuellen Builds — für Rahmung + Zentrierung
let _rollKH = 0;
function _rollKastenH(spec){
  return (spec && spec.roll && spec.roll !== 'ohne')
    ? ((parseInt(spec.rollKasten, 10) || 175) / 1000) : 0;
}
function _updateRollLabel(spec){
  const lab = document.getElementById('rollLabel');
  if (!lab) return;
  if (spec && spec.roll && spec.roll !== 'ohne') {
    lab.textContent = 'Rollladen · ' + (spec.roll === 'motor' ? 'Motor' : 'Gurt');
    lab.style.display = '';
  } else { lab.style.display = 'none'; }
}

// Rahmt die ortho-Kamera exakt auf FW×FH (+Rand) und zentriert — deterministisch,
// unabhängig von vorherigem State oder erster Frame-Größe.
function frameCamera() {
  const embed = new URLSearchParams(location.search).has('embed');
  const w = embed ? window.innerWidth  : window.innerWidth  - 252;
  const h = embed ? window.innerHeight : window.innerHeight - 40;
  const aspect = Math.max(w / Math.max(h, 1), 0.0001);
  const margin = _rollKH ? 1.18 : 1.14;   // bei Rolladen mehr Luft, damit Kasten unter dem Label frei steht
  const halfH = ((FH + _rollKH) / 2) * margin;   // Rollladenkasten oben mit einrahmen
  const halfW = (FW / 2) * margin;
  // Fenster komplett sichtbar in beiden Achsen
  let viewH = halfH, viewW = halfH * aspect;
  if (viewW < halfW) { viewW = halfW; viewH = halfW / aspect; }
  camera.left = -viewW; camera.right = viewW;
  camera.top  =  viewH; camera.bottom = -viewH;
  camera.updateProjectionMatrix();
}

const orb = new OrbitControls(camera, canvasEl);
orb.target.set(0, 0, 0);
orb.enablePan = false; orb.enableRotate = false; orb.enableZoom = false;
orb.enableDamping = true;
orb.dampingFactor = 0.08;
orb.minDistance = 2.5;
orb.maxDistance = 12.0;
// Frei drehbar — von oben bis fast unten, fast 360° rundherum
orb.minPolarAngle = Math.PI * 0.10;
orb.maxPolarAngle = Math.PI * 0.85;
orb.minAzimuthAngle = -Math.PI * 0.85;
orb.maxAzimuthAngle =  Math.PI * 0.85;
orb.update();

// ══════════════════════════════════════════════
// ENVIRONMENT
// ══════════════════════════════════════════════
const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileEquirectangularShader();
const envSc = new THREE.Scene();
envSc.add(new THREE.AmbientLight(0xffffff, 4.0));
const eL1 = new THREE.DirectionalLight(0xffffff, 4.0);
eL1.position.set(1, 2, 3); envSc.add(eL1);
const eL2 = new THREE.DirectionalLight(0xffffff, 3.0);
eL2.position.set(-2, 1, 3); envSc.add(eL2);
scene.environment = pmremGen.fromScene(envSc, 0.04).texture;

// Ambient — gerade genug damit Außen-/Seitenflächen sichtbar, aber Schatten erhalten
scene.add(new THREE.AmbientLight(0xffffff, 0.48));  // weniger Grundhelligkeit → Schatten/Profil-Relief sichtbar

// Key-Licht maximal stark → starke Schatten an Profilkanten = max. 3D-Tiefe
const keyLight = new THREE.DirectionalLight(0xffffff, 3.5);
keyLight.position.set(-2, 4, 6);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(4096, 4096);   // hochauflösende Schatten
keyLight.shadow.camera.near = 1; keyLight.shadow.camera.far = 14;
keyLight.shadow.camera.left = -1.4; keyLight.shadow.camera.right = 1.4;
keyLight.shadow.camera.top = 1.8; keyLight.shadow.camera.bottom = -1.8;
keyLight.shadow.bias = -0.001;
  keyLight.shadow.radius = 5;
scene.add(keyLight);

// Fill von links — hebt Schatten leicht auf
const fillLight = new THREE.DirectionalLight(0xffffff, 0.45);
fillLight.position.set(-3, 1, 3); scene.add(fillLight);

// Frontlicht leicht von oben — Front-Fläche aufhellen ohne Blob
const frontLight = new THREE.DirectionalLight(0xffffff, 0.35);
frontLight.position.set(0, 3, 10); scene.add(frontLight);

// Spotlight für Griff-Highlight
const handleSpot = new THREE.SpotLight(0xffffff, 3.5, 10, Math.PI / 9, 0.16);
handleSpot.position.set(1.5, 0.8, 5.5);
handleSpot.target.position.set(0.42, 0.00, 0.09);
scene.add(handleSpot); scene.add(handleSpot.target);

// Rim-/Backlight — hellt Rückseite und Seitenflächen auf
const rimLight = new THREE.DirectionalLight(0xffffff, 0.75);
rimLight.position.set(0, 3, -5);
scene.add(rimLight);

// Side-Light von rechts — Seitenflächen klar erhellen
const sideLight = new THREE.DirectionalLight(0xffffff, 0.55);
sideLight.position.set(5, 1, 0);
scene.add(sideLight);

// Soft-Light von unten-rechts — füllt dunkle Schattenseiten
const bottomFill = new THREE.DirectionalLight(0xfff5e8, 0.30);
bottomFill.position.set(3, -2, 4);
scene.add(bottomFill);

// Hinge-Highlight von links — Scharnier-Walzen klarer sichtbar
const hingeSpot = new THREE.SpotLight(0xffffff, 2.5, 8, Math.PI / 10, 0.20);
hingeSpot.position.set(-2.0, 0.0, 4.5);
hingeSpot.target.position.set(-0.48, 0.00, 0.09);
scene.add(hingeSpot); scene.add(hingeSpot.target);

// Bodenschatten entfernt — Referenzbild zeigt reinen weißen Hintergrund ohne Schatten

// ══════════════════════════════════════════════
// MATERIALIEN
// ══════════════════════════════════════════════
const texLoader = new THREE.TextureLoader();
const frameMat  = new THREE.MeshStandardMaterial({ color: 0xfcfcfc, roughness: 0.68, metalness: 0.0 });
const sashMat   = new THREE.MeshStandardMaterial({ color: 0xfcfcfc, roughness: 0.68, metalness: 0.0 });
const grooveMat = new THREE.MeshStandardMaterial({ color: 0x252829, roughness: 0.70 });
const sealMat   = new THREE.MeshStandardMaterial({ color: 0x1a1c1e, roughness: 0.78 });
// Subtile Nut-Linie — nur Tiefenwirkung, kein schwarzer Strich
const subtleNutMat = new THREE.MeshStandardMaterial({ color: 0xdcdcdc, roughness: 0.65 });
const spacerMat = new THREE.MeshStandardMaterial({ color: 0x22262a, roughness: 0.55, metalness: 0.45 });
// Innenliegende Sprossen (SZR): helles, leicht silbriges Aluprofil — subtil, sitzt zwischen den Scheiben
const sproInnenMat = new THREE.MeshStandardMaterial({ color: 0xc7ccd3, roughness: 0.5, metalness: 0.35 });
const handleMat = new THREE.MeshStandardMaterial({ color: 0xd8dde0, roughness: 0.18, metalness: 0.92, envMapIntensity: 2.5 });
const hingeMat  = new THREE.MeshStandardMaterial({ color: 0xbabfc2, roughness: 0.55, metalness: 0.05 });
// Glas: hellblau-reflektiv wie echtes Produktfoto (Kundenwunsch 18.05.2026)
const glassMat  = new THREE.MeshStandardMaterial({
  color: 0xe6edf1, metalness: 0.06, roughness: 0.05, envMapIntensity: 2.4,
  transparent: true, opacity: 0.86,
});

// ══════════════════════════════════════════════
// FENSTER-KONSTANTEN — Drutex Iglo 5
// 1 unit = 1 m · 1000 × 1200 × 73 mm
// ══════════════════════════════════════════════
let FW     = 1.000;   // Außenbreite — wird je nach Flügelzahl dynamisch gesetzt (sonst gequetscht)
const FH   = 1.200;   // Außenhöhe
const FD   = 0.073;   // Rahmentiefe

const FRT  = 0.068;   // Blendrahmen-Profilbreite
const SOVL = 0.018;   // Falzüberdeckung (Flügel überlappt Blendrahmen um 18mm)
const FST  = 0.060;   // Flügel-Profilbreite

// Flügel-Außenmaße
const SW = FW - 2 * (FRT - SOVL);   // 0.900
const SH = FH - 2 * (FRT - SOVL);   // 1.100

// Sash origin (bottom-left in local group coords)
const x0 = FRT - SOVL;  // 0.050
const y0 = FRT - SOVL;  // 0.050

// Abstandhalter (Spacer bar) sichtbare Breite
const SBW = 0.012;

// Glasmaße (Sichtglas innerhalb Spacer)
const GW = SW - 2 * FST - 2 * SBW;  // 0.756
const GH = SH - 2 * FST - 2 * SBW;  // 0.956

// Flügel steht 5mm vor dem Blendrahmen hervor (Falz)
const SASH_DZ = 0.022;   // 22 mm Aufkantung — starke 3D-Trennung Rahmen|Flügel

const winGroup  = new THREE.Group();
const sashGroup = new THREE.Group();   // Flügel — rotiert um linke Scharnier-Achse zum Öffnen
sashGroup.position.set(x0, 0, 0);      // Pivot = linker Scharnier-Rand (x0 in winGroup-Koords)
winGroup.add(sashGroup);

let glassObjects   = [];
let handleObjects  = [];   // Hebel/Rosette/Achse — Click-Targets fürs Öffnen
let _curColor = 'anthrazitgrau';
let _curWood  = null;
let _curGlass = 'klar';
let sashOpen  = false;
let sashAnim  = 0;         // 0 = zu, 1 = ganz auf
const SASH_OPEN_ANGLE = Math.PI / 4;   // 45° Drehöffnung

// ── Sprossen (Aufteilung) ────────────────────────────
let _sproTyp    = 'keine';
let _sproRaster = 'kreuz';
const SPRO_RASTER = {
  'senk2': {v:1,h:0}, 'waag2': {v:0,h:1}, 'kreuz': {v:1,h:1},
  'feld6': {v:2,h:1}, 'feld9': {v:2,h:2}, 'feld12': {v:3,h:2},
};

// ── Helper: Box zentriert an (cx,cy,cz) ──────────────
function bx(cx, cy, cz, w, h, d, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat || frameMat);
  m.position.set(cx, cy, cz);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

// ── Profilnut (dekorative Rille auf Vorderfläche) ────
function nut(x1, y1, x2, y2, faceZ, mat) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  const isH = Math.abs(dx) > Math.abs(dy);
  const gw = 0.0046, gd = 0.0036;
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(isH ? len : gw, isH ? gw : len, gd),
    mat || grooveMat
  );
  m.position.set((x1 + x2) / 2, (y1 + y2) / 2, faceZ + 0.0012);
  return m;
}

// ══════════════════════════════════════════════
// LAYOUT-PARSER — wandelt fluegel-Key in Geometry-Spec
// ══════════════════════════════════════════════
const LICHTE_H = 0.300;   // Oberlicht/Unterlicht Höhe (300 mm)
const MULLION_T = 0.080;  // Pfosten-Stärke (80 mm Drutex)

function parseLayout(key) {
  const k = key || '1-fluegel';
  const m = k.match(/^(\d)-(fluegel|oberlicht|unterlicht|ober-unter)$/);
  if (!m) return { cols: 1, hasOber: false, hasUnter: false };
  return {
    cols: parseInt(m[1], 10),
    hasOber: m[2] === 'oberlicht' || m[2] === 'ober-unter',
    hasUnter: m[2] === 'unterlicht' || m[2] === 'ober-unter',
  };
}

let _lastSpec = null;

// ══════════════════════════════════════════════
// ROLLLADEN — Drutex-Aufsatzrollladen-Maße
// ══════════════════════════════════════════════
const ROL_BOX_DEPTH = 0.230;   // Kasten-Tiefe 230 mm (typisch Drutex Aufsatz)
const ROL_SCHIENE_W = 0.035;   // Führungsschiene Breite 35 mm
const ROL_SCHIENE_D = 0.025;   // Führungsschiene Tiefe 25 mm
const ROL_END_H     = 0.045;   // Endschiene Höhe 45 mm
const ROL_GURT_W    = 0.040;   // Gurt-Auslass Breite 40 mm
const ROL_GURT_H    = 0.200;   // Gurt-Auslass Höhe 200 mm

// Rollladen-Geometrie: Kasten + Schienen + Endschiene + optional Gurt-Auslass
// spec.roll: 'ohne' | 'gurt' | 'motor'
// spec.rollKasten: '175' | '215' | '225' (mm)
// spec.rollSeite: 'links' | 'rechts'
const _panzerMats = {};
function _panzerMat(spec){
  const hex = (spec && spec.panzerHex) || '#8d9094';
  if(!hex || hex === 'rahmen') return frameMat;
  if(!_panzerMats[hex]) _panzerMats[hex] = new THREE.MeshStandardMaterial({ color: new THREE.Color(hex), roughness: 0.68, metalness: 0.0 });
  return _panzerMats[hex];
}

function _addRolladen(spec) {
  if (!spec || !spec.roll || spec.roll === 'ohne') return;

  const isBalkon = typeof SCH_H !== 'undefined';   // Balkontür hat SCH_H konstant
  const baseY = isBalkon ? SCH_H : 0;              // Unterkante (Schwelle oder Boden)

  const kastenH = (parseInt(spec.rollKasten, 10) || 175) / 1000;
  const kastenY = FH + kastenH / 2;
  const kastenZ = FD / 2 + 0.115;
  const kastenD = ROL_BOX_DEPTH;
  const _panzMat = _panzerMat(spec);   // Endleiste in Panzerfarbe; Kasten + Schienen = Rahmenfarbe
  const fzc = FD / 2;

  // Kasten
  winGroup.add(bx(FW / 2, kastenY, kastenZ, FW + 2 * ROL_SCHIENE_W, kastenH, kastenD, frameMat));
  const kastenFront = kastenZ + kastenD / 2;
  const kxL = -ROL_SCHIENE_W + 0.012, kxR = FW + ROL_SCHIENE_W - 0.012;
  const kyB = FH + 0.012, kyT = FH + kastenH - 0.012;
  winGroup.add(nut(kxL, kyB, kxR, kyB, kastenFront, subtleNutMat));
  winGroup.add(nut(kxL, kyT, kxR, kyT, kastenFront, subtleNutMat));
  winGroup.add(nut(kxL, kyB, kxL, kyT, kastenFront, subtleNutMat));
  winGroup.add(nut(kxR, kyB, kxR, kyT, kastenFront, subtleNutMat));

  // Schienen
  const schieneH = FH - baseY;
  const schieneY = baseY + schieneH / 2;
  const schieneZ = fzc + 0.005;
  winGroup.add(bx(-ROL_SCHIENE_W / 2, schieneY, schieneZ, ROL_SCHIENE_W, schieneH, ROL_SCHIENE_D, frameMat));
  winGroup.add(bx(FW + ROL_SCHIENE_W / 2, schieneY, schieneZ, ROL_SCHIENE_W, schieneH, ROL_SCHIENE_D, frameMat));

  // Endschiene
  // ── Panzer (Lamellen-Vorhang, ca. zur Haelfte heruntergelassen) ──
  const _pzZ   = FD + SASH_DZ + 0.012;  // klar VOR der Fenster-Flueglkante (kein Verschmelzen)
  const _pzW   = FW + 2 * ROL_SCHIENE_W;  // randlos: deckt den ganzen Rahmen ab (wie der Kasten)
  const _pzTop = FH - 0.004;           // direkt unter dem Kasten
  const _pzBot = FH * 0.50;            // bedeckt das obere halbe Fenster
  const _pzPitch = 0.044;              // Lamellen-Raster (Hoehe inkl. Fuge)
  const _pzSlatH = 0.035;              // sichtbare Lamellenhoehe (9 mm Fuge -> klarere Linien)
  const _pzSlatD = 0.016;              // Lamellentiefe
  // dunkles Backing -> Fugen wirken dunkel, kein Durchblick aufs Glas
  winGroup.add(bx(FW / 2, (_pzTop + _pzBot) / 2, _pzZ - 0.006, _pzW, _pzTop - _pzBot, 0.006, spacerMat));
  // kraeftige Endleiste unten
  winGroup.add(bx(FW / 2, _pzBot + ROL_END_H / 2, _pzZ, _pzW, ROL_END_H, _pzSlatD + 0.004, _panzMat));
  // Lamellen gestapelt nach oben bis unter den Kasten
  for (let _ly = _pzBot + ROL_END_H + _pzPitch / 2; _ly + _pzSlatH / 2 <= _pzTop; _ly += _pzPitch) {
    winGroup.add(bx(FW / 2, _ly, _pzZ, _pzW, _pzSlatH, _pzSlatD, _panzMat));
  }
}

// ══════════════════════════════════════════════
// buildWindow — Fenstergeometrie aufbauen (Multi-Flügel-Variante)
// Koordinaten: (0,0) = Blendrahmen unten-links
// spec: { layout, sashes: ['dk-l','dk-r',...], oberlicht, unterlicht }
// ══════════════════════════════════════════════
function buildWindow(spec) {
  spec = spec || { layout: '1-fluegel', sashes: ['dk-r'], oberlicht: 'fest', unterlicht: 'fest' };
  _lastSpec = spec;

  // Cleanup: alles aus winGroup (sashGroup leer halten — Multi-Flügel kein Animation)
  while (winGroup.children.length > 0) {
    const c = winGroup.children[0];
    if (c === sashGroup) { winGroup.remove(c); continue; }
    c.traverse(node => { if (node.geometry) node.geometry.dispose(); });
    winGroup.remove(c);
  }
  while (sashGroup.children.length > 0) {
    const c = sashGroup.children[0];
    if (c.geometry) c.geometry.dispose();
    sashGroup.remove(c);
  }
  winGroup.add(sashGroup);
  sashGroup.position.set(x0, 0, 0);
  glassObjects = [];
  handleObjects = [];

  const fzc = FD / 2;
  const szc = FD / 2 + SASH_DZ;
  const ffz = FD;
  const sfz = FD + SASH_DZ;

  // ── Layout parsen + FW BERECHNEN ZUERST ──
  // WICHTIG: FW muss VOR dem Bau des Blendrahmens feststehen, sonst entsteht der
  // Blendrahmen noch mit dem alten (Modul-/Vorbuild-)FW, während Flügel/Pfosten
  // schon das neue FW nutzen → Geister-Profil im Flügel + außermittiges Fenster.
  // (Bug-Ursache "ein Flügel riesig"/Geister-Steg, gefunden 2026-06-10.)
  const lay = parseLayout(spec.layout);
  const cols = lay.cols;
  // Breite dynamisch nach Flügelzahl — sonst werden 2/3 Flügel in 1 m gequetscht.
  // Echte Scheibenbreite ~0,60 m pro Flügel + Pfosten + Blendrahmen.
  const SASH_CELL_TARGET = 0.60;
  FW = 2 * FRT + cols * SASH_CELL_TARGET + (cols - 1) * MULLION_T;

  // ── Blendrahmen — 4 Stäbe (bleiben in winGroup, statisch) ──
  winGroup.add(bx(FW/2,          FRT/2,         fzc, FW,           FRT,         FD, frameMat));
  winGroup.add(bx(FW/2,          FH - FRT/2,    fzc, FW,           FRT,         FD, frameMat));
  winGroup.add(bx(FRT/2,         FH/2,           fzc, FRT,          FH - 2*FRT,  FD, frameMat));
  winGroup.add(bx(FW - FRT/2,    FH/2,           fzc, FRT,          FH - 2*FRT,  FD, frameMat));

  // Profilnut Blendrahmen — innere Linie nahe Falz
  const fni = FRT - 0.012;
  winGroup.add(nut(fni, fni, FW - fni, fni, ffz, subtleNutMat));
  winGroup.add(nut(fni, FH - fni, FW - fni, FH - fni, ffz, subtleNutMat));
  winGroup.add(nut(fni, fni, fni, FH - fni, ffz, subtleNutMat));
  winGroup.add(nut(FW - fni, fni, FW - fni, FH - fni, ffz, subtleNutMat));
  // Zweite subtile Linie näher zur Außenkante — mehr Profil-Tiefe
  const fno = 0.012;
  winGroup.add(nut(fno, fno, FW - fno, fno, ffz, subtleNutMat));
  winGroup.add(nut(fno, FH - fno, FW - fno, FH - fno, ffz, subtleNutMat));
  winGroup.add(nut(fno, fno, fno, FH - fno, ffz, subtleNutMat));
  winGroup.add(nut(FW - fno, fno, FW - fno, FH - fno, ffz, subtleNutMat));

  const yInnerBot = FRT;
  const yInnerTop = FH - FRT;
  const xInnerLeft = FRT;
  const xInnerRight = FW - FRT;

  // Lichten-Grenzen
  const oberY = lay.hasOber ? yInnerTop - LICHTE_H : yInnerTop;
  const unterY = lay.hasUnter ? yInnerBot + LICHTE_H : yInnerBot;

  // Querpfosten für Lichten (gleiche Optik wie Blendrahmen)
  if (lay.hasOber) {
    winGroup.add(bx((xInnerLeft + xInnerRight)/2, oberY, fzc, xInnerRight - xInnerLeft, MULLION_T, FD, frameMat));
  }
  if (lay.hasUnter) {
    winGroup.add(bx((xInnerLeft + xInnerRight)/2, unterY, fzc, xInnerRight - xInnerLeft, MULLION_T, FD, frameMat));
  }

  const mainBot = unterY + (lay.hasUnter ? MULLION_T/2 : 0);
  const mainTop = oberY - (lay.hasOber ? MULLION_T/2 : 0);
  const mainH = mainTop - mainBot;

  // ── Trenner-Logik je Grenze (zwischen Flügel i-1 und i) ──
  // sep kann sein: '', 'pfosten', 'stulp' (alle Grenzen gleich) ODER
  // bei 3 Flügeln 'pfosten-stulp' / 'stulp-pfosten' (Grenze 1 - Grenze 2).
  const sepRaw  = spec.separator || '';
  const sepBoundary = (b) => {           // b = 1..cols-1
    if (!sepRaw) return 'pfosten';        // Default: Pfosten
    if (sepRaw.indexOf('-') === -1) return sepRaw;   // einheitlich
    const parts = sepRaw.split('-');
    return parts[b - 1] || parts[parts.length - 1];
  };
  // STULP-Grenze hat KEINEN Mittelpfosten — die beiden Flügel stoßen direkt
  // aneinander (mehr Glas). PFOSTEN-Grenze frisst MULLION_T Breite.
  const usableW = xInnerRight - xInnerLeft;
  let pfostenCount = 0;
  for (let b = 1; b < cols; b++) if (sepBoundary(b) === 'pfosten') pfostenCount++;
  // Stulp-Grenzen brauchen nur die schmale Stulp-Überdeckung (~Flügelprofil),
  // optisch praktisch kein Spalt. Gesamtbreite gleichmäßig auf die Flügel verteilen.
  const sashCellW = (usableW - pfostenCount * MULLION_T) / cols;

  // Flügel-Startpositionen + vertikale Pfosten nur an PFOSTEN-Grenzen
  const sashX = [];
  let cx = xInnerLeft;
  for (let i = 0; i < cols; i++) {
    sashX.push(cx);
    cx += sashCellW;
    if (i < cols - 1) {
      if (sepBoundary(i + 1) === 'pfosten') {
        winGroup.add(bx(cx + MULLION_T/2, (mainBot + mainTop)/2, fzc, MULLION_T, mainH, FD, frameMat));
        cx += MULLION_T;
      }
      // Stulp-Grenze: kein Pfosten, kein Vorschub → nächster Flügel stößt direkt an.
    }
  }

  // ── Sash-Helper: erzeugt einen Flügel im Bereich (xs, ys, ws, hs) im SELBEN Stil wie 1-Flügel
  // isStulpStandFluegel: Standfluegel einer Stulp-Konfiguration -> kein Aussen-Griff
  // view: 'aussen' oder 'innen'
  // isStulpBedienFluegel: Bedienfluegel einer Stulp-Konfiguration -> Griff
  //                      sitzt zur Fenstermitte (am Stulp-Profil), nicht
  //                      an der Aussen-Falz. Standard isLeft wird invertiert.
  function _addFluegel(xs, ys, ws, hs, sashState, isStulpStandFluegel, view, isStulpBedienFluegel) {
    // Falzüberlappung — Sash überragt seinen Bereich um SOVL nach außen
    const xS = xs - SOVL, yS = ys - SOVL;
    const wS = ws + 2 * SOVL, hS = hs + 2 * SOVL;

    // Falz-Dichtung (schwarz, umlaufend)
    const sealW = 0.005;
    const sealDp = 0.008;
    const sealZ_pos = ffz + SASH_DZ / 2;
    winGroup.add(bx(xS + wS/2,         yS - sealW/2,         sealZ_pos, wS + sealW*2, sealW, sealDp, sealMat));
    winGroup.add(bx(xS + wS/2,         yS + hS + sealW/2,    sealZ_pos, wS + sealW*2, sealW, sealDp, sealMat));
    winGroup.add(bx(xS - sealW/2,      yS + hS/2,            sealZ_pos, sealW, hS,            sealDp, sealMat));
    winGroup.add(bx(xS + wS + sealW/2, yS + hS/2,            sealZ_pos, sealW, hS,            sealDp, sealMat));

    // Sash-Profilrahmen (4 Stäbe)
    winGroup.add(bx(xS + wS/2,       yS + FST/2,        szc, wS,   FST,         FD, sashMat));
    winGroup.add(bx(xS + wS/2,       yS + hS - FST/2,   szc, wS,   FST,         FD, sashMat));
    winGroup.add(bx(xS + FST/2,      yS + hS/2,         szc, FST,  hS - 2*FST,  FD, sashMat));
    winGroup.add(bx(xS + wS - FST/2, yS + hS/2,         szc, FST,  hS - 2*FST,  FD, sashMat));

    // Profilnuten innere Linie
    const sniL = xS + FST * 0.54, sniR = xS + wS - FST * 0.54;
    const sniB = yS + FST * 0.54, sniT = yS + hS - FST * 0.54;
    winGroup.add(nut(sniL, sniB, sniR, sniB, sfz, subtleNutMat));
    winGroup.add(nut(sniL, sniT, sniR, sniT, sfz, subtleNutMat));
    winGroup.add(nut(sniL, sniB, sniL, sniT, sfz, subtleNutMat));
    winGroup.add(nut(sniR, sniB, sniR, sniT, sfz, subtleNutMat));
    // Profilnuten äußere Linie
    const sniOL = xS + FST * 0.16, sniOR = xS + wS - FST * 0.16;
    const sniOB = yS + FST * 0.16, sniOT = yS + hS - FST * 0.16;
    winGroup.add(nut(sniOL, sniOB, sniOR, sniOB, sfz, subtleNutMat));
    winGroup.add(nut(sniOL, sniOT, sniOR, sniOT, sfz, subtleNutMat));
    winGroup.add(nut(sniOL, sniOB, sniOL, sniOT, sfz, subtleNutMat));
    winGroup.add(nut(sniOR, sniOB, sniOR, sniOT, sfz, subtleNutMat));

    // Glasscheibe
    const gw = wS - 2 * (FST + SBW);
    const gh = hS - 2 * (FST + SBW);
    const gcx = xS + FST + SBW + gw / 2;
    const gcy = yS + FST + SBW + gh / 2;
    const gm = new THREE.Mesh(new THREE.BoxGeometry(gw, gh, 0.006), glassMat);
    gm.position.set(gcx, gcy, szc + 0.002);
    gm.castShadow = true;
    winGroup.add(gm);
    glassObjects.push(gm);

    // Spacer-Rahmen ums Glas
    const sbz = szc;
    const sbd = 0.004;
    winGroup.add(bx(gcx, gcy + gh/2 + SBW/2, sbz, gw + SBW * 2, SBW, sbd, spacerMat));
    winGroup.add(bx(gcx, gcy - gh/2 - SBW/2, sbz, gw + SBW * 2, SBW, sbd, spacerMat));
    winGroup.add(bx(gcx - gw/2 - SBW/2, gcy, sbz, SBW, gh, sbd, spacerMat));
    winGroup.add(bx(gcx + gw/2 + SBW/2, gcy, sbz, SBW, gh, sbd, spacerMat));

    // ── Sprossen (Aufteilung) — realistisch je Art ──
    //  innenliegend (SZR): dünn/flach/silbrig in der Glasebene · aufgesetzt: kräftig/erhaben auf der Glasfront
    if (_sproTyp && _sproTyp !== 'keine') {
      const _r   = SPRO_RASTER[_sproRaster] || { v:1, h:1 };
      const _inn = _sproTyp === 'szr';
      const _gz  = szc + 0.002;
      const _bw  = _inn ? 0.011 : 0.024;
      const _bd  = _inn ? 0.004 : 0.013;
      const _bm  = _inn ? sproInnenMat : sashMat;
      const _prof = 0.006;
      const _zs  = _inn ? [_gz] : [_gz + _prof + _bd/2, _gz - _prof - _bd/2];
      const _sproBar = function(cx, cy, w, h){
        _zs.forEach(function(z){ const m = bx(cx, cy, z, w, h, _bd, _bm); if(!_inn) m.castShadow = true; winGroup.add(m); });
      };
      for (let i = 1; i <= _r.v; i++) {
        const _bxc = gcx + (i / (_r.v + 1) - 0.5) * gw;
        _sproBar(_bxc, gcy, _bw, gh);
      }
      for (let j = 1; j <= _r.h; j++) {
        const _byc = gcy + (j / (_r.h + 1) - 0.5) * gh;
        _sproBar(gcx, _byc, gw, _bw);
      }
    }

    // Fest: kein Beschlag, keine Bänder
    if (!sashState || sashState === 'fest') return;

    const isKipp = sashState === 'kipp';
    // DIN-Konvention (Innenansicht): 'dk-l'/'dreh-l' = Bänder LINKS, Griff rechts;
    // 'dk-r'/'dreh-r' = Bänder RECHTS, Griff links.
    let isLeft = sashState === 'dreh-r' || sashState === 'dk-r';   // = Griff links?
    if (isKipp) isLeft = false;   // Kipp: Griff seitlich rechts (Spec: NICHT oben)
    // Bänder sitzen GEGENÜBER dem Griff (Anschlagseite). Bei Kipp unten (waagerecht).
    const bandOnLeft = !isLeft;   // Griff links → Bänder rechts und umgekehrt

    // ── SCHARNIER-BÄNDER (Drutex Eckband-Walzen, weiß) ──
    // Auch der Stulp-Standflügel bekommt Bänder (außen), nur keinen Frontgriff.
    (function addHinges(){
      const rollR = 0.0085, rollH = 0.082, capR = rollR * 1.10, capH = 0.008, ringH = 0.0025;
      const rz = sfz + 0.008;
      if (isKipp) {
        // Kippachse unten — zwei Walzen waagerecht an der Unterkante
        const by = yS + FST * 0.52;
        [ xS + wS * 0.30, xS + wS * 0.70 ].forEach(bx_ => {
          const roll = new THREE.Mesh(new THREE.CylinderGeometry(rollR, rollR, rollH, 24), hingeMat);
          roll.rotation.z = Math.PI / 2; roll.position.set(bx_, by, rz);
          roll.castShadow = true; roll.userData.isHinge = true; winGroup.add(roll);
        });
        return;
      }
      const bx_ = bandOnLeft ? xS + FST * 0.50 : xS + wS - FST * 0.50;
      [ yS + hS - 0.150, yS + 0.150 ].forEach(by => {
        const roll = new THREE.Mesh(new THREE.CylinderGeometry(rollR, rollR, rollH, 24), hingeMat);
        roll.position.set(bx_, by, rz); roll.castShadow = true; roll.userData.isHinge = true;
        winGroup.add(roll);
        const capTop = new THREE.Mesh(new THREE.CylinderGeometry(capR*0.85, capR, capH, 22), hingeMat);
        capTop.position.set(bx_, by + rollH/2 + capH/2 - 0.002, rz); capTop.userData.isHinge = true; winGroup.add(capTop);
        const capBot = new THREE.Mesh(new THREE.CylinderGeometry(capR, capR*0.85, capH, 22), hingeMat);
        capBot.position.set(bx_, by - rollH/2 - capH/2 + 0.002, rz); capBot.userData.isHinge = true; winGroup.add(capBot);
        const ring = new THREE.Mesh(new THREE.CylinderGeometry(rollR*1.04, rollR*1.04, ringH, 24), hingeMat);
        ring.position.set(bx_, by, rz + 0.0005); ring.userData.isHinge = true; winGroup.add(ring);
      });
    })();

    // STULP-Standflügel: Bänder ja (oben), aber KEIN sichtbarer Frontgriff
    if (isStulpStandFluegel) return;

    // ── GRIFF (Hoppe-L-Hebel, weiß, zeigt nach unten) ──
    const hbz = sfz;
    const hx = isLeft ? xS + FST * 0.52 : xS + wS - FST * 0.52;
    const hy = yS + hS / 2;

    const rosette = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.020, 0.094, 6, 22),
      handleMat
    );
    rosette.scale.set(1.0, 1.0, 0.47);
    rosette.position.set(hx, hy, hbz + 0.0035);
    rosette.castShadow = true;
    rosette.userData.isHandle = true;
    winGroup.add(rosette); handleObjects.push(rosette);

    const handleStick = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.016, 0.118, 8, 22),
      handleMat
    );
    const dir = isLeft ? -1 : 1;
    handleStick.position.set(hx + dir * 0.005, hy - 0.055, hbz + 0.022);
    handleStick.castShadow = true;
    handleStick.userData.isHandle = true;
    winGroup.add(handleStick); handleObjects.push(handleStick);
  }

  // Hauptflügel — mit Stulpflügel-Erkennung fuer Griff-Logik
  const sashStates = (spec.sashes || []).slice();
  while (sashStates.length < cols) sashStates.push('dk-r');
  const sep  = sepRaw;   // '', 'pfosten', 'stulp', 'pfosten-stulp', 'stulp-pfosten'
  const view = spec.view || 'aussen';
  // Standfluegel: dreh-only-Sash adjazent zu 'stulp'-Trenner mit DK-Nachbar
  const isStulpStand = (i) => {
    if (!sep || !sep.includes('stulp')) return false;
    // 2-Flügel-Stulp: linker Flügel = Standflügel (kein sichtbarer Frontgriff), egal ob dk oder dreh
    if (sashStates.length === 2) return i === 0;
    const me = sashStates[i] || '';
    if (me !== 'dreh-l' && me !== 'dreh-r') return false;
    // 3 Fluegel: separator like 'pfosten-stulp' = sep12|sep23
    const parts = sep.split('-');
    const sep12 = parts[0] || '';
    const sep23 = parts[1] || sep12;
    if (i === 0)               return sep12 === 'stulp' && (sashStates[1] || '').startsWith('dk-');
    if (i === sashStates.length - 1) return sep23 === 'stulp' && (sashStates[i - 1] || '').startsWith('dk-');
    return (sep12 === 'stulp' && (sashStates[i - 1] || '').startsWith('dk-'))
        || (sep23 === 'stulp' && (sashStates[i + 1] || '').startsWith('dk-'));
  };
  // Bedienfluegel: DK-Fluegel adjazent zu 'stulp'-Trenner mit dreh-only-Nachbar.
  // Griff sitzt am STULP-PROFIL (zur Fenstermitte), nicht an der Aussenfalz.
  const isStulpBedien = (i) => {
    if (!sep || !sep.includes('stulp')) return false;
    // 2-Flügel-Stulp: rechter Flügel = Gangflügel (genau EIN sichtbarer Griff)
    if (sashStates.length === 2) return i === 1;
    const me = sashStates[i] || '';
    if (!me.startsWith('dk-')) return false;
    const parts = sep.split('-');
    const sep12 = parts[0] || '';
    const sep23 = parts[1] || sep12;
    if (i === 0)                     return sep12 === 'stulp' && (sashStates[1] || '').startsWith('dreh');
    if (i === sashStates.length - 1) return sep23 === 'stulp' && (sashStates[i - 1] || '').startsWith('dreh');
    return false;
  };
  for (let i = 0; i < cols; i++) {
    _addFluegel(sashX[i], mainBot, sashCellW, mainH, sashStates[i], isStulpStand(i), view, isStulpBedien(i));
  }

  // Oberlicht (eine durchgehende Sektion oben)
  if (lay.hasOber) {
    const oberSashY = oberY + MULLION_T/2;
    const oberSashH = yInnerTop - oberSashY;
    _addFluegel(xInnerLeft, oberSashY, usableW, oberSashH, spec.oberlicht || 'fest');
  }

  // Unterlicht
  if (lay.hasUnter) {
    const unterSashY = yInnerBot;
    const unterSashH = unterY - MULLION_T/2 - unterSashY;
    _addFluegel(xInnerLeft, unterSashY, usableW, unterSashH, spec.unterlicht || 'fest');
  }
  _addRolladen(spec);

  // Zentrierung + Kamera deterministisch an die aktuelle Breite FW anpassen.
  // winGroup wird hier (mit DEM FW dieses Builds) zentriert — kein Rückgriff auf
  // einen veralteten Modul-FW mehr.
  _rollKH = _rollKastenH(spec);
  winGroup.position.y = -(FH + _rollKH) / 2;   // Fenster + Kasten gemeinsam zentrieren
  setSide(spec.side || 'r');     // setzt position.x = ∓FW/2 (zentriert in X)
  frameCamera();                 // ortho-Frustum auf FW×(FH+Kasten)
  orb.target.set(0, 0, 0);
  orb.update();
  _updateRollLabel(spec);
}

// Initial-Build folgt weiter unten NACH FARBEN-Definition (setColor braucht die Tabelle)

// Fenster auf Welt-Origin zentrieren
winGroup.position.set(-FW / 2, -FH / 2, 0);
scene.add(winGroup);

// setSide: 'r' = Griff rechts (Standard), 'l' = Griff links (gespiegelt)
function setSide(s) {
  if (s === 'l') {
    winGroup.scale.x    = -1;
    winGroup.position.x =  FW / 2;
  } else {
    winGroup.scale.x    =  1;
    winGroup.position.x = -FW / 2;
  }
}
const _urlSide = new URLSearchParams(location.search).get('side') || 'r';
setSide(_urlSide);

// ── Farbe anwenden ────────────────────────────────────
function clearWoodMaps() {
  ['map', 'bumpMap', 'roughnessMap'].forEach(k => {
    if (frameMat[k]) { frameMat[k].dispose(); frameMat[k] = null; }
    if (sashMat[k])  { sashMat[k].dispose();  sashMat[k]  = null; }
  });
}

function findColor(key) {
  return [...FARBEN.whites, ...FARBEN.grays, ...FARBEN.colors].find(c => c.key === key);
}

function setColor(key) {
  _curColor = key; _curWood = null;
  clearWoodMaps();

  const colorObj = findColor(key);
  // Hex-Farben sind für Print/Foto kalibriert; Three.js-Studio braucht leicht aufgehellte
  // Werte damit dunkle Farben (Anthrazit) als sichtbares Grau erscheinen, nicht als Schwarz
  const c = new THREE.Color(colorObj?.hex || '#888888');
  const lum = c.r * 0.299 + c.g * 0.587 + c.b * 0.114;
  const boost = lum < 0.12 ? 1.7 : lum < 0.25 ? 1.35 : 1.0;
  c.multiplyScalar(boost);

  frameMat.color.copy(c);
  sashMat.color.copy(c);
  grooveMat.color.copy(c).multiplyScalar(0.50);
  subtleNutMat.color.copy(c).multiplyScalar(0.70);   // Profil-Vertiefungslinie deutlich dunkler → mehr Tiefe
  sealMat.color.copy(c).multiplyScalar(0.42);          // Falz-Schatten dunkler für klares Relief

  const isGlatt    = key.endsWith('-gl');
  const isUltiMatt = key.endsWith('-um');
  const roughness  = isUltiMatt ? 0.97 : isGlatt ? 0.20 : 0.74;
  const envInt     = isUltiMatt ? 0.02 : isGlatt ? 0.85 : 0.08;

  frameMat.roughness = sashMat.roughness = roughness;
  frameMat.metalness = sashMat.metalness = 0;
  frameMat.envMapIntensity = sashMat.envMapIntensity = envInt;
  frameMat.needsUpdate = true;
  sashMat.needsUpdate  = true;

  // Griff + Scharniere folgen Rahmenfarbe (Kunde-Vorgabe 16.05.2026):
  // Bei hellen/weißen Tönen → Kunststoff in Rahmenfarbe (kein Chrom)
  // Bei dunklen Farben + Edelstahl-Optik → silbern wie real
  applyHardwareColor(c.clone(), lum);

  document.getElementById('currentLabel').textContent = colorObj?.name || key;
}

// Griff/Scharniere an Rahmenfarbe anpassen — bei hellen Tönen DEUTLICH dunkler für Sichtbarkeit
function applyHardwareColor(frameColor, frameLum) {
  if (frameLum >= 0.6) {
    // Sehr helle/weiße Rahmen: Griff/Scharniere in weißem Kunststoff (Foto), leicht abgetönt + Glanz → Tiefe
    handleMat.color.copy(frameColor).multiplyScalar(0.42);
    handleMat.roughness = 0.45;
    handleMat.metalness = 0.0;
    handleMat.envMapIntensity = 0.15;
    hingeMat.color.copy(frameColor).multiplyScalar(0.40);
    hingeMat.roughness = 0.45;
    hingeMat.metalness = 0.0;
    hingeMat.envMapIntensity = 0.12;
  } else if (frameLum >= 0.35) {
    // Mittel-helle Rahmen: Aluminium-Optik mit mittlerem Kontrast
    handleMat.color.setHex(0xb0b6bd);
    handleMat.roughness = 0.22;
    handleMat.metalness = 0.85;
    handleMat.envMapIntensity = 2.0;
    hingeMat.color.setHex(0xa8aeb4);
    hingeMat.roughness = 0.50;
    hingeMat.metalness = 0.10;
    hingeMat.envMapIntensity = 1.5;
  } else {
    // Dunkle Rahmen: Standard Chrom-Silber
    handleMat.color.setHex(0xd8dde0);
    handleMat.roughness = 0.18;
    handleMat.metalness = 0.92;
    handleMat.envMapIntensity = 2.5;
    hingeMat.color.setHex(0xbabfc2);
    hingeMat.roughness = 0.55;
    hingeMat.metalness = 0.05;
  }
  handleMat.needsUpdate = true;
  hingeMat.needsUpdate = true;
}

function setWood(key) {
  _curWood = key; _curColor = null;
  const p = WOOD_PARAMS[key];
  if (!p) return;

  clearWoodMaps();

  // Bei Holzdekoren immer Chrom-Hardware (echtes Drutex-Verhalten)
  handleMat.color.setHex(0xd8dde0);
  handleMat.roughness = 0.18;
  handleMat.metalness = 0.92;
  handleMat.envMapIntensity = 2.5;
  hingeMat.color.setHex(0xbabfc2);
  hingeMat.roughness = 0.55;
  hingeMat.metalness = 0.05;
  handleMat.needsUpdate = true;
  hingeMat.needsUpdate = true;

  if (key === 'schwarzbraun') {
    [frameMat, sashMat].forEach(m => {
      m.map = null;
      m.color.set(p.base);
      m.roughness = 0.88; m.metalness = 0;
      m.envMapIntensity = 0.04;
      m.needsUpdate = true;
    });
    grooveMat.color.set(p.grain); grooveMat.needsUpdate = true;
    return;
  }

  const [rx, ry] = WOOD_REPEAT[key] ?? [1.5, 1];

  texLoader.load('img/swatches/' + key + '.webp', (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.rotation = Math.PI / 2;
    tex.center.set(0.5, 0.5);
    tex.repeat.set(rx, ry);
    tex.needsUpdate = true;

    [frameMat, sashMat].forEach(m => {
      m.map = tex;
      m.color.set(0xffffff);
      m.bumpMap = tex;
      m.bumpScale = 0.025;
      m.roughness = 0.82; m.metalness = 0;
      m.envMapIntensity = 0.10;
      m.needsUpdate = true;
    });
  });

  grooveMat.color.set(p.grain); grooveMat.needsUpdate = true;

  const colorObj = FARBEN.woods.find(w => w.key === key);
  if (colorObj) document.getElementById('currentLabel').textContent = colorObj.name;
}

const GLASS_TYPES = [

  { key:'satinato',     name:'Satinato'     },

];

function seededRnd(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function heightToNormal(hCanvas, strength) {
  const W = hCanvas.width, H = hCanvas.height;
  const hData = hCanvas.getContext('2d').getImageData(0, 0, W, H).data;
  const out = document.createElement('canvas'); out.width = W; out.height = H;
  const nCtx = out.getContext('2d');
  const nImg = nCtx.createImageData(W, H);
  function h(x, y) {
    x = Math.max(0, Math.min(W-1, x)); y = Math.max(0, Math.min(H-1, y));
    return hData[(y * W + x) * 4] / 255.0;
  }
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const dX = (h(x-1,y-1)-h(x+1,y-1)) + 2*(h(x-1,y)-h(x+1,y)) + (h(x-1,y+1)-h(x+1,y+1));
      const dY = (h(x-1,y-1)-h(x-1,y+1)) + 2*(h(x,y-1)-h(x,y+1)) + (h(x+1,y-1)-h(x+1,y+1));
      const nx = dX * strength, ny = dY * strength, nz = 1.0;
      const len = Math.sqrt(nx*nx + ny*ny + nz*nz);
      const i = (y * W + x) * 4;
      nImg.data[i]   = (nx/len * 0.5 + 0.5) * 255;
      nImg.data[i+1] = (ny/len * 0.5 + 0.5) * 255;
      nImg.data[i+2] = (nz/len * 0.5 + 0.5) * 255;
      nImg.data[i+3] = 255;
    }
  }
  nCtx.putImageData(nImg, 0, 0);
  return out;
}

function chinchillaHeight() {
  const W = 512, H = 512;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const rnd = seededRnd(4217);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 300; i++) {
    const x = rnd()*W, y = rnd()*H, r = 18 + rnd()*28;
    const rx = r*(0.65+rnd()*0.7), ry = r*(0.65+rnd()*0.7);
    const g = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.6, 'rgba(128,128,128,0.5)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(x, y, rx, ry, rnd()*Math.PI, 0, Math.PI*2); ctx.fill();
  }
  return cvs;
}

function masterCarreHeight() {
  const W = 256, H = 256;
  const cvs = document.createElement('canvas'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  const STEP = 32, LINE = 8;
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
  for (let pos = 0; pos <= W; pos += STEP) {
    const g = ctx.createLinearGradient(pos-LINE, 0, pos+LINE, 0);
    g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(0.5, 'rgba(255,255,255,1)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(pos-LINE, 0, LINE*2, H);
  }
  for (let pos = 0; pos <= H; pos += STEP) {
    const g = ctx.createLinearGradient(0, pos-LINE, 0, pos+LINE);
    g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(0.5, 'rgba(255,255,255,1)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0, pos-LINE, W, LINE*2);
  }
  return cvs;
}

function buildNormalTex(heightFn, strength, repeatX, repeatY) {
  const tex = new THREE.CanvasTexture(heightToNormal(heightFn(), strength));
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}

function cleanGlassMaps() {
  ['map', 'roughnessMap', 'normalMap'].forEach(k => {
    if (glassMat[k]) { glassMat[k].dispose(); glassMat[k] = null; }
  });
}

function setGlass(key) {
  _curGlass = key;
  cleanGlassMaps();

  if (key === 'klar') {
    glassMat.color.set(0xa6c8de); glassMat.roughness = 0.06;
    glassMat.metalness = 0.12; glassMat.envMapIntensity = 0.9;
  } else if (key === 'satinato') {
    glassMat.color.set(0xc4d8e2); glassMat.roughness = 0.90;
    glassMat.metalness = 0; glassMat.envMapIntensity = 0.1;
  } else if (key === 'chinchilla') {
    glassMat.color.set(0xb6d4e4); glassMat.roughness = 0.18;
    glassMat.metalness = 0.05; glassMat.envMapIntensity = 0.4;
    glassMat.normalMap   = buildNormalTex(chinchillaHeight, 3.0, 5, 16);
    glassMat.normalScale = new THREE.Vector2(1.2, 1.2);
  } else if (key === 'master-carre') {
    glassMat.color.set(0xb6d4e4); glassMat.roughness = 0.08;
    glassMat.metalness = 0.08; glassMat.envMapIntensity = 0.6;
    glassMat.normalMap   = buildNormalTex(masterCarreHeight, 3.0, 3, 11);
    glassMat.normalScale = new THREE.Vector2(1.2, 1.2);
  }

  glassMat.needsUpdate = true;
  document.querySelectorAll('.glass-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.key === key)
  );
}

// ── UI: Farbswatches bauen ────────────────────────────
function buildSwatches(id, list, onSelect, defaultKey) {
  const el = document.getElementById(id);
  list.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c.key === defaultKey ? ' active' : '');
    if (c.swatchUrl) {
      s.style.backgroundImage  = `url(${c.swatchUrl})`;
      s.style.backgroundSize   = 'cover';
      s.style.backgroundPosition = 'center';
    } else {
      s.style.background = c.hex || '#888';
    }
    s.innerHTML = `<span class="tooltip">${c.name}</span>`;
    s.onclick = () => {
      document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      onSelect(c);
    };
    el.appendChild(s);
  });
}

const _urlColor = new URLSearchParams(location.search).get('color');
if (_urlColor) setColor(_urlColor);
else           setColor('anthrazitgrau');

const _urlGlass = new URLSearchParams(location.search).get('glass');
if (_urlGlass) setGlass(_urlGlass);
else           setGlass('klar');

// ══════════════════════════════════════════════
// RESIZE + RENDER LOOP
// ══════════════════════════════════════════════
function resize() {
  const embed = new URLSearchParams(location.search).has('embed');
  const w = embed ? window.innerWidth  : window.innerWidth  - 252;
  const h = embed ? window.innerHeight : window.innerHeight - 40;
  renderer.setSize(w, h);
  frameCamera();   // ortho-Frustum an neues Seitenverhältnis anpassen
}
window.addEventListener('resize', resize);
resize();

if (new URLSearchParams(location.search).has('embed')) {
  document.body.classList.add('embed');
}

// Initial-Build NACH FARBEN/WOOD-Definitionen (setColor braucht die Lookup-Tabelle)
{
  const _urlLayout = new URLSearchParams(location.search).get('layout') || '1-fluegel';
  buildWindow({ layout: _urlLayout, sashes: ['dk-r'], oberlicht: 'fest', unterlicht: 'fest' });
}

// postMessage-Bridge: Konfigurator schickt Farb/Glas/Layout-Änderungen
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || !d.type) return;
  if (d.type === 'setColor') setColor(d.key);
  if (d.type === 'setWood')  setWood(d.key);
  if (d.type === 'setGlass') setGlass(d.key);
  if (d.type === 'setSide')  setSide(d.key);
  if (d.type === 'toggleOpen') sashOpen = !sashOpen;
  if (d.type === 'update') {
    const prev = (_lastSpec) ? _lastSpec : {};
    const newSpec = Object.assign({}, prev, {
      layout:     d.layout     !== undefined ? d.layout     : (prev.layout     || '1-fluegel'),
      sashes:     d.sashes     !== undefined ? d.sashes     : (prev.sashes     || ['dk-r']),
      oberlicht:  d.oberlicht  !== undefined ? d.oberlicht  : (prev.oberlicht  || 'fest'),
      unterlicht: d.unterlicht !== undefined ? d.unterlicht : (prev.unterlicht || 'fest'),
      roll:       d.roll       !== undefined ? d.roll       : (prev.roll       || 'ohne'),
      rollKasten: d.rollKasten !== undefined ? d.rollKasten : (prev.rollKasten || '175'),
      panzerHex: d.panzerHex !== undefined ? d.panzerHex : (prev.panzerHex || 'rahmen'),
      rollSeite:  d.rollSeite  !== undefined ? d.rollSeite  : (prev.rollSeite  || 'rechts'),
      separator:  d.separator  !== undefined ? d.separator  : (prev.separator  || ''),
      view:       d.view       !== undefined ? d.view       : (prev.view       || 'aussen'),
    });
    const _sproChanged = (d.sproTyp    !== undefined && d.sproTyp    !== _sproTyp)
                      || (d.sproRaster !== undefined && d.sproRaster !== _sproRaster);
    if (d.sproTyp    !== undefined) _sproTyp    = d.sproTyp;
    if (d.sproRaster !== undefined) _sproRaster = d.sproRaster;
    // Rebuild wenn Layout, Sash, Rolladen- oder Sprossen-State sich geaendert hat
    if (d.layout || d.sashes || d.roll !== undefined || d.rollKasten !== undefined || d.panzerHex !== undefined || d.rollSeite !== undefined || d.separator !== undefined || d.view !== undefined || _sproChanged) {
      buildWindow(newSpec);
    }
    if (d.wood)  setWood(d.wood);
    else         setColor(d.color || 'anthrazitgrau');
    setGlass(d.glass || 'klar');
    if (d.side) setSide(d.side);
  }
});

// Click-to-Open: Klick auf Griff/Hebel toggelt die Öffnung
const raycaster = new THREE.Raycaster();
const ndc       = new THREE.Vector2();
canvasEl.addEventListener('click', (ev) => {
  const rect = canvasEl.getBoundingClientRect();
  ndc.x =  ((ev.clientX - rect.left) / rect.width)  * 2 - 1;
  ndc.y = -((ev.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(handleObjects, false);
  if (hits.length > 0) sashOpen = !sashOpen;
});

// Sanfte Öffnen/Schließen-Animation
function updateSashAnimation() {
  const target = sashOpen ? 1 : 0;
  if (Math.abs(sashAnim - target) < 0.001) { sashAnim = target; return; }
  sashAnim += (target - sashAnim) * 0.08;   // ease-out
  // Rotation um Y-Achse — bei spiegelung (setSide='l') in Gegenrichtung
  const sign = (winGroup.scale.x < 0) ? 1 : -1;
  sashGroup.rotation.y = sign * sashAnim * SASH_OPEN_ANGLE;
}

(function animate() {
  requestAnimationFrame(animate);
  orb.update();
  updateSashAnimation();
  renderer.render(scene, camera);
})();
</script>

<script>
/* Bridge: dismiss Parent-Hint wenn User 3D wirklich bewegt */
(function(){
  if (window.parent === window) return;
  var dX=0, dY=0, isDown=false, fired=false;
  window.addEventListener('pointerdown', function(e){ isDown=true; fired=false; dX=e.clientX; dY=e.clientY; }, {passive:true,capture:true});
  window.addEventListener('pointermove', function(e){
    if (!isDown || fired) return;
    if (Math.abs(e.clientX-dX) + Math.abs(e.clientY-dY) > 12) {
      try { window.parent.postMessage({type:'3d-rotated'}, '*'); } catch(_){}
      fired = true;
    }
  }, {passive:true,capture:true});
  window.addEventListener('pointerup', function(){ isDown=false; }, {passive:true,capture:true});
  window.addEventListener('wheel', function(){ try{ window.parent.postMessage({type:'3d-rotated'},'*'); }catch(_){}}, {passive:true,once:true,capture:true});
})();
</script>
