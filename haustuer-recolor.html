<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haustür Konfigurator — Recolor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; color: #333; }

  .header { background: #1e3a8a; color: white; padding: 16px 30px; text-align: center; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 16px; display: flex; gap: 24px; }

  .preview { flex: 1; display: flex; flex-direction: column; align-items: center; }

  canvas#doorCanvas {
    max-height: 68vh; width: auto; border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); background: white;
  }

  .preview .label {
    margin-top: 10px; font-size: 15px; font-weight: 600; color: #1e3a8a;
  }

  .controls { width: 340px; overflow-y: auto; max-height: 85vh; }

  .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: #94a3b8; margin: 14px 0 6px; }
  .section-title:first-child { margin-top: 0; }

  .colors { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
  .color-swatch {
    width: 100%; aspect-ratio: 1; border-radius: 5px; cursor: pointer;
    border: 3px solid transparent; transition: all 0.15s;
    position: relative; background-size: cover;
  }
  .color-swatch:hover { transform: scale(1.1); z-index: 1; }
  .color-swatch.active { border-color: #1e3a8a; box-shadow: 0 0 0 2px #1e3a8a; }
  .color-swatch .tooltip {
    display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
    background: #333; color: white; padding: 3px 7px; border-radius: 4px;
    font-size: 10px; white-space: nowrap; z-index: 10;
  }
  .color-swatch:hover .tooltip { display: block; }

  .glass-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .glass-btn {
    flex: 1; min-width: 100px; padding: 8px 10px; border: 2px solid #e2e8f0;
    border-radius: 6px; background: white; cursor: pointer; text-align: center;
    font-size: 12px; font-weight: 600; transition: all 0.15s;
  }
  .glass-btn:hover { border-color: #94a3b8; }
  .glass-btn.active { border-color: #1e3a8a; background: #eef2ff; color: #1e3a8a; }
  .glass-btn small { display: block; font-weight: 400; color: #94a3b8; font-size: 10px; }
</style>
</head>
<body>

<div class="header">
  <h1>Haustür Konfigurator — Foto-Recoloring</h1>
  <p>Montana 1 Inox — Echtes Bild + maskierter Farbwechsel + Glasauswahl</p>
</div>

<div class="container">
  <div class="preview">
    <canvas id="doorCanvas" width="500" height="700"></canvas>
    <div class="label" id="currentLabel">Weiß — Klarglas</div>
  </div>

  <div class="controls">
    <div class="section-title">Glasart</div>
    <div class="glass-options" id="glassOptions"></div>

    <div class="section-title">Grautöne</div>
    <div class="colors" id="grays"></div>

    <div class="section-title">Farben</div>
    <div class="colors" id="colorGroup"></div>

    <div class="section-title">Holzdekore</div>
    <div class="colors" id="woods"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('doorCanvas');
const ctx = canvas.getContext('2d');
const label = document.getElementById('currentLabel');
const W = 500, H = 700;

let baseImg = null, bodyMask = null, glassMask = null;
let alphaMaskCanvas = null; // Body mask → alpha channel, 1px eroded
let lumCanvas = null;       // Normalized grayscale luminance (flat areas = 255)
let woodTextures = {};
let currentColorHex = '#ffffff';
let currentColorName = 'Weiß';
let currentWoodKey = null;
let currentGlass = 'klarglas';
let imagesLoaded = 0;
const TOTAL_IMAGES = 3;

// ── Quality parameters ──
// How deep grooves/shadows appear. 0.0 = flat (no structure), 1.0 = maximum depth.
// 0.65 means grooves are limited to max ~35% darker than flat surface = realistic PVC.
const SHADOW_FLOOR = 0.65;

// ── Color definitions ──
const FARBEN = {
  grays: [
    { key: 'weiss', hex: '#ffffff', name: 'Weiß' },
    { key: 'weiss-fx', hex: '#f4f4f0', name: 'Weiß FX' },
    { key: 'cremeweiss', hex: '#fdf6e3', name: 'Cremeweiß' },
    { key: 'crown-plat', hex: '#dddbd6', name: 'Crown Platin' },
    { key: 'lichtgrau', hex: '#c5c6be', name: 'Lichtgrau' },
    { key: 'betongrau', hex: '#7c7f79', name: 'Betongrau' },
    { key: 'quarzgr-sa', hex: '#6c6f66', name: 'Quarzgrau SA' },
    { key: 'quarzgr-gl', hex: '#6c6f66', name: 'Quarzgrau GL' },
    { key: 'basaltgr-sa', hex: '#4f5458', name: 'Basaltgrau SA' },
    { key: 'basaltgr-gl', hex: '#4f5458', name: 'Basaltgrau GL' },
    { key: 'grafitgr', hex: '#4a4c46', name: 'Grafitgrau' },
    { key: 'schiefgr-sa', hex: '#3e454c', name: 'Schiefergrau SA' },
    { key: 'schiefgr-gl', hex: '#3e454c', name: 'Schiefergrau GL' },
    { key: 'eisengl', hex: '#3c3e42', name: 'Eisenglimmer' },
    { key: 'anthrazit', hex: '#373d3f', name: 'Anthrazit' },
    { key: 'anthraz-gl', hex: '#373d3f', name: 'Anthrazit GL' },
    { key: 'anthraz-um', hex: '#2e3235', name: 'Anthrazit Ultimatt' },
    { key: 'schwarz-um', hex: '#1a1c1e', name: 'Schwarz Ultimatt' },
    { key: 'jet-black', hex: '#101214', name: 'Jet Black' },
  ],
  colors: [
    { key: 'brillblau', hex: '#1c5080', name: 'Brillantblau' },
    { key: 'stahlblau', hex: '#1c4c6c', name: 'Stahlblau' },
    { key: 'moosgruen', hex: '#2d4a30', name: 'Moosgrün' },
    { key: 'dunkelgr', hex: '#1e3828', name: 'Dunkelgrün' },
    { key: 'dunkelrot', hex: '#6c1c1c', name: 'Dunkelrot' },
    { key: 'braun-mar', hex: '#6b4226', name: 'Braun Marrone' },
    { key: 'schoko-br', hex: '#4a2820', name: 'Schokobraun' },
    { key: 'schwarzbr', hex: '#26211e', name: 'Schwarzbraun' },
    { key: 'piryt', hex: '#6a5a30', name: 'Pyrit' },
    { key: 'deep-bronze', hex: '#6b6040', name: 'Deep Bronze' },
  ],
  woods: [
    { key: 'golden-oak', hex: '#af7d3c', name: 'Golden Oak' },
    { key: 'sheffield', hex: '#b4a58c', name: 'Sheffield Oak' },
    { key: 'eiche-hell', hex: '#b9a582', name: 'Eiche Hell' },
    { key: 'eiche-nat', hex: '#aa8e55', name: 'Eiche Natur' },
    { key: 'winchester', hex: '#8c5f37', name: 'Winchester' },
    { key: 'oregon', hex: '#9b6c3c', name: 'Oregon' },
    { key: 'douglasie', hex: '#916234', name: 'Douglasie' },
    { key: 'nussbaum', hex: '#6e4626', name: 'Nussbaum' },
    { key: 'mooreiche', hex: '#4b3726', name: 'Mooreiche' },
    { key: 'dunkleiche', hex: '#3c2d20', name: 'Dunkle Eiche' },
    { key: 'macore', hex: '#783e2d', name: 'Macoré' },
    { key: 'mahagoni', hex: '#693726', name: 'Mahagoni' },
  ]
};

const GLASS_TYPES = [
  { key: 'klarglas', name: 'Klarglas', desc: 'Klar' },
  { key: 'satinato', name: 'Satinato', desc: 'Milchig' },
  { key: 'chinchilla', name: 'Chinchilla', desc: 'Struktur' },
  { key: 'master-carre', name: 'Master Carré', desc: 'Quadrate' },
];

function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.substring(0,2),16), parseInt(h.substring(2,4),16), parseInt(h.substring(4,6),16)];
}

// ══════════════════════════════════════════════════════════
// PREPARATION (run once after all images loaded)
// ══════════════════════════════════════════════════════════

// Create alpha mask with 1px binary erosion.
// The erosion removes the outermost mask pixel, so the colored area starts
// 1px INSIDE the door edge. The dark edge groove stays uncolored and acts as
// a natural visual separator — no bleeding, no white gap.
function createAlphaMask() {
  alphaMaskCanvas = document.createElement('canvas');
  alphaMaskCanvas.width = W;
  alphaMaskCanvas.height = H;
  const mctx = alphaMaskCanvas.getContext('2d');
  mctx.drawImage(bodyMask, 0, 0, W, H);
  const data = mctx.getImageData(0, 0, W, H);
  const px = data.data;

  // Read binary mask
  const mask = new Uint8Array(W * H);
  for (let i = 0; i < W * H; i++) {
    mask[i] = px[i * 4] > 128 ? 1 : 0;
  }

  // Binary erosion: keep pixel only if all 4-connected neighbors are also mask
  const eroded = new Uint8Array(W * H);
  for (let y = 1; y < H - 1; y++) {
    for (let x = 1; x < W - 1; x++) {
      const i = y * W + x;
      if (mask[i] && mask[i-1] && mask[i+1] && mask[i-W] && mask[i+W]) {
        eroded[i] = 1;
      }
    }
  }

  // Write as alpha channel
  for (let i = 0; i < W * H; i++) {
    const pi = i * 4;
    px[pi] = px[pi+1] = px[pi+2] = 255;
    px[pi+3] = eroded[i] ? 255 : 0;
  }
  mctx.putImageData(data, 0, 0);
}

// Create normalized grayscale luminance canvas from white base image.
// - Removes any color cast (the white image isn't perfectly neutral)
// - Normalizes so flat surfaces = 255 (→ multiply gives exact target color)
// - Lifts shadow floor so grooves can't get unrealistically dark
function createLuminanceCanvas() {
  // First read the body mask to know which pixels are door body
  const bmTmp = document.createElement('canvas');
  bmTmp.width = W; bmTmp.height = H;
  const bmCtx = bmTmp.getContext('2d');
  bmCtx.drawImage(bodyMask, 0, 0, W, H);
  const bmPx = bmCtx.getImageData(0, 0, W, H).data;

  // Read white base image
  const baseTmp = document.createElement('canvas');
  baseTmp.width = W; baseTmp.height = H;
  const baseCtx = baseTmp.getContext('2d');
  baseCtx.drawImage(baseImg, 0, 0, W, H);
  const baseData = baseCtx.getImageData(0, 0, W, H);
  const basePx = baseData.data;

  // Find max luminance in body area (97th percentile)
  const bodyLums = [];
  for (let i = 0; i < W * H; i++) {
    if (bmPx[i * 4] > 128) {
      const pi = i * 4;
      bodyLums.push(0.299 * basePx[pi] + 0.587 * basePx[pi+1] + 0.114 * basePx[pi+2]);
    }
  }
  bodyLums.sort((a, b) => a - b);
  const maxLum = bodyLums[Math.floor(bodyLums.length * 0.97)];

  // Create normalized grayscale with controlled shadow depth
  for (let i = 0; i < W * H; i++) {
    const pi = i * 4;
    const lum = 0.299 * basePx[pi] + 0.587 * basePx[pi+1] + 0.114 * basePx[pi+2];
    // Normalize: flat surface → 1.0, darker → proportionally less
    const normalized = Math.min(1.0, lum / maxLum);
    // Lift floor: grooves limited to SHADOW_FLOOR brightness minimum
    // Result: SHADOW_FLOOR=0.65 → grooves max 35% darker than flat
    const lifted = SHADOW_FLOOR + normalized * (1.0 - SHADOW_FLOOR);
    const byte = Math.min(255, Math.round(lifted * 255));
    basePx[pi] = basePx[pi+1] = basePx[pi+2] = byte;
    basePx[pi+3] = 255;
  }

  lumCanvas = document.createElement('canvas');
  lumCanvas.width = W;
  lumCanvas.height = H;
  const lctx = lumCanvas.getContext('2d');
  lctx.putImageData(baseData, 0, 0);
}

// ── Glass texture generators ──
function generateGlassTexture(type, gw, gh) {
  const c = document.createElement('canvas');
  c.width = gw; c.height = gh;
  const g = c.getContext('2d');

  switch(type) {
    case 'klarglas':
      g.fillStyle = 'rgba(220,235,238,0.15)';
      g.fillRect(0, 0, gw, gh);
      break;

    case 'satinato':
      g.fillStyle = 'rgba(235,238,242,0.82)';
      g.fillRect(0, 0, gw, gh);
      { const satData = g.getImageData(0, 0, gw, gh);
        for (let i = 0; i < satData.data.length; i += 4) {
          const noise = (Math.random() - 0.5) * 8;
          satData.data[i] = Math.min(255, Math.max(0, satData.data[i] + noise));
          satData.data[i+1] = Math.min(255, Math.max(0, satData.data[i+1] + noise));
          satData.data[i+2] = Math.min(255, Math.max(0, satData.data[i+2] + noise));
        }
        g.putImageData(satData, 0, 0);
      }
      break;

    case 'chinchilla':
      g.fillStyle = 'rgba(228,232,235,0.45)';
      g.fillRect(0, 0, gw, gh);
      for (let y = 0; y < gh; y += 4) {
        for (let x = 0; x < gw; x += 4) {
          const n1 = Math.sin(x*0.18+y*0.05)*Math.cos(y*0.14+x*0.03);
          const n2 = Math.sin(x*0.08+y*0.22)*0.5;
          const n3 = Math.sin((x+y*0.3)*0.12)*Math.cos((y-x*0.2)*0.09);
          const combined = (n1+n2+n3)/3;
          const brightness = 0.5+combined*0.35;
          const v = Math.floor(180+brightness*75);
          const alpha = 0.15+Math.abs(combined)*0.2;
          g.fillStyle = `rgba(${v},${v+2},${v+5},${alpha})`;
          const size = 3+Math.abs(n1)*2;
          g.beginPath();
          g.ellipse(x+n2*3, y+n1*2, size, size*(0.8+Math.abs(n3)*0.4), n1*0.3, 0, Math.PI*2);
          g.fill();
        }
      }
      for (let x = 0; x < gw; x += 2) {
        g.fillStyle = `rgba(200,210,215,${Math.sin(x*0.3)*0.05+0.02})`;
        g.fillRect(x, 0, 1, gh);
      }
      break;

    case 'master-carre':
      g.fillStyle = 'rgba(225,230,235,0.55)';
      g.fillRect(0, 0, gw, gh);
      for (let i = 0; i < 3000; i++) {
        const v = 210+Math.random()*40;
        g.fillStyle = `rgba(${v},${v},${v},0.08)`;
        g.fillRect(Math.random()*gw, Math.random()*gh, 1.5, 1.5);
      }
      { const spacing = 8, sqSize = 3;
        for (let y = 2; y < gh; y += spacing) {
          for (let x = 2; x < gw; x += spacing) {
            g.clearRect(x, y, sqSize, sqSize);
            g.strokeStyle = 'rgba(240,245,248,0.3)';
            g.lineWidth = 0.5;
            g.strokeRect(x-0.5, y-0.5, sqSize+1, sqSize+1);
          }
        }
      }
      break;
  }
  return c;
}

// ══════════════════════════════════════════════════════════
// RENDER — Pure Canvas compositing, zero pixel loops for color
// ══════════════════════════════════════════════════════════
//
// Pipeline:
// 1. Draw white base image (background with glass, handle, etc.)
// 2. Temp canvas: normalized luminance map × target color via 'multiply'
// 3. Clip to eroded body mask via 'destination-in'
// 4. Composite onto main canvas
//
// Why this is clean:
// - Luminance map is grayscale → no color cast, exact target color on flat areas
// - Shadow floor → grooves can't get unrealistically dark
// - 1px mask erosion → edge groove stays uncolored = natural separator
// - GPU multiply blend → anti-aliased, no rounding artifacts
function renderDoor() {
  if (!baseImg || !alphaMaskCanvas || !lumCanvas) return;

  // Step 1: White base as background
  ctx.drawImage(baseImg, 0, 0, W, H);

  const isWhite = currentColorHex === '#ffffff' && !currentWoodKey;
  if (!isWhite) {
    // Step 2: Multiply luminance map with target color
    const temp = document.createElement('canvas');
    temp.width = W; temp.height = H;
    const tctx = temp.getContext('2d');

    // Draw normalized grayscale luminance (flat areas = 255, grooves = darker)
    tctx.drawImage(lumCanvas, 0, 0, W, H);

    // GPU multiply blend: lumGray × targetColor / 255
    // Flat area (255): exactly target color
    // Groove (200): 78% of target color
    tctx.globalCompositeOperation = 'multiply';
    if (currentWoodKey && woodTextures[currentWoodKey]) {
      tctx.drawImage(woodTextures[currentWoodKey], 0, 0, W, H);
    } else {
      tctx.fillStyle = currentColorHex;
      tctx.fillRect(0, 0, W, H);
    }

    // Step 3: Clip to eroded body mask
    tctx.globalCompositeOperation = 'destination-in';
    tctx.drawImage(alphaMaskCanvas, 0, 0);

    // Step 4: Composite onto white base
    ctx.drawImage(temp, 0, 0);
  }

  // Step 5: Glass overlay
  if (currentGlass !== 'klarglas') {
    const gmc = document.createElement('canvas');
    gmc.width = W; gmc.height = H;
    const gmctx = gmc.getContext('2d');
    gmctx.drawImage(glassMask, 0, 0, W, H);
    const gmData = gmctx.getImageData(0, 0, W, H).data;

    let gx1=W, gy1=H, gx2=0, gy2=0;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        if (gmData[(y*W+x)*4] > 128) {
          gx1 = Math.min(gx1,x); gy1 = Math.min(gy1,y);
          gx2 = Math.max(gx2,x); gy2 = Math.max(gy2,y);
        }
      }
    }

    const glassTex = generateGlassTexture(currentGlass, gx2-gx1+1, gy2-gy1+1);
    const gtData = glassTex.getContext('2d').getImageData(0, 0, glassTex.width, glassTex.height).data;

    const baseData = ctx.getImageData(0, 0, W, H);
    const pixels = baseData.data;
    for (let y = gy1; y <= gy2; y++) {
      for (let x = gx1; x <= gx2; x++) {
        const pi = (y*W+x)*4;
        if (gmData[pi] < 128) continue;
        const ti = ((y-gy1)*glassTex.width+(x-gx1))*4;
        const a = gtData[ti+3]/255;
        if (a < 0.01) continue;
        pixels[pi]   = Math.round(pixels[pi]  *(1-a)+gtData[ti]  *a);
        pixels[pi+1] = Math.round(pixels[pi+1]*(1-a)+gtData[ti+1]*a);
        pixels[pi+2] = Math.round(pixels[pi+2]*(1-a)+gtData[ti+2]*a);
      }
    }
    ctx.putImageData(baseData, 0, 0);
  }
}

function updateLabel() {
  const colorName = currentWoodKey
    ? FARBEN.woods.find(w => w.key === currentWoodKey)?.name || currentWoodKey
    : currentColorName;
  const glassName = GLASS_TYPES.find(g => g.key === currentGlass)?.name || currentGlass;
  label.textContent = `${colorName} — ${glassName}`;
}

// ── Build UI ──
function buildSwatches(containerId, colors, isWood) {
  const el = document.getElementById(containerId);
  colors.forEach(c => {
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch' + (c.key === 'weiss' ? ' active' : '');
    swatch.style.background = c.hex;
    if (c.hex === '#ffffff') swatch.style.border = '2px solid #ddd';
    swatch.innerHTML = `<span class="tooltip">${c.name}</span>`;
    swatch.onclick = () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
      if (isWood) {
        currentWoodKey = c.key;
        currentColorHex = c.hex;
      } else {
        currentWoodKey = null;
        currentColorHex = c.hex;
      }
      currentColorName = c.name;
      updateLabel();
      renderDoor();
    };
    el.appendChild(swatch);
  });
}

function buildGlassOptions() {
  const el = document.getElementById('glassOptions');
  GLASS_TYPES.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'glass-btn' + (g.key === 'klarglas' ? ' active' : '');
    btn.innerHTML = `${g.name}<small>${g.desc}</small>`;
    btn.onclick = () => {
      document.querySelectorAll('.glass-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentGlass = g.key;
      updateLabel();
      renderDoor();
    };
    el.appendChild(btn);
  });
}

// ── Init ──
function onImageLoad() {
  imagesLoaded++;
  if (imagesLoaded >= TOTAL_IMAGES) {
    createAlphaMask();
    createLuminanceCanvas();
    buildGlassOptions();
    buildSwatches('grays', FARBEN.grays, false);
    buildSwatches('colorGroup', FARBEN.colors, false);
    buildSwatches('woods', FARBEN.woods, true);
    renderDoor();
  }
}

FARBEN.woods.forEach(w => {
  const img = new Image();
  img.onload = () => { woodTextures[w.key] = img; };
  img.src = `img/wood_textures/${w.key}.png`;
});

baseImg = new Image();
baseImg.onload = onImageLoad;
baseImg.src = 'img/farben/haustuer_aussen_montana-1-inox_weiss.png';

bodyMask = new Image();
bodyMask.onload = onImageLoad;
bodyMask.src = 'img/haustuer_montana-1-inox_body_mask.png';

glassMask = new Image();
glassMask.onload = onImageLoad;
glassMask.src = 'img/haustuer_montana-1-inox_glass_mask.png';
</script>
</body>
</html>
